<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>카테고리 회차 목록</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --ink: #1f2b35;
      --card: #fffdf8;
      --line: #d7cbba;
      --accent: #1f6e78;
      --muted: #607081;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "SUIT", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(140deg, rgba(31,110,120,.06), rgba(255,255,255,.7)),
        var(--bg);
      min-height: 100vh;
    }

    .container {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: 34px 0 60px;
    }

    .top {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .back {
      text-decoration: none;
      border: 1px solid var(--line);
      color: var(--ink);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 13px;
      background: rgba(255,255,255,.7);
    }

    h1 {
      margin: 12px 0 0;
      font-size: clamp(26px, 3.7vw, 40px);
      letter-spacing: -0.03em;
    }

    .desc {
      color: var(--muted);
      margin: 10px 0 0;
      font-size: 14px;
    }
    .adWrap {
      margin-top: 16px;
      min-height: 100px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      padding: 8px;
    }

    .list {
      margin-top: 24px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .exam {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 16px;
      box-shadow: 0 8px 16px rgba(31,43,53,.06);
    }

    .name {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .status {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .row {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      color: #fff;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      border: 1px solid transparent;
      background: var(--accent);
    }

    .btn.secondary {
      color: var(--ink);
      background: rgba(255,255,255,.6);
      border-color: var(--line);
    }

    .btn.disabled {
      pointer-events: none;
      opacity: .45;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 24px;
      color: var(--muted);
      background: rgba(255,255,255,.6);
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="top">
      <a class="back" href="./index.html">← 메인으로</a>
      <div id="meta" class="desc"></div>
    </div>
    <h1 id="title">카테고리</h1>
    <p class="desc">파일명에서 suffix(`시험문제지`, `최종정답`)를 제거한 값이 회차명으로 표시됩니다.</p>
    <section class="adWrap" id="adfitCategoryTop">광고 영역</section>

    <section class="list" id="list"></section>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const categoryName = params.get("category") || "농산물품질관리사";
    const categoryNo = params.get("catNo") || "";
    const ADFIT_UNITS = {
      categoryTop: "DAN_REPLACE_CATEGORY_TOP",
    };

    function loadAdFitScript() {
      if (window.__adfitLoaded) return;
      const script = document.createElement("script");
      script.async = true;
      script.src = "https://t1.daumcdn.net/kas/static/ba.min.js";
      script.onload = () => { window.__adfitLoaded = true; };
      document.head.appendChild(script);
    }

    function initAdFit(slotId, unit, width, height) {
      const slot = document.getElementById(slotId);
      if (!slot) return;
      if (!unit || !unit.startsWith("DAN-")) {
        slot.textContent = "광고 단위 ID를 설정하면 이 위치에 배너가 노출됩니다.";
        return;
      }
      slot.innerHTML = `<ins class="kakao_ad_area" style="display:none;" data-ad-unit="${unit}" data-ad-width="${width}" data-ad-height="${height}"></ins>`;
      loadAdFitScript();
    }

    function normalizePdfPath(path) {
      const raw = String(path || "").trim();
      if (!raw) return "";
      return raw.replace(/^\.\//, "").replace(/^quiz\//, "");
    }

    function examStatus(exam) {
      const hasQ = Boolean(normalizePdfPath(exam.questionPdf));
      const hasA = Boolean(normalizePdfPath(exam.answerPdf));
      if (hasQ && hasA) return "문제/정답 세트 준비 완료";
      if (hasQ && !hasA) return "정답 PDF 없음";
      if (!hasQ && hasA) return "문제 PDF 없음";
      return "파일 누락";
    }

    function makeQuizUrl(exam) {
      const question = normalizePdfPath(exam.questionPdf);
      const answer = normalizePdfPath(exam.answerPdf);
      const q = new URLSearchParams({
        category: exam.catNm || categoryName,
        exam: exam.questionNm,
        questionNo: exam.questionNo || "",
        question,
        answer,
      });
      return `./quiz.html?${q.toString()}`;
    }

    async function fetchJson(path) {
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error(`fetch failed: ${path}`);
      return res.json();
    }

    async function load() {
      const title = document.getElementById("title");
      const list = document.getElementById("list");
      const meta = document.getElementById("meta");

      title.textContent = categoryName;

      try {
        const [categories, questions] = await Promise.all([
          fetchJson("./json/category.json"),
          fetchJson("./json/question.json"),
        ]);
        const category = (categories || []).find((c) =>
          (categoryNo && String(c.catNo) === String(categoryNo)) ||
          (!categoryNo && String(c.catNm) === String(categoryName))
        );
        const catNo = category ? category.catNo : categoryNo;
        const exams = (questions || [])
          .filter((q) => String(q.catNo) === String(catNo))
          .sort((a, b) => Number(a.seq || 0) - Number(b.seq || 0));
        const readyCount = exams.filter((e) => normalizePdfPath(e.questionPdf) && normalizePdfPath(e.answerPdf)).length;

        meta.textContent = `총 ${exams.length}개 회차 · 풀이 가능 ${readyCount}개`;
        list.innerHTML = "";

        if (exams.length === 0) {
          list.innerHTML = '<article class="empty">등록된 회차가 없습니다. 해당 카테고리 폴더에 PDF를 넣고 manifest를 다시 생성하세요.</article>';
          return;
        }

        for (const exam of exams) {
          const questionPath = normalizePdfPath(exam.questionPdf);
          const answerPath = normalizePdfPath(exam.answerPdf);
          const ready = Boolean(questionPath && answerPath);

          const card = document.createElement("article");
          card.className = "exam";

          const quizUrl = makeQuizUrl(exam);
          const qLink = questionPath ? `./${encodeURI(questionPath)}` : "#";
          const aLink = answerPath ? `./${encodeURI(answerPath)}` : "#";

          card.innerHTML = `
            <h2 class="name">${exam.questionNm}</h2>
            <p class="status">${examStatus(exam)}</p>
            <div class="row">
              <a class="btn ${ready ? "" : "disabled"}" href="${quizUrl}">풀이 시작</a>
              <a class="btn secondary ${questionPath ? "" : "disabled"}" href="${qLink}" target="_blank">문제 PDF</a>
              <a class="btn secondary ${answerPath ? "" : "disabled"}" href="${aLink}" target="_blank">정답 PDF</a>
            </div>
          `;

          list.appendChild(card);
        }
      } catch (err) {
        meta.textContent = "데이터를 불러오지 못했습니다.";
        list.innerHTML = '<article class="empty">json 데이터(group/category/question)를 확인하세요.</article>';
      }
    }

    initAdFit("adfitCategoryTop", ADFIT_UNITS.categoryTop, "728", "90");
    load();
  </script>
</body>
</html>
