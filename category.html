<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>카테고리 회차 목록</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --ink: #1f2b35;
      --card: #fffdf8;
      --line: #d7cbba;
      --accent: #1f6e78;
      --muted: #607081;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "SUIT", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(140deg, rgba(31,110,120,.06), rgba(255,255,255,.7)),
        var(--bg);
      min-height: 100vh;
    }

    .container {
      width: min(1120px, 92vw);
      margin: 0 auto;
      padding: 34px 0 60px;
    }

    .top {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .back {
      text-decoration: none;
      border: 1px solid var(--line);
      color: var(--ink);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 13px;
      background: rgba(255,255,255,.7);
    }

    h1 {
      margin: 12px 0 0;
      font-size: clamp(26px, 3.7vw, 40px);
      letter-spacing: -0.03em;
    }

    .desc {
      color: var(--muted);
      margin: 10px 0 0;
      font-size: 14px;
    }

    .list {
      margin-top: 24px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .exam {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      padding: 16px;
      box-shadow: 0 8px 16px rgba(31,43,53,.06);
    }

    .name {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .status {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .row {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      color: #fff;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      border: 1px solid transparent;
      background: var(--accent);
    }

    .btn.secondary {
      color: var(--ink);
      background: rgba(255,255,255,.6);
      border-color: var(--line);
    }

    .btn.disabled {
      pointer-events: none;
      opacity: .45;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 24px;
      color: var(--muted);
      background: rgba(255,255,255,.6);
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="top">
      <a class="back" href="./index.html">← 메인으로</a>
      <div id="meta" class="desc"></div>
    </div>
    <h1 id="title">카테고리</h1>
    <p class="desc">파일명에서 suffix(`시험문제지`, `최종정답`)를 제거한 값이 회차명으로 표시됩니다.</p>

    <section class="list" id="list"></section>
  </main>

  <script src="./data/exams.manifest.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const categoryName = params.get("category") || "농산물품질관리사";

    function examStatus(exam) {
      if (exam.questionPdf && exam.answerPdf) return "문제/정답 세트 준비 완료";
      if (exam.questionPdf && !exam.answerPdf) return "정답 PDF 없음";
      if (!exam.questionPdf && exam.answerPdf) return "문제 PDF 없음";
      return "파일 누락";
    }

    function makeQuizUrl(exam) {
      const q = new URLSearchParams({
        category: categoryName,
        exam: exam.examName,
        question: exam.questionPdf || "",
        answer: exam.answerPdf || "",
      });
      return `./quiz.html?${q.toString()}`;
    }

    async function loadManifest() {
      if (window.__EXAMS_MANIFEST__) return window.__EXAMS_MANIFEST__;
      const res = await fetch("./data/exams.json", { cache: "no-store" });
      if (!res.ok) throw new Error("manifest fetch failed");
      return res.json();
    }

    async function load() {
      const title = document.getElementById("title");
      const list = document.getElementById("list");
      const meta = document.getElementById("meta");

      title.textContent = categoryName;

      try {
        const data = await loadManifest();

        const category = (data.categories || []).find((c) => c.categoryName === categoryName);
        const exams = category ? (category.exams || []) : [];
        const readyCount = exams.filter((e) => e.questionPdf && e.answerPdf).length;

        meta.textContent = `총 ${exams.length}개 회차 · 풀이 가능 ${readyCount}개`;
        list.innerHTML = "";

        if (exams.length === 0) {
          list.innerHTML = '<article class="empty">등록된 회차가 없습니다. 해당 카테고리 폴더에 PDF를 넣고 manifest를 다시 생성하세요.</article>';
          return;
        }

        for (const exam of exams) {
          const ready = Boolean(exam.questionPdf && exam.answerPdf);

          const card = document.createElement("article");
          card.className = "exam";

          const quizUrl = makeQuizUrl(exam);
          const qLink = exam.questionPdf ? `./${encodeURI(exam.questionPdf)}` : "#";
          const aLink = exam.answerPdf ? `./${encodeURI(exam.answerPdf)}` : "#";

          card.innerHTML = `
            <h2 class="name">${exam.examName}</h2>
            <p class="status">${examStatus(exam)}</p>
            <div class="row">
              <a class="btn ${ready ? "" : "disabled"}" href="${quizUrl}">풀이 시작</a>
              <a class="btn secondary ${exam.questionPdf ? "" : "disabled"}" href="${qLink}" target="_blank">문제 PDF</a>
              <a class="btn secondary ${exam.answerPdf ? "" : "disabled"}" href="${aLink}" target="_blank">정답 PDF</a>
            </div>
          `;

          list.appendChild(card);
        }
      } catch (err) {
        meta.textContent = "데이터를 불러오지 못했습니다.";
        list.innerHTML = '<article class="empty">`scripts/build-exams-manifest.mjs` 실행 후 새로고침하세요.</article>';
      }
    }

    load();
  </script>
</body>
</html>
