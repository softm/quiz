<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>자격증 문제은행 메인</title>
  <style>
    :root {
      --bg: #f4efe6;
      --ink: #1e2a33;
      --card: #fffdf8;
      --line: #d8cbb8;
      --accent-1: #296c73;
      --accent-2: #e8a234;
      --accent-3: #c84e3e;
      --muted: #61717f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Pretendard", "SUIT", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at 90% 5%, rgba(41,108,115,.20), transparent 30%),
        radial-gradient(circle at 5% 95%, rgba(200,78,62,.15), transparent 35%),
        var(--bg);
      min-height: 100vh;
    }

    .container {
      width: min(1100px, 92vw);
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .adWrap {
      margin-top: 16px;
      min-height: 100px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      padding: 8px;
    }

    .grid {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .banner {
      position: relative;
      text-decoration: none;
      color: inherit;
      background: linear-gradient(145deg, rgba(255,255,255,.95), rgba(255,253,248,.90));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      min-height: 170px;
      box-shadow: 0 12px 24px rgba(30,42,51,.08);
      transition: transform .18s ease, box-shadow .18s ease;
      overflow: hidden;
    }

    .banner:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 26px rgba(30,42,51,.13);
    }

    .banner::after {
      content: "";
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 100px;
      right: -35px;
      top: -35px;
      opacity: .2;
    }

    .banner[data-kind="qcm"]::after { background: var(--accent-1); }
    .banner[data-kind="greenhouse"]::after { background: var(--accent-2); }
    .banner[data-kind="organic"]::after { background: var(--accent-3); }

    .badge {
      display: inline-block;
      font-size: 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--muted);
      background: rgba(255,255,255,.65);
    }

    .title {
      margin: 10px 0 4px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .count {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .cta {
      margin-top: 20px;
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 620px) {
      .container { padding-top: 28px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>자격증 문제은행</h1>
    <p class="subtitle">카테고리별로 회차를 선택해서 문제 PDF와 최종정답 PDF 기반으로 풀이를 시작합니다.</p>
    <p class="meta" id="generatedAt">데이터 로딩 중...</p>
    <section class="adWrap" id="adfitIndexTop">광고 영역</section>

    <section class="grid" id="categoryGrid"></section>
  </main>

  <script src="./data/exams.manifest.js"></script>
  <script>
    const categoryOrder = [
      "농산물품질관리사",
      "시설원예기사",
      "유기농업기사",
    ];

    const kindByCategory = {
      "농산물품질관리사": "qcm",
      "시설원예기사": "greenhouse",
      "유기농업기사": "organic",
    };
    const ADFIT_UNITS = {
      indexTop: "DAN_REPLACE_INDEX_TOP",
    };

    function loadAdFitScript() {
      if (window.__adfitLoaded) return;
      const script = document.createElement("script");
      script.async = true;
      script.src = "https://t1.daumcdn.net/kas/static/ba.min.js";
      script.onload = () => { window.__adfitLoaded = true; };
      document.head.appendChild(script);
    }

    function initAdFit(slotId, unit, width, height) {
      const slot = document.getElementById(slotId);
      if (!slot) return;
      if (!unit || !unit.startsWith("DAN-")) {
        slot.textContent = "광고 단위 ID를 설정하면 이 위치에 배너가 노출됩니다.";
        return;
      }
      slot.innerHTML = `<ins class="kakao_ad_area" style="display:none;" data-ad-unit="${unit}" data-ad-width="${width}" data-ad-height="${height}"></ins>`;
      loadAdFitScript();
    }

    async function loadManifest() {
      if (window.__EXAMS_MANIFEST__) return window.__EXAMS_MANIFEST__;
      const res = await fetch("./data/exams.json", { cache: "no-store" });
      if (!res.ok) throw new Error("manifest fetch failed");
      return res.json();
    }

    async function load() {
      const grid = document.getElementById("categoryGrid");
      const generatedAt = document.getElementById("generatedAt");

      try {
        const data = await loadManifest();

        const map = new Map((data.categories || []).map((c) => [c.categoryName, c]));
        const nowText = data.generatedAt ? new Date(data.generatedAt).toLocaleString("ko-KR") : "-";
        generatedAt.textContent = `데이터 생성 시각: ${nowText}`;

        grid.innerHTML = "";

        for (const name of categoryOrder) {
          const category = map.get(name) || { categoryName: name, exams: [] };
          const solved = category.exams.filter((e) => e.questionPdf && e.answerPdf).length;

          const card = document.createElement("a");
          card.className = "banner";
          card.dataset.kind = kindByCategory[name] || "qcm";
          card.href = `./category.html?category=${encodeURIComponent(name)}`;
          card.innerHTML = `
            <span class="badge">카테고리</span>
            <h2 class="title">${name}</h2>
            <p class="count">등록 회차 ${category.exams.length}개 · 문제+정답 세트 ${solved}개</p>
            <p class="cta">회차 목록 보기 →</p>
          `;

          grid.appendChild(card);
        }
      } catch (err) {
        generatedAt.textContent = "데이터를 불러오지 못했습니다. scripts/build-exams-manifest.mjs 실행 후 새로고침하세요.";
        grid.innerHTML = "";
      }
    }

    initAdFit("adfitIndexTop", ADFIT_UNITS.indexTop, "728", "90");
    load();
  </script>
</body>
</html>
