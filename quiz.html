  async function resolveQuestionByYRatioOnPage(pageNo, yRatio){
    if (!Number.isFinite(pageNo) || !Number.isFinite(yRatio)) return null;
    const y = Math.max(0, Math.min(1, Number(yRatio)));
    const starts = [];
    for (let q = 1; q <= 100; q++){
      const mappedPage = getPdfPageByQuestion(q);
      if (mappedPage !== pageNo) continue;
      const s = await getQuestionStartRatioForPage(pageNo, q);
      if (!Number.isFinite(s)) continue;
      starts.push({ q, start: Math.max(0, Math.min(1, Number(s))) });
    }
    if (!starts.length) return null;
    starts.sort((a, b) => a.start - b.start || a.q - b.q);
    for (let i = 0; i < starts.length; i++){
      const cur = starts[i];
      const next = starts[i + 1];
      const lower = cur.start - 0.006;
      const upper = next ? (next.start - 0.004) : 1;
      if (y >= lower && y <= upper) return cur.q;
    }
    if (y < starts[0].start) return starts[0].q;
    return starts[starts.length - 1].q;
  }

  async function onPdfCanvasClick(e){
    if (state.viewMode !== "single") return;
    const q = state.focusQ;
    if (!q) return;
    const meta = state.lastRenderMeta;
    if (!meta || meta.viewMode !== "single" || meta.q !== q) return;

    const rect = pdfCanvas.getBoundingClientRect();
    if (!rect.width || !rect.height) return;
    const xOnCanvas = ((e.clientX - rect.left) / rect.width) * pdfCanvas.width;
    const yOnCanvas = ((e.clientY - rect.top) / rect.height) * pdfCanvas.height;
    const sx = meta.cropWidthPx / pdfCanvas.width;
    const sy = meta.cropHeightPx / pdfCanvas.height;
    const xFull = meta.cropLeftPx + (xOnCanvas * sx);
    const yFull = meta.cropStartPx + (yOnCanvas * sy);

    const visibleStartRatio = Math.max(0, Math.min(1, Number(meta.cropStartPx || 0) / Math.max(1, Number(meta.fullHeightPx || 1))));
    const visibleEndRatio = Math.max(
      visibleStartRatio + 0.02,
      Math.min(1, (Number(meta.cropStartPx || 0) + Number(meta.cropHeightPx || 0)) / Math.max(1, Number(meta.fullHeightPx || 1)))
    );
    let anchors = await getChoiceAnchorsForQuestion(meta.page, q, {
      startRatio: visibleStartRatio,
      endRatio: visibleEndRatio
    });
    if (!Array.isArray(anchors)) anchors = [];
    if (anchors.length < 4) {
      const byChoice = new Map();
      for (const a of anchors) {
        if (!a || !Number.isFinite(a.choice)) continue;
        if (!byChoice.has(a.choice)) byChoice.set(a.choice, a);
      }
      for (let c = 1; c <= 4; c++){
        if (byChoice.has(c)) continue;
        try{
          const recovered = await resolveChoiceAnchorByQuestionBand(meta.page, q, c, visibleStartRatio, visibleEndRatio);
          if (recovered) byChoice.set(c, recovered);
        }catch(_){}
      }
      anchors = Array.from(byChoice.values()).sort((a, b) => a.choice - b.choice);
    }
    if (anchors.length){
      const points = anchors.map((a) => {
        const ax = a.xRatio * meta.fullWidthPx;
        const ay = a.yRatio * meta.fullHeightPx;
        const aw = Math.max(10, a.wRatio * meta.fullWidthPx);
        const ah = Math.max(12, a.hRatio * meta.fullHeightPx);
        return {
          choice: a.choice,
          ax, ay, aw, ah,
          cx: ax + (aw * 0.5),
          cy: ay + (ah * 0.5)
        };
      });
      const ys = points.map((p) => p.cy);
      const xs = points.map((p) => p.cx);
      const ySpread = ys.length ? (Math.max(...ys) - Math.min(...ys)) : 0;
      const xSpread = xs.length ? (Math.max(...xs) - Math.min(...xs)) : 0;
      // 라벨 오인식이 있더라도 클릭 선택은 좌표 배치로 최종 결정한다.
      if (points.length >= 3) {
        const minX = Math.min(...xs);
        const maxX = Math.max(...xs);
        const minY = Math.min(...ys);
        const maxY = Math.max(...ys);
        if (xSpread > 90 && ySpread > 20) {
          // 2열 배치(①② / ③④)
          const midX = (minX + maxX) * 0.5;
          const midY = (minY + maxY) * 0.5;
          const col = xFull < midX ? 0 : 1;
          const row = yFull < midY ? 0 : 1;
          const choice = (row * 2) + col + 1;
          chooseByKeyboard(choice);
          pdfStatus.textContent = `${q}번 ${choice} 선택`;
          return;
        }
        if (ySpread <= Math.max(22, xSpread * 0.22)) {
          // 가로 1열 배치(①②③④)
          const sorted = [...points].sort((a, b) => a.cx - b.cx);
          const idx = sorted.findIndex((p, i) => i === sorted.length - 1 || xFull < ((p.cx + sorted[i + 1].cx) * 0.5));
          const choice = Math.max(1, Math.min(4, (idx >= 0 ? idx : (sorted.length - 1)) + 1));
          chooseByKeyboard(choice);
          pdfStatus.textContent = `${q}번 ${choice} 선택`;
          return;
        }
        if (xSpread <= Math.max(70, ySpread * 0.35)) {
          // 세로 1열 배치(①②③④)
          const sorted = [...points].sort((a, b) => a.cy - b.cy);
          const idx = sorted.findIndex((p, i) => i === sorted.length - 1 || yFull < ((p.cy + sorted[i + 1].cy) * 0.5));
          const choice = Math.max(1, Math.min(4, (idx >= 0 ? idx : (sorted.length - 1)) + 1));
          chooseByKeyboard(choice);
          pdfStatus.textContent = `${q}번 ${choice} 선택`;
          return;
        }
      }
      const horizontalLayout = ySpread <= Math.max(22, xSpread * 0.22);
      if (horizontalLayout && points.length >= 3) {
        const avgH = points.reduce((s, p) => s + p.ah, 0) / points.length;
        const rowBand = Math.max(28, avgH * 3.8);
        const nearRow = points.filter((p) => Math.abs(yFull - p.cy) <= rowBand);
        const cand = (nearRow.length >= 2 ? nearRow : points)
          .sort((a, b) => Math.abs(xFull - a.cx) - Math.abs(xFull - b.cx))[0];
        if (cand && Math.abs(yFull - cand.cy) <= (rowBand * 1.25)) {
          chooseByKeyboard(cand.choice);
          pdfStatus.textContent = `${q}번 ${cand.choice} 선택`;
          return;
        }
      }
      let best = null;
      let bestScore = Infinity;
      for (const p of points){
        const dx = Math.abs(xFull - p.cx);
        const dy = Math.abs(yFull - p.cy);
        const score = horizontalLayout
          ? (dx + (dy * 0.45)) // 가로 배열은 x 근접도를 우선
          : (dy + (dx * 0.35)); // 세로 배열은 y 근접도를 우선
        if (score < bestScore) {
          bestScore = score;
          best = { choice: p.choice, dx, dy, aw: p.aw, ah: p.ah };
        }
      }
      if (best) {
        const yLimit = horizontalLayout
          ? Math.max(36, best.ah * 4.4)
          : Math.max(22, best.ah * 2.6);
        const xLimit = horizontalLayout
          ? Math.max(180, best.aw * 18.0)
          : Math.max(90, best.aw * 10.0);
        if (best.dy <= yLimit && best.dx <= xLimit) {
          chooseByKeyboard(best.choice);
          pdfStatus.textContent = `${q}번 ${best.choice} 선택`;
          return;
        }
      }
    }

    // 앵커 검출 실패 시 보조 fallback
    const nx = (e.clientX - rect.left) / rect.width;
    const ny = (e.clientY - rect.top) / rect.height;
    if (nx >= 0.03 && nx <= 0.92 && ny >= 0.22 && ny <= 0.96) {
      // 2열(①②/③④) 배치를 우선 가정해 클릭 체감 정확도를 높인다.
      const col = nx < 0.5 ? 0 : 1;
      const row = ny < 0.56 ? 0 : 1;
      let choice = (row * 2) + col + 1;
      // 매우 위쪽 클릭은 1/2, 매우 아래쪽 클릭은 3/4로 보정
      if (ny < 0.40) choice = col === 0 ? 1 : 2;
      if (ny > 0.66) choice = col === 0 ? 3 : 4;
      chooseByKeyboard(choice);
      pdfStatus.textContent = `${q}번 ${choice} 선택`;
    }
  }

  async function onAllPdfCanvasClick(e){
    if (state.viewMode !== "all") return;
    const canvas = e.currentTarget;
    if (!canvas) return;
    const pageNo = Number(canvas.dataset.page);
    if (!Number.isFinite(pageNo)) return;
    const meta = state.allPageCanvasMeta[pageNo];
    if (!meta) return;

    const rect = canvas.getBoundingClientRect();
    if (!rect.width || !rect.height) return;
    const xOnCanvas = ((e.clientX - rect.left) / rect.width) * canvas.width;
    const yOnCanvas = ((e.clientY - rect.top) / rect.height) * canvas.height;
    const sx = meta.srcWidth / Math.max(1, meta.destWidth);
    const sy = meta.fullHeight / Math.max(1, meta.destHeight);
    const xFull = meta.srcLeft + (xOnCanvas * sx);
    const yFull = yOnCanvas * sy;
    const yRatio = yFull / Math.max(1, meta.fullHeight);

    const q = await resolveQuestionByYRatioOnPage(pageNo, yRatio);
    if (!Number.isFinite(q)) return;

    let range = null;
    try{ range = await getQuestionCropRange(q, pageNo); }catch(_){}
    const startRatio = Number.isFinite(range?.focusStart) ? Number(range.focusStart) : (Number.isFinite(range?.start) ? Number(range.start) : Math.max(0, yRatio - 0.12));
    const endRatio = Number.isFinite(range?.focusEnd) ? Number(range.focusEnd) : (Number.isFinite(range?.end) ? Number(range.end) : Math.min(1, startRatio + 0.32));

    let anchors = await getChoiceAnchorsForQuestion(pageNo, q, { startRatio, endRatio });
    if (!Array.isArray(anchors)) anchors = [];
    if (anchors.length < 4) {
      const byChoice = new Map();
      for (const a of anchors){
        if (!a || !Number.isFinite(a.choice)) continue;
        if (!byChoice.has(a.choice)) byChoice.set(a.choice, a);
      }
      for (let c = 1; c <= 4; c++){
        if (byChoice.has(c)) continue;
        try{
          const recovered = await resolveChoiceAnchorByQuestionBand(pageNo, q, c, startRatio, endRatio);
          if (recovered) byChoice.set(c, recovered);
        }catch(_){}
      }
      anchors = Array.from(byChoice.values()).sort((a, b) => a.choice - b.choice);
    }

    let picked = null;
    if (anchors.length){
      const points = anchors.map((a) => {
        const ax = a.xRatio * meta.fullWidth;
        const ay = a.yRatio * meta.fullHeight;
        const aw = Math.max(10, a.wRatio * meta.fullWidth);
        const ah = Math.max(12, a.hRatio * meta.fullHeight);
        return { ax, ay, aw, ah, cx: ax + (aw * 0.5), cy: ay + (ah * 0.5) };
      });
      const xs = points.map((p) => p.cx);
      const ys = points.map((p) => p.cy);
      const xSpread = xs.length ? (Math.max(...xs) - Math.min(...xs)) : 0;
      const ySpread = ys.length ? (Math.max(...ys) - Math.min(...ys)) : 0;
      if (points.length >= 3 && xSpread > 90 && ySpread > 20) {
        const midX = (Math.min(...xs) + Math.max(...xs)) * 0.5;
        const midY = (Math.min(...ys) + Math.max(...ys)) * 0.5;
        const col = xFull < midX ? 0 : 1;
        const row = yFull < midY ? 0 : 1;
        picked = (row * 2) + col + 1;
      } else if (points.length >= 3 && ySpread <= Math.max(22, xSpread * 0.22)) {
        const sorted = [...points].sort((a, b) => a.cx - b.cx);
        const idx = sorted.findIndex((p, i) => i === sorted.length - 1 || xFull < ((p.cx + sorted[i + 1].cx) * 0.5));
        picked = Math.max(1, Math.min(4, (idx >= 0 ? idx : (sorted.length - 1)) + 1));
      } else if (points.length >= 3) {
        const sorted = [...points].sort((a, b) => a.cy - b.cy);
        const idx = sorted.findIndex((p, i) => i === sorted.length - 1 || yFull < ((p.cy + sorted[i + 1].cy) * 0.5));
        picked = Math.max(1, Math.min(4, (idx >= 0 ? idx : (sorted.length - 1)) + 1));
      }
    }

    if (!Number.isFinite(picked)) {
      const nx = (e.clientX - rect.left) / rect.width;
      const ny = (e.clientY - rect.top) / rect.height;
      const col = nx < 0.5 ? 0 : 1;
      const row = ny < 0.56 ? 0 : 1;
      picked = (row * 2) + col + 1;
    }
    const choice = Math.max(1, Math.min(4, Math.trunc(picked)));
    setFocusQuestionSilently(q);
    chooseByKeyboard(choice);
  }

  // ====== 채점 ======
  function gradeQuestion(q){
    const card = getCard(q);
    if (!card) return;
    const chosen = normalizeChoiceValue(state.answers[q]);
    const correct = getCorrectAnswer(q);
    const mark = card.querySelector('[data-role="mark"]');

    mark.classList.remove("ok","bad","lock","blank");

    if (isLocked(q)){
      mark.textContent = "잠금";
      mark.classList.add("lock");
      return;
    }

    if (chosen == null){
      mark.textContent = "미응답";
      mark.classList.add("blank");
      return;
    }
    if (!Number.isFinite(correct)){
      mark.textContent = "정답미확정";
      return;
    }
    if (chosen === correct){
      mark.textContent = "정답";
      mark.classList.add("ok");
    } else {
      mark.textContent = "오답";
      mark.classList.add("bad");
    }

    for (const el of card.querySelectorAll(".choice")){
      el.classList.remove("wrong");
      const c = Number(el.dataset.c);
      if (showCorrectEl.checked && Number.isFinite(correct) && c === correct){
        el.classList.add("correct");
      } else {
        el.classList.remove("correct");
      }
      if (chosen === c){
        if (chosen !== correct) el.classList.add("wrong");
      }
    }
  }

  function gradeAll(forceShowMarks){
    if (forceShowMarks) {
      for(let q=1;q<=100;q++) gradeQuestion(q);
      updateStats();
      applyFilter();
      if (state.viewMode === "single" || state.viewMode === "all") navigatePdfToQuestion(state.focusQ || 1);
      return;
    }
    if (autoGradeEl.checked){
      for(let q=1;q<=100;q++) gradeQuestion(q);
      updateStats();
      applyFilter();
      if (state.viewMode === "single" || state.viewMode === "all") navigatePdfToQuestion(state.focusQ || 1);
    }
  }

  // ====== 리셋 ======
  function resetAll(){
    state.answers = Array(101).fill(null);
    modeHint.textContent = "모드: 일반";

    for(let q=1; q<=100; q++){
      const card = getCard(q);
      card.querySelectorAll("input[type=radio]").forEach(r => r.checked = false);

      const mark = card.querySelector('[data-role="mark"]');
      mark.textContent = "미채점";
      mark.classList.remove("ok","bad","lock","blank");

      card.querySelectorAll(".choice").forEach(el => {
        el.classList.remove("selected","correct","wrong","disabled");
      });
    }

    localStorage.removeItem(STORAGE_KEY);
    saveHint.textContent = "저장 상태: 초기화됨";

    noteArea.value = "";
    copyHint.textContent = "";

    refreshAllCards();
    updateStats();
    applyFilter();
    focusCard(1, true);
  }

  // ====== 카드 업데이트 ======
  function refreshCard(q){
    const card = getCard(q);
    if (!card) return;
    const chosen = normalizeChoiceValue(state.answers[q]);
    const correct = getCorrectAnswer(q);
    card.classList.toggle("bookmarked", !!state.bookmarks[q]);

    card.querySelectorAll(".choice").forEach(el => {
      const c = Number(el.dataset.c);
      el.classList.toggle("selected", chosen === c);

      if (showCorrectEl.checked && Number.isFinite(correct) && c === correct) el.classList.add("correct");
      else {
        if (!autoGradeEl.checked) el.classList.remove("correct","wrong");
        else {
          if (!showCorrectEl.checked && Number.isFinite(correct) && c === correct) el.classList.remove("correct");
        }
      }
    });

    if (!autoGradeEl.checked){
      const mark = card.querySelector('[data-role="mark"]');
      mark.classList.remove("ok","bad","lock","blank");
      if (isLocked(q)){
        mark.textContent = "잠금";
        mark.classList.add("lock");
      } else {
        mark.textContent = chosen == null ? "미응답" : "미채점";
        if (chosen == null) mark.classList.add("blank");
      }
    } else {
      gradeQuestion(q);
    }
  }

  function refreshAllCards(){
    for(let q=1; q<=100; q++) refreshCard(q);
    updateBookmarkUi(state.focusQ || 1);
  }

  function clearMarksOnly(){
    for(let q=1; q<=100; q++){
      const card = getCard(q);
      const mark = card.querySelector('[data-role="mark"]');
      mark.classList.remove("ok","bad","lock","blank");

      if (isLocked(q)){
        mark.textContent = "잠금";
        mark.classList.add("lock");
      } else {
        const chosen = normalizeChoiceValue(state.answers[q]);
        mark.textContent = chosen == null ? "미응답" : "미채점";
        if (chosen == null) mark.classList.add("blank");
      }

      card.querySelectorAll(".choice").forEach(el => {
        el.classList.remove("wrong");
        const c = Number(el.dataset.c);
        const correct = getCorrectAnswer(q);
        if (showCorrectEl.checked && Number.isFinite(correct) && c === correct) el.classList.add("correct");
        else el.classList.remove("correct");
      });
    }
    if (state.viewMode === "single" || state.viewMode === "all") navigatePdfToQuestion(state.focusQ || 1);
  }

  // ====== 통계(전체 + 섹션) ======
  function updateStats(){
    let blanks = 0, correct = 0, knownTotal = 0;

    const s = [
      {from:1,to:25, ok:0, total:0},
      {from:26,to:50, ok:0, total:0},
      {from:51,to:75, ok:0, total:0},
      {from:76,to:100, ok:0, total:0},
    ];

    for(let q=1; q<=100; q++){
      const corr = getCorrectAnswer(q);
      if (Number.isFinite(corr)) {
        knownTotal++;
        for (const sec of s){
          if (q>=sec.from && q<=sec.to){
            sec.total++;
            break;
          }
        }
      }
      const a = normalizeChoiceValue(state.answers[q]);
      if (a == null) { blanks++; continue; }
      if (Number.isFinite(corr) && a === corr) correct++;

      for (const sec of s){
        if (q>=sec.from && q<=sec.to){
          if (Number.isFinite(corr) && a === corr) sec.ok++;
          break;
        }
      }
    }

    scoreEl.textContent = `${correct} / ${knownTotal}`;
    correctEl.textContent = String(correct);
    blankEl.textContent = String(blanks);

    sec1.textContent = `${s[0].ok} / ${s[0].total}`;
    sec2.textContent = `${s[1].ok} / ${s[1].total}`;
    sec3.textContent = `${s[2].ok} / ${s[2].total}`;
    sec4.textContent = `${s[3].ok} / ${s[3].total}`;
  }

  // ====== 오답노트 ======
  function makeWrongNote(){
    const wrong = [];
    const blank = [];
    const unknown = [];

    // 섹션별 오답/미응답 집계 (1~25, 26~50, 51~75, 76~100)
    const sections = [
      {name:"1~25", from:1, to:25, wrong:0, blank:0},
      {name:"26~50", from:26, to:50, wrong:0, blank:0},
      {name:"51~75", from:51, to:75, wrong:0, blank:0},
      {name:"76~100", from:76, to:100, wrong:0, blank:0},
    ];

    for(let q=1; q<=100; q++){
      const a = normalizeChoiceValue(state.answers[q]);
      const correct = getCorrectAnswer(q);

      const sec = sections.find(s => q>=s.from && q<=s.to);

      if (a == null){
        blank.push(q);
        if (sec) sec.blank++;
        continue;
      }
      if (!Number.isFinite(correct)){
        unknown.push(q);
        continue;
      }
      if (a !== correct){
        wrong.push({q, mine:a, ans:correct});
        if (sec) sec.wrong++;
      }
    }

    const lines = [];
    const now = new Date();
    lines.push(`# 오답노트`);
    lines.push(`- 생성: ${now.getFullYear()}-${pad2(now.getMonth()+1)}-${pad2(now.getDate())} ${pad2(now.getHours())}:${pad2(now.getMinutes())}`);
    lines.push(`- 총 오답: ${wrong.length} / 미응답: ${blank.length} / 정답미확정: ${unknown.length}`);
    lines.push(`- 섹션별 오답/미응답: ` + sections.map(s => `${s.name} (오답 ${s.wrong}, 미응답 ${s.blank})`).join(" | "));
    lines.push("");
    lines.push("## 오답");
    if (wrong.length === 0) lines.push("- (없음)");
    else for (const w of wrong) lines.push(`- ${w.q}번: 내답 ${w.mine} / 정답 ${w.ans}`);
    lines.push("");
    lines.push("## 미응답");
    if (blank.length === 0) lines.push("- (없음)");
    else lines.push(`- ${blank.join(", ")}`);
    lines.push("");
    lines.push("## 정답미확정");
    if (unknown.length === 0) lines.push("- (없음)");
    else lines.push(`- ${unknown.join(", ")}`);

    noteArea.value = lines.join("\n");
    copyHint.textContent = "오답노트 생성 완료";
  }

  async function copyWrongNote(){
    const text = noteArea.value.trim();
    if (!text){ copyHint.textContent = "복사할 내용이 없습니다."; return; }
    try{
      await navigator.clipboard.writeText(text);
      copyHint.textContent = "복사 완료!";
    }catch(e){
      noteArea.focus();
      noteArea.select();
      const ok = document.execCommand("copy");
      copyHint.textContent = ok ? "복사 완료!" : "복사 실패(브라우저 권한 확인)";
    }
  }

  function getCard(q){
    return grid.querySelector(`.qcard[data-q="${q}"]`);
  }
