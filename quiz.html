<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>문제풀이 + 정답확인 (오답노트/단축키)</title>
  <style>
    :root{
      --header-h:58px;
      --bg-start:#f2f5fb; --bg:#e9eef7; --panel:#ffffff; --card:#f8faff; --text:#1e2633; --muted:#5c667a;
      --ok:#1f9f62; --bad:#d9365a; --line:rgba(24,38,61,.14); --btn:#dfe8ff; --btn2:#e9eef9; --warn:#f2b63b;
      --header-bg:rgba(233,238,247,.86); --viewer-bg:#eef3fb; --chip-bg:rgba(255,255,255,.75); --ghost-bg:rgba(255,255,255,.65);
      --stat-bg:rgba(248,250,255,.9); --sub-bg:rgba(245,248,255,.85); --choice-bg:rgba(255,255,255,.9); --note-bg:rgba(245,248,255,.88);
      --textarea-bg:#ffffff;
    }
    body.theme-dark{
      --bg-start:#070b16; --bg:#0b1020; --panel:#111a33; --card:#0f1730; --text:#e7ecff; --muted:#a9b4df;
      --ok:#27d17f; --bad:#ff4d6d; --line:rgba(255,255,255,.12); --btn:#22305a; --btn2:#1a2446; --warn:#ffbf3c;
      --header-bg:rgba(11,16,32,.9); --viewer-bg:#0a0f22; --chip-bg:rgba(15,23,48,.6); --ghost-bg:rgba(10,15,34,.35);
      --stat-bg:rgba(15,23,48,.7); --sub-bg:rgba(15,23,48,.55); --choice-bg:rgba(10,15,34,.55); --note-bg:rgba(15,23,48,.55);
      --textarea-bg:rgba(10,15,34,.55);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
      background:linear-gradient(180deg,var(--bg-start), var(--bg)); color:var(--text);
    }
    header{
      padding:14px 16px; border-bottom:1px solid var(--line);
      display:flex; gap:12px; align-items:center; justify-content:space-between;
      position:sticky; top:0; background:var(--header-bg); backdrop-filter:blur(10px); z-index:10;
    }
    header .left{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      padding-right:80px;
      min-width:0;
    }
    header .controls #btnTheme{
      position:absolute;
      top:10px;
      right:12px;
      z-index:12;
      margin:0;
    }
    header .controls #btnOrientation{
      position:absolute;
      top:10px;
      right:46px;
      z-index:12;
      margin:0;
    }
    header h1{
      font-size:16px;
      margin:0;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
      max-width:100%;
    }
    .pill{font-size:12px; padding:6px 10px; border:1px solid var(--line); border-radius:999px; color:var(--muted)}
    .wrap{display:grid; grid-template-columns: 1.25fr .75fr; gap:12px; padding:12px; min-height:calc(100dvh - var(--header-h))}
    .panel{
      background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      display:flex;
      flex-direction:column;
    }
    .panel .title{
      padding:10px 12px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;
      gap:10px; flex-wrap:wrap;
    }
    .pdfTitleBar{
      padding-left:0;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      gap:8px;
    }
    .pdfTitleBar > .currentQInfo{
      margin-left:0;
      border-top-left-radius:0;
      border-bottom-left-radius:0;
    }
    .pdfControlRow{
      display:flex;
      align-items:center;
      gap:10px;
      width:100%;
    }
    .pdfLeadGroup{
      display:flex;
      align-items:center;
      gap:6px;
      min-width:0;
    }
    .pdfControlRow > .controls{
      margin-left:auto;
      justify-content:flex-end;
    }
    .panel .title > .controls{
      margin-left:auto;
      justify-content:flex-end;
    }
    .panel .title > .controls .modeBtn{
      margin-left:auto;
    }
    .pdfTitleMeta{
      display:flex;
      align-items:center;
      flex-wrap:wrap;
      gap:6px;
      min-width:0;
    }
    .panel .title strong{font-size:13px}
    .panel .title .mini{font-size:12px; color:var(--muted)}
    .currentQInfo{
      display:inline-flex;
      align-items:center;
      margin-left:0;
      padding:4px 10px;
      border:1px solid rgba(10,102,214,.45);
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      color:#0a66d6;
      background:rgba(10,102,214,.12);
      box-shadow:0 0 0 1px rgba(10,102,214,.08) inset;
    }
    body.theme-dark .currentQInfo{
      color:#79b6ff;
      border-color:rgba(121,182,255,.55);
      background:rgba(121,182,255,.16);
    }
    .answerKeyInfo{
      display:inline-flex;
      align-items:center;
      margin-left:0;
      padding:2px 8px;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:11px;
      font-weight:700;
      color:var(--muted);
      background:var(--chip-bg);
    }
    .answerKeyInfo.ready{
      color:#1a8f57;
      border-color:rgba(26,143,87,.45);
      background:rgba(26,143,87,.12);
    }
    .answerKeyInfo.fallback{
      color:#9a6a08;
      border-color:rgba(154,106,8,.45);
      background:rgba(242,182,59,.14);
    }
    .modeStateInfo{
      font-weight:800;
      transition:background .15s ease, color .15s ease, border-color .15s ease;
    }
    .modeStateInfo.mode-all{
      color:#42536f;
      border-color:rgba(66,83,111,.3);
      background:rgba(66,83,111,.08);
    }
    .modeStateInfo.mode-single{
      color:#0a66d6;
      border-color:rgba(10,102,214,.45);
      background:rgba(10,102,214,.14);
    }
    body.theme-dark .modeStateInfo.mode-all{
      color:#c2cbe6;
      border-color:rgba(194,203,230,.35);
      background:rgba(194,203,230,.14);
    }
    body.theme-dark .modeStateInfo.mode-single{
      color:#8bc0ff;
      border-color:rgba(139,192,255,.5);
      background:rgba(139,192,255,.18);
    }
    .viewer{
      height:auto;
      flex:1;
      min-height:0;
      background:var(--viewer-bg);
      overflow:auto;
      padding:10px 0;
      position:relative;
    }
    #pdfCanvas{
      display:block;
      width:100%;
      height:auto;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
    }
    #pdfAllPages{
      display:none;
    }
    #pdfAllPages .pdfPageCanvas{
      display:block;
      width:100%;
      height:auto;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      margin-bottom:10px;
    }
    .viewer:not(.single) #pdfAllPages{
      display:block;
    }
    .viewer:not(.single) #pdfCanvas{
      display:none;
    }
    .viewer.single #pdfCanvas{cursor:pointer}
    .viewerTopBadge{
      position:fixed !important;
      right:12px;
      bottom:14px;
      z-index:60;
      display:none;
      align-items:center;
      justify-content:center;
      min-width:48px;
      height:28px;
      padding:0 8px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.9);
      color:var(--text);
      font-size:10px;
      font-weight:800;
      box-shadow:0 4px 14px rgba(0,0,0,.14);
      cursor:pointer;
      white-space:nowrap;
      pointer-events:auto;
    }
    .viewerTopBadge.show{display:inline-flex}
    .viewerTopBadge.disabled{
      opacity:.45;
      filter:saturate(.7);
    }
    body.theme-dark .viewerTopBadge{
      background:rgba(24,33,60,.9);
    }
    .pdfStatus{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }
    .pdfLoadingOverlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:5;
      background:rgba(255,255,255,.45);
      backdrop-filter:blur(2px);
      -webkit-backdrop-filter:blur(2px);
    }
    body.theme-dark .pdfLoadingOverlay{
      background:rgba(10,15,34,.45);
    }
    .pdfLoadingOverlay.show{display:flex}
    .pdfLoadingCard{
      min-width:180px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel);
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      display:flex;
      align-items:center;
      gap:10px;
    }
    .pdfSpinner{
      width:20px;
      height:20px;
      border-radius:50%;
      border:3px solid rgba(120,140,180,.25);
      border-top-color:#0a66d6;
      animation:spin .85s linear infinite;
      flex:0 0 auto;
    }
    .pdfLoadingText{
      font-size:12px;
      font-weight:700;
      color:var(--text);
      white-space:nowrap;
    }
    @keyframes spin{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }
    .pdfStatus button{
      margin-left:8px;
      padding:4px 8px;
      font-size:11px;
    }
    .viewerNav{
      position:absolute;
      bottom:12px;
      width:52px;
      height:120px;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(255,255,255,.7);
      color:var(--text);
      font-size:20px;
      font-weight:800;
      display:none;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      z-index:3;
    }
    .viewerNav.left{left:6px}
    .viewerNav.right{right:6px}
    .viewer.single .viewerNav{display:flex}
    .viewer.single{
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }
    .bookmarkBtn{
      width:42px;
      height:42px;
      border:1px solid rgba(241,166,32,.5);
      border-radius:10px;
      background:rgba(255,255,255,.78);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:4;
      padding:0;
    }
    .viewer.single .bookmarkBtn{
      position:absolute;
      right:10px;
      top:10px;
    }
    .viewer:not(.single) .bookmarkBtn{
      position:sticky;
      top:10px;
      left:calc(100% - 52px);
    }
    .bookmarkBtn svg{
      width:22px;
      height:22px;
      stroke:#f1a620;
      stroke-width:2.1;
      fill:none;
    }
    .bookmarkBtn.active svg{fill:#f1a620}
    .controls{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
    .iconBtn{
      width:34px;
      height:34px;
      padding:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      font-weight:800;
    }
    .themeIcon{
      font-size:16px;
      line-height:1;
    }
    #btnTheme{
      width:30px;
      height:30px;
      font-size:12px;
      padding:0 !important;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }
    #btnOrientation{
      width:30px;
      height:30px;
      font-size:13px;
      padding:0 !important;
      display:none;
      align-items:center;
      justify-content:center;
      line-height:1;
      font-weight:800;
    }
    #btnTheme .themeIcon{
      font-size:14px;
      display:inline-block;
      line-height:1;
      margin:0;
    }
    button{
      background:var(--btn); color:var(--text); border:1px solid var(--line);
      padding:8px 10px; border-radius:10px; cursor:pointer; font-weight:600; font-size:12px;
    }
    button.secondary{background:var(--btn2)}
    button.ghost{background:var(--ghost-bg)}
    button.danger{background:rgba(255,77,109,.12); border-color:rgba(255,77,109,.35)}
    button.warn{background:rgba(255,191,60,.12); border-color:rgba(255,191,60,.35)}
    button:hover{filter:brightness(1.08)}
    button.active{outline:2px solid rgba(169,180,223,.6)}
    .modeBtn{
      font-size:14px;
      font-weight:800;
      padding:8px 12px;
      letter-spacing:-0.01em;
    }
    label.toggle{
      display:flex; gap:8px; align-items:center; font-size:12px; color:var(--muted);
      padding:6px 10px; border:1px solid var(--line); border-radius:999px;
      background:var(--chip-bg);
    }
    input[type="checkbox"]{transform:scale(1.05)}
    .sheet{
      padding:10px 10px 14px;
      height:auto;
      flex:1;
      min-height:0;
      overflow:auto;
    }

    @media (min-width: 769px){
      body{height:100dvh; overflow:hidden}
      .wrap{
        height:calc(100dvh - var(--header-h));
        min-height:0;
      }
      .panel{min-height:0}
    }

    .stats{display:grid; grid-template-columns: repeat(3,1fr); gap:8px; margin-bottom:10px;}
    .stat{background:var(--stat-bg); border:1px solid var(--line); border-radius:12px; padding:10px;}
    .stat .k{font-size:12px; color:var(--muted)}
    .stat .v{font-size:18px; font-weight:800; margin-top:4px}

    .subStats{display:grid; grid-template-columns: repeat(4,1fr); gap:8px; margin:10px 0 10px;}
    .sub{background:var(--sub-bg); border:1px solid var(--line); border-radius:12px; padding:10px;}
    .sub .k{font-size:12px; color:var(--muted)}
    .sub .v{font-size:14px; font-weight:800; margin-top:4px}

    .filterBar{display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 10px;}
    body.info-collapsed .sheet .stats,
    body.info-collapsed .sheet .subStats{
      display:none;
    }

    .grid{display:grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap:8px;}
    .qcard{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 8px 6px;
    }
    .qcard.hidden{display:none}
    .qcard.focus{outline:2px solid rgba(169,180,223,.75)}
    .qcard.locked{opacity:.72}
    .qhead{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px;}
    .qnum{font-weight:800; font-size:12px}
    .qmeta{display:flex; align-items:center; gap:4px}
    .qbm{
      display:none;
      width:16px;
      height:16px;
      border-radius:6px;
      font-size:11px;
      line-height:1;
      align-items:center;
      justify-content:center;
      color:#fff;
      background:#f1a620;
    }
    .qcard.bookmarked .qbm{display:flex}
    .mark{
      font-size:11px; font-weight:800;
      padding:2px 6px; border-radius:999px;
      border:1px solid var(--line); color:var(--muted);
      user-select:none;
    }
    .mark.ok{color:var(--ok); border-color:rgba(39,209,127,.5); background:rgba(39,209,127,.08)}
    .mark.bad{color:var(--bad); border-color:rgba(255,77,109,.5); background:rgba(255,77,109,.08)}
    .mark.lock{color:var(--warn); border-color:rgba(255,191,60,.45); background:rgba(255,191,60,.08)}
    .mark.blank{
      font-size:0;
      line-height:1;
      min-width:24px;
      text-align:center;
      padding:2px 4px;
      border-color:rgba(120,140,180,.35);
      background:rgba(120,140,180,.08);
    }
    .mark.blank::before{
      content:"●";
      font-size:10px;
      color:#6c7a99;
      font-weight:800;
    }
    .choices{display:grid; grid-template-columns: repeat(4, 1fr); gap:6px;}
    .choice{
      display:flex; align-items:center; justify-content:center;
      border:1px solid var(--line); border-radius:10px;
      padding:6px 0; font-size:12px; color:var(--text);
      background:var(--choice-bg);
      cursor:pointer;
      user-select:none;
    }
    .choice input{display:none}
    .choice.selected{
      outline:2px solid rgba(10,102,214,.85);
      border-color:rgba(10,102,214,.72);
      background:rgba(10,102,214,.16);
      box-shadow:0 0 0 1px rgba(10,102,214,.2) inset, 0 1px 4px rgba(10,102,214,.22);
      font-weight:800;
    }
    .choice.correct{outline:2px solid rgba(39,209,127,.8)}
    .choice.wrong{outline:2px solid rgba(255,77,109,.85)}
    .choice.disabled{cursor:not-allowed; filter:grayscale(.2);}

    .footerNote{
      margin-top:10px; font-size:12px; color:var(--muted); line-height:1.45;
      border-top:1px solid var(--line); padding-top:10px;
    }
    .tiny{font-size:11px; color:var(--muted)}
    #saveHint,
    #modeHint{
      display:none !important;
    }

    .notePanel{
      margin-top:10px;
      background:var(--note-bg);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
    }
    .adWrap{
      margin-top:10px;
      min-height:100px;
      border:1px dashed var(--line);
      border-radius:12px;
      background:var(--note-bg);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:12px;
      padding:8px;
    }
    .mobileDock{
      display:none;
    }
    .landscapeDockMount{
      display:none;
    }
    .sheetOverlay{
      display:none;
    }
    .notePanel .head{
      display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;
      margin-bottom:8px;
    }
    textarea{
      width:100%;
      min-height:140px;
      resize:vertical;
      background:var(--textarea-bg);
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
      color:var(--text);
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      line-height:1.45;
    }

    @media (max-width: 1100px){
      .wrap{grid-template-columns:1fr}
      .viewer,.sheet{min-height:58vh}
      .grid{grid-template-columns: repeat(4, minmax(0,1fr));}
    }
    @media (max-width: 768px){
      header{
        position:static;
        padding:10px;
        align-items:flex-start;
        flex-direction:column;
      }
      header .left{width:100%; justify-content:space-between}
      header .left{
        padding-right:80px;
      }
      header h1{font-size:14px}
      .pill{font-size:11px; padding:4px 8px}
      .controls{
        width:100%;
        gap:6px;
      }
      header .controls{
        display:flex;
        flex-wrap:nowrap;
        align-items:center;
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
        scrollbar-width:none;
      }
      header .controls::-webkit-scrollbar{
        display:none;
      }
      button{
        padding:6px 8px;
        font-size:11px;
        white-space:nowrap;
        flex:0 0 auto;
      }
      #btnTheme{
        width:28px;
        height:28px;
      }
      #btnOrientation{
        width:28px;
        height:28px;
      }
      .toggle{
        justify-content:flex-start;
        padding:4px 8px;
        flex:0 0 auto;
        white-space:nowrap;
      }
      .wrap{
        padding:8px;
        gap:8px;
      }
      .panel{border-radius:10px}
      .panel .title{padding:8px 10px}
      .viewer{min-height:calc(100dvh - 210px); padding:6px 0}
      .viewer:not(.single) .bookmarkBtn{
        position:fixed;
        right:10px;
        bottom:96px;
        left:auto;
        top:auto;
      }
      .viewerNav{
        width:40px;
        height:84px;
        font-size:17px;
        border-radius:10px;
        bottom:10px;
      }
      .viewerNav.left{left:4px}
      .viewerNav.right{right:4px}
      .sheet{height:auto; max-height:none; padding:8px}
      .stats{grid-template-columns:repeat(2,1fr)}
      .subStats{grid-template-columns:repeat(2,1fr)}
      .grid{grid-template-columns: repeat(4, minmax(0,1fr)); gap:6px}
      .qcard{padding:6px 6px 5px}
      .qnum{font-size:10px}
      .choices{gap:4px}
      .choice{padding:5px 0; font-size:11px}
      .notePanel textarea{min-height:110px}
      .currentQInfo{
        min-width:42px;
        justify-content:center;
        white-space:nowrap;
        word-break:keep-all;
        line-height:1.05;
        padding:4px 8px;
      }

      .wrap{display:block}
      .wrap > section.panel{margin-bottom:8px}
      .wrap > aside.panel{display:none}

      .mobileDock{
        position:fixed;
        left:0; right:0; bottom:0;
        z-index:30;
        display:grid;
        grid-template-columns: repeat(9, minmax(0, 1fr));
        gap:4px;
        padding:8px;
        border-top:1px solid var(--line);
        background:var(--panel);
        backdrop-filter:blur(8px);
      }
      .mobileDock .qnow{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        min-width:42px;
        margin:0;
        padding:4px 8px;
        border-radius:999px;
      }
      .mobileDock button{
        padding:8px 4px;
        font-size:10px;
        min-width:0;
      }
      .mobileDock #mobileBookmark{
        width:36px;
        height:36px;
        border-radius:10px;
        padding:0;
        justify-self:center;
        align-self:center;
      }
      .mobileDock #mobileBookmark svg{
        width:18px;
        height:18px;
      }
      .mobileDock button.active{

  async function toggleMobileScreenOrientation(){
    if (!isMobileOrientationToggleTarget() || orientationToggleInFlight) return;
    orientationToggleInFlight = true;
    try{
      const isLandscapeNow = window.matchMedia("(orientation: landscape)").matches;
      const orientationApi = screen.orientation && typeof screen.orientation.lock === "function";
      if (isLandscapeNow) {
        orientationToggleLandscapeActive = false;
        try{
          if (orientationApi) {
            await screen.orientation.lock("portrait-primary").catch(async () => {
              await screen.orientation.lock("portrait");
            });
          } else if (screen.orientation && typeof screen.orientation.unlock === "function") {
            screen.orientation.unlock();
          }
        }catch(_){}
        if (isAppFullscreen()) {
          await exitAppFullscreen().catch(() => {});
        }
        await sleep(80);
        if (window.matchMedia("(orientation: landscape)").matches && screen.orientation && typeof screen.orientation.unlock === "function") {
          try { screen.orientation.unlock(); } catch(_){}
        }
        return;
      }
      orientationToggleLandscapeActive = false;
      allowAutoLandscapeFullscreen = true;
      landscapeFullscreenDismissed = false;
      if (!isAppFullscreen()) {
        await requestAppFullscreen().catch(() => {});
      }
      try{
        if (orientationApi) {
          await screen.orientation.lock("landscape-primary").catch(async () => {
            await screen.orientation.lock("landscape");
          });
        }
      }catch(_){}
      await sleep(120);
      const turnedLandscape = window.matchMedia("(orientation: landscape)").matches;
      orientationToggleLandscapeActive = turnedLandscape;
      if (!turnedLandscape && isAppFullscreen()) {
        // 회전 실패 시 다음 시도를 막지 않도록 풀스크린 상태를 정리한다.
        await exitAppFullscreen().catch(() => {});

      orientationToggleInFlight = false;
    }

  function saveUi(){

      localStorage.setItem(STORAGE_UI_KEY, JSON.stringify({

        pdfZoom: state.pdfZoom,

        infoExpanded: state.infoExpanded,

  function loadUi(){
    try{
      const raw = localStorage.getItem(STORAGE_UI_KEY);
      if(raw){
        const ui = JSON.parse(raw);
        if (typeof ui.autoGrade === "boolean") autoGradeEl.checked = ui.autoGrade;
        if (typeof ui.showCorrect === "boolean") showCorrectEl.checked = ui.showCorrect;
        if (ui.filter === "all" || ui.filter === "wrong" || ui.filter === "blank") state.filter = ui.filter;
        if (ui.theme === "basic" || ui.theme === "dark") state.theme = ui.theme;
        // 진입 기본 모드는 항상 전체문제 보기로 유지한다.
        state.viewMode = "all";
        const mobileSaved = Number(ui.pdfZoomMobile);
        const desktopSaved = Number(ui.pdfZoomDesktop);
        state.pdfZoomMobile = Number.isFinite(mobileSaved) ? Math.max(0.7, Math.min(1.8, mobileSaved)) : 1;
        state.pdfZoomDesktop = Number.isFinite(desktopSaved) ? Math.max(0.7, Math.min(1.8, desktopSaved)) : 1;
        if (isMobileViewport()) {
          if (Number.isFinite(mobileSaved)) {
            state.pdfZoom = state.pdfZoomMobile;
          } else if (Number.isFinite(Number(ui.pdfZoom))) {
            // 구버전 공용 저장값은 모바일에서만 1회 이관
            state.pdfZoom = Math.max(0.7, Math.min(1.8, Number(ui.pdfZoom)));
            state.pdfZoomMobile = state.pdfZoom;
          } else {
            state.pdfZoom = 1;
          }
        } else {
          // 비모바일은 공용 저장값을 무시하고 데스크톱 전용값(기본 1) 사용
          state.pdfZoom = state.pdfZoomDesktop;
        }
        if (typeof ui.infoExpanded === "boolean") state.infoExpanded = ui.infoExpanded;
        if (ui.pdfNav && typeof ui.pdfNav === "object") {
          const start = Number(ui.pdfNav.startPage);
          const qpp = Number(ui.pdfNav.questionsPerPage);
          state.pdfNav.enabled = ui.pdfNav.enabled !== false;
          state.pdfNav.startPage = Number.isFinite(start) && start >= 1 ? Math.floor(start) : 1;
          state.pdfNav.questionsPerPage = Number.isFinite(qpp) && qpp >= 1 ? Math.floor(qpp) : 1;
          state.pdfNav.mode = ui.pdfNav.mode === "auto" ? "auto" : "basic";
          state.pdfNav.source = typeof ui.pdfNav.source === "string" ? ui.pdfNav.source : null;
          state.pdfNav.questionPageMap = Array.isArray(ui.pdfNav.questionPageMap) ? ui.pdfNav.questionPageMap.slice(0, 101) : null;
          state.pdfNav.questionTopRatioMap = Array.isArray(ui.pdfNav.questionTopRatioMap) ? ui.pdfNav.questionTopRatioMap.slice(0, 101) : null;
          state.pdfNav.version = Number(ui.pdfNav.version) || 1;

          const currentSource = getCurrentPdfSourceKey();
          const isCurrentSource = state.pdfNav.source === currentSource;
          const isCurrentVersion = state.pdfNav.version === PDF_MAP_VERSION;
          if (!isCurrentSource || !isCurrentVersion) {
            state.pdfNav.mode = "basic";
            state.pdfNav.questionPageMap = null;
            state.pdfNav.questionTopRatioMap = null;
            state.pdfNav.source = null;
            state.pdfNav.version = PDF_MAP_VERSION;
          }
        }
      }
      fAll.classList.toggle("active", state.filter==="all");
      fWrong.classList.toggle("active", state.filter==="wrong");
      fBlank.classList.toggle("active", state.filter==="blank");
    }catch(_){}
    applyTheme();
    updateViewModeUi();
    updateZoomButtons();
    applyInfoPanelState();
    updatePdfInfo();
    updateAnswerKeyInfo();
  }

  function updateFontButtonLabels(){

  function getDefaultPdfZoomForViewport(){

  function getPdfOutputScale(){
    const dpr = Math.max(1, Number(window.devicePixelRatio) || 1);
    const portraitMobile = window.matchMedia("(max-width: 768px) and (orientation: portrait)").matches;
    if (portraitMobile) {
      return Math.min(4, dpr * 1.45);
    }
    return Math.min(2.6, dpr * 1.25);

  function enforceMobileReadingMode(){
    if (!isMobileViewport()) {
      const desktopZoom = Math.max(0.7, Math.min(1.8, Number(state.pdfZoomDesktop) || 1));
      if (Math.abs((state.pdfZoom || 0) - desktopZoom) > 0.001) {
        state.pdfZoom = desktopZoom;
        state.allPagesRenderKey = null;
        state.allPageCanvases = [];
        updateViewModeUi();
        updateZoomButtons();
        saveUi();
      }
      return;
    }
    const minZoom = getDefaultPdfZoomForViewport();
    let changed = false;
    if (state.pdfZoom < minZoom) {
      state.pdfZoom = minZoom;
      changed = true;
    }
    if (changed) {
      state.pdfZoomMobile = state.pdfZoom;
      state.allPagesRenderKey = null;
      state.allPageCanvases = [];
      updateViewModeUi();
      updateZoomButtons();
      saveUi();
    }

  async function loadAnswerKeyFromJson(){
    state.answerKeyStatus = "loading";
    state.answerKeySource = "json";
    updateAnswerKeyInfo();

    try{
      const rawPdfPath = String(ANSWER_PDF_URL || "").split("#")[0].split("?")[0].trim();
      const decodedPdfPath = (() => {
        try { return decodeURIComponent(rawPdfPath); } catch(_) { return rawPdfPath; }
      })();
      const normalizedPdfPath = decodedPdfPath.replace(/^\.\//, "").replace(/^quiz\//, "");
      if (!normalizedPdfPath || !/\.pdf$/i.test(normalizedPdfPath)) {
        state.answerKeyDynamic = null;
        state.answerKeyStatus = "unavailable";
        return false;
      }
      const jsonRelPath = normalizedPdfPath.replace(/\.pdf$/i, ".json");
      const candidates = [];
      for (const raw of [jsonRelPath, jsonRelPath.normalize("NFC"), jsonRelPath.normalize("NFD")]){
        const rel = raw.replace(/^\.\//, "");
        const encoded = `./${encodeURI(rel)}`;
        const plain = `./${rel}`;
        if (!candidates.includes(encoded)) candidates.push(encoded);
        if (!candidates.includes(plain)) candidates.push(plain);
      }
      let res = null;
      for (const c of candidates){
        try{
          const r = await fetch(c, { cache: "no-store" });
          if (r.ok) { res = r; break; }
        }catch(_){}
      }
      if (!res) {
        state.answerKeyDynamic = null;
        state.answerKeyStatus = "unavailable";
        return false;
      }
      const data = await res.json();
      const source = Array.isArray(data?.answers) ? data.answers : (Array.isArray(data?.answerKey) ? data.answerKey : null);
      if (!Array.isArray(source)) {
        state.answerKeyDynamic = null;
        state.answerKeyStatus = "unavailable";
        return false;
      }
      const dyn = Array(101).fill(null);
      const isOneBased = source.length >= 101;
      for (let q = 1; q <= 100; q++){
        const raw = isOneBased ? source[q] : source[q - 1];
        const num = Number(raw);
        if (Number.isFinite(num) && num >= 1 && num <= 5) dyn[q] = num;
      }
      const count = dyn.filter((v, i) => i > 0 && Number.isFinite(v)).length;
      state.answerKeyDynamic = dyn;
      state.answerKeyStatus = count >= 100 ? "ready" : (count > 0 ? "partial" : "unavailable");
      return count > 0;
    }catch(_){
      state.answerKeyDynamic = null;
      state.answerKeyStatus = "unavailable";
      return false;
    } finally {
      updateAnswerKeyInfo();
      refreshAllCards();
      updateStats();
      applyFilter();
    }
  }

  function getSingleCropOverrideForExam(examName){
    const exact = SINGLE_CROP_OVERRIDES[examName];
    if (exact) return exact;

    const normalizedExam = normalizeExamKey(examName);
    for (const key of Object.keys(SINGLE_CROP_OVERRIDES)){

  function getSingleCropOverrideByPdfUrl(){
    const raw = String(QUESTION_PDF_URL || "");
    const normalized = raw.normalize("NFC");
    const decoded = tryDecodeURIComponent(raw).normalize("NFC");
    const base = raw.split("/").pop() || raw;
    const decodedBase = decoded.split("/").pop() || decoded;
    for (const item of SINGLE_CROP_OVERRIDES_BY_PDF){
      if (!item || !item.match || !item.ranges) continue;
      if (
        item.match.test(raw)
        || item.match.test(normalized)
        || item.match.test(decoded)
        || item.match.test(base)
        || item.match.test(decodedBase)
      ) return item.ranges;
    }
    return null;
  }

  function normalizePdfPathInput(path) {
    const raw = String(path || "").trim().replace(/^["']|["']$/g, "");
    if (!raw) return "";
    return raw.replace(/^\.\//, "");

  function tryDecodeURIComponent(raw){
    try { return decodeURIComponent(raw); } catch(_) { return raw; }

  async function loadQuestionManifest(){
    if (questionManifestPromise) return questionManifestPromise;
    questionManifestPromise = fetch("./json/question.json", { cache: "no-store" })

  async function findPdfPathFromManifest(kind){
    const list = await loadQuestionManifest();
    if (!Array.isArray(list) || list.length === 0) return "";
    const byNo = QUESTION_NO
      ? list.find((row) => String(row?.questionNo || "") === String(QUESTION_NO))
      : null;
    const normalizedExam = normalizeExamKey(EXAM_NAME);
    const fallback = byNo || list.find((row) =>
      normalizeExamKey(row?.questionNm || "") === normalizedExam &&
      String(row?.catNm || "").trim() === String(CATEGORY_NAME || "").trim()
    );
    if (!fallback) return "";
    const value = kind === "answer" ? fallback.answerPdf : fallback.questionPdf;
    return normalizePdfPathInput(value);
  }

  async function resolveExistingPdfUrl(pathValue, kind){
    const baseRaw = normalizePdfPathInput(String(pathValue || "").split("#")[0].split("?")[0]);
    const decodedRaw = tryDecodeURIComponent(baseRaw);
    const decodedTwice = tryDecodeURIComponent(decodedRaw);
    const candidates = [];
    const pushCandidate = (raw) => {
      const safe = String(raw || "").trim();
      if (!safe) return;
      const encoded = encodeURI(safe);
      if (!candidates.includes(encoded)) candidates.push(encoded);
      if (!candidates.includes(safe)) candidates.push(safe);
    };
    for (const raw of [
      baseRaw,
      decodedRaw,
      decodedTwice,
      decodedRaw.normalize("NFC"),
      decodedRaw.normalize("NFD"),
      decodedTwice.normalize("NFC"),
      decodedTwice.normalize("NFD"),
      baseRaw.normalize("NFC"),
      baseRaw.normalize("NFD")
    ]) pushCandidate(raw);

    for (const c of candidates){
      try{
        const res = await fetch(c, { method: "HEAD", cache: "no-store" });
        if (res.ok) return c;
      }catch(_){}
    }
    for (const c of candidates){
      try{
        const res = await fetch(c, { cache: "no-store" });
        if (res.ok) return c;
      }catch(_){}
    }
    const manifestPath = await findPdfPathFromManifest(kind || "question");
    if (manifestPath) {
      const manifestCandidates = [
        manifestPath,
        manifestPath.normalize("NFC"),
        manifestPath.normalize("NFD"),
        encodeURI(manifestPath),
        encodeURI(manifestPath.normalize("NFC")),
        encodeURI(manifestPath.normalize("NFD"))
      ];
      for (const c of manifestCandidates){
        try{
          const res = await fetch(c, { cache: "no-store" });
          if (res.ok) return c;
        }catch(_){}
      }
      if (manifestCandidates[0]) return manifestCandidates[0];
    }
    return candidates[0] || baseRaw;
  }

  function getPdfPageByQuestion(q){
    const nav = state.pdfNav;
    if (nav.mode === "auto" && Array.isArray(nav.questionPageMap) && Number.isFinite(nav.questionPageMap[q])) {
      return Math.max(1, Math.floor(nav.questionPageMap[q]));
    }
    // 자동 매핑 전 임시 기본값: PDF 총 페이지 수를 기준으로 균등 분배
    if (state.pdfDoc && Number.isFinite(state.pdfDoc.numPages) && state.pdfDoc.numPages > 0) {
      const qPerPage = 100 / state.pdfDoc.numPages;
      const page = 1 + Math.floor((q - 1) / Math.max(1, qPerPage));
      return Math.min(state.pdfDoc.numPages, Math.max(1, page));
    }
    return 1;
  }

  function buildMapFromAnchors(anchorList){
    const pageMap = Array(101).fill(1);
    const ratioMap = Array(101).fill(0.12);
    if (!Array.isArray(anchorList) || anchorList.length === 0) {
      return { pageMap, ratioMap };
    }

    for (let i = 0; i < anchorList.length; i++){
      const pageNo = i + 1;
      const startQ = anchorList[i];
      const nextStart = anchorList[i + 1] || 101;
      const endQ = Math.min(100, nextStart - 1);
      const count = Math.max(1, endQ - startQ + 1);

      for (let q = startQ; q <= endQ; q++){
        pageMap[q] = pageNo;
        const idx = q - startQ;
        ratioMap[q] = Math.max(0.08, Math.min(0.9, 0.12 + (idx / count) * 0.74));
      }
    }

    for (let q = 2; q <= 100; q++){
      pageMap[q] = Math.max(pageMap[q], pageMap[q - 1]);
    }
    return { pageMap, ratioMap };
  }

  function normalizeChoiceToken(token){
    const t = String(token || "").trim();
    if (!t) return null;
    const map = { "①":"1", "②":"2", "③":"3", "④":"4", "⑤":"5" };
    const mapped = map[t] || t;
    if (!/^[1-5]$/.test(mapped)) return null;

  function parseAnswerPairsFromRawText(raw){
    const out = [];
    if (!raw) return out;
    const normalized = String(raw)
      .replace(/[①②③④⑤]/g, (m) => ({ "①":"1","②":"2","③":"3","④":"4","⑤":"5" }[m] || m));
    const lines = normalized.split(/\r?\n/);

    const patterns = [
      /(?:^|\s)(\d{1,3})\s*(?:번|[.])\s*([1-5])(?=\s|$)/g,   // "12. 3" / "12번 3"
      /(?:^|\s)(\d{1,3})\s*[:：]\s*([1-5])(?=\s|$)/g          // "12:3"
    ];

    for (const line of lines){
      const t = line.replace(/\s+/g, " ").trim();
      if (!t) continue;
      if (/page\s*\(/i.test(t)) continue;
      for (const re of patterns){
        let m;
        re.lastIndex = 0;
        while ((m = re.exec(t)) !== null){
          const q = Number(m[1]);
          const a = Number(m[2]);
          if (!Number.isFinite(q) || !Number.isFinite(a)) continue;
          if (q < 1 || q > 100 || a < 1 || a > 5) continue;
          out.push([q, a]);
        }
      }

      // "1 3 2 2 3 3 ..." 형식(문항-정답 페어 연속 나열) 지원
      const nums = (t.match(/\d{1,3}/g) || []).map((v) => Number(v));
      if (nums.length >= 6 && nums.length % 2 === 0){
        let validPairs = 0;
        for (let i = 0; i < nums.length; i += 2){
          const q = nums[i];
          const a = nums[i + 1];
          if (!Number.isFinite(q) || !Number.isFinite(a)) continue;
          if (q < 1 || q > 100 || a < 1 || a > 5) continue;
          out.push([q, a]);
          validPairs++;
        }
        if (validPairs >= 3) continue;
      }
    }

    // 2행 테이블형(윗줄: 문항번호, 아랫줄: 정답번호) 지원
    for (let i = 0; i < lines.length - 1; i++){
      const top = (lines[i] || "").replace(/\s+/g, " ").trim();
      const bottom = (lines[i + 1] || "").replace(/\s+/g, " ").trim();
      if (!top || !bottom) continue;

      const qNums = (top.match(/\d{1,3}/g) || []).map((v) => Number(v)).filter((n) => n >= 1 && n <= 100);
      const aNums = (bottom.match(/[1-5]/g) || []).map((v) => Number(v)).filter((n) => n >= 1 && n <= 5);
      if (qNums.length < 5 || aNums.length < 5) continue;
      if (Math.abs(qNums.length - aNums.length) > 2) continue;

      const len = Math.min(qNums.length, aNums.length);
      for (let j = 0; j < len; j++){
        out.push([qNums[j], aNums[j]]);
      }
    }

    // 줄 경계가 깨진 경우를 위한 전체 텍스트 스캔
    const compact = normalized.replace(/\s+/g, " ");
    const broadPatterns = [
      /(?:^|\s)(\d{1,3})\s*(?:번|[.)]|-)\s*([1-5])(?=\s|$)/g, // "12) 3", "12-3"
      /(?:^|\s)(\d{1,3})\s*[:：]\s*([1-5])(?=\s|$)/g
    ];
    for (const re of broadPatterns){
      let m;
      re.lastIndex = 0;
      while ((m = re.exec(compact)) !== null){
        const q = Number(m[1]);
        const a = Number(m[2]);
        if (!Number.isFinite(q) || !Number.isFinite(a)) continue;
        if (q < 1 || q > 100 || a < 1 || a > 5) continue;
        out.push([q, a]);
      }
    }
    return out;
  }

  function parseAnswerPairsFromNumberStream(nums){
    const out = [];
    if (!Array.isArray(nums) || nums.length < 2) return out;

    let i = 0;
    let prevQ = 0;
    while (i < nums.length - 1){
      const q = Number(nums[i]);
      const a = Number(nums[i + 1]);
      if (Number.isFinite(q) && Number.isFinite(a) && q >= 1 && q <= 100 && a >= 1 && a <= 5){
        // 일반적으로 문항은 증가한다. 잡음 토큰(날짜 등)을 건너뛰기 위한 가드.
        if (q > prevQ || prevQ === 0){
          out.push([q, a]);
          prevQ = q;
          i += 2;
          continue;
        }
      }
      i += 1;
    }
    return out;
  }

  function buildLineLikeTextFromItems(items){
    const points = [];
    for (const it of (items || [])){
      const s = String(it?.str || "").trim();
      if (!s) continue;
      const tf = Array.isArray(it?.transform) ? it.transform : null;
      const x = tf && Number.isFinite(tf[4]) ? tf[4] : 0;
      const y = tf && Number.isFinite(tf[5]) ? tf[5] : 0;
      points.push({ s, x, y });
    }
    if (!points.length) return "";
    points.sort((a, b) => (b.y - a.y) || (a.x - b.x));

    const rows = [];
    const yTolerance = 2.4;
    for (const p of points){
      const row = rows.find((r) => Math.abs(r.y - p.y) <= yTolerance);
      if (row){
        row.items.push(p);
      } else {
        rows.push({ y: p.y, items: [p] });
      }
    }
    rows.sort((a, b) => b.y - a.y);
    return rows
      .map((r) => r.items.sort((a, b) => a.x - b.x).map((v) => v.s).join(" "))
      .join("\n");
  }

  async function buildDynamicAnswerKeyFromPdf(options = {}){
    const silent = options.silent === true;
    try{
      state.answerKeyStatus = "loading";
      updateAnswerKeyInfo();
      const pdf = await ensureAnswerPdfDocument();
      const voteBag = new Map(); // q -> Map(answer -> count)

      for (let p = 1; p <= pdf.numPages; p++){
        const page = await pdf.getPage(p);
        const textContent = await page.getTextContent();
        const items = textContent.items || [];
        const rawByItems = items.map((it) => String(it.str || "")).join("\n");
        const rawFlat = items.map((it) => String(it.str || "")).join(" ");
        const rawByRows = buildLineLikeTextFromItems(items);
        const sources = [rawByItems, rawFlat, rawByRows];
        for (const sourceRaw of sources){
          const pairs = parseAnswerPairsFromRawText(sourceRaw);
          for (const [q, a] of pairs){
            if (!voteBag.has(q)) voteBag.set(q, new Map());
            const qVotes = voteBag.get(q);
            qVotes.set(a, (qVotes.get(a) || 0) + 1);
          }
        }

        // 숫자 스트림 전용 파싱: "1 3 2 2 3 3 ..." 형태 보강
        const streamNums = items
          .map((it) => String(it?.str || "").trim())
          .filter((s) => /^\d{1,3}$/.test(s))
          .map((s) => Number(s));
        const streamPairs = parseAnswerPairsFromNumberStream(streamNums);
        for (const [q, a] of streamPairs){
          if (!voteBag.has(q)) voteBag.set(q, new Map());
          const qVotes = voteBag.get(q);
          qVotes.set(a, (qVotes.get(a) || 0) + 2);
        }
      }

      const merged = new Map();
      for (let q = 1; q <= 100; q++){
        const qVotes = voteBag.get(q);
        if (!qVotes || qVotes.size === 0) continue;
        const ranked = Array.from(qVotes.entries()).sort((a, b) => b[1] - a[1]);
        if (ranked.length === 1) {
          merged.set(q, ranked[0][0]);
          continue;
        }
        // 충돌 허용 폭을 조금 완화해 누락을 줄인다.
        if (ranked[0][1] >= ranked[1][1] + 1 || ranked[0][1] >= 3) {
          merged.set(q, ranked[0][0]);
        }
      }

      const dyn = Array(101).fill(null);
      for (const [q, a] of merged.entries()) dyn[q] = a;
      state.answerKeyDynamic = dyn;
      state.answerKeyStatus = merged.size >= 70 ? "ready" : (merged.size > 0 ? "partial" : "unavailable");
    }catch(_){
      state.answerKeyDynamic = null;
      state.answerKeyStatus = "unavailable";
    } finally {
      updateAnswerKeyInfo();
      refreshAllCards();
      updateStats();
      applyFilter();
      if (!silent && state.answerKeyStatus !== "ready") {
        alert("정답 PDF 분석이 완전하지 않아 일부 문항은 채점이 보류됩니다.");
      }
    }
  }

  async function getQuestionPageTextLayer(pageNo){

    const pdf = await ensurePdfDocument();

    const textContent = await page.getTextContent();
    const layer = {
      pageW: Math.max(1, viewport.width),

    };

  async function getQuestionRatiosForPage(pageNo){
    const key = String(pageNo);
    if (state.pageQuestionRatioCache[key]) return state.pageQuestionRatioCache[key];
    const layer = await getQuestionPageTextLayer(pageNo);
    const detected = extractQuestionStartsFromItems(layer.items || []);
    const merged = new Map(detected.ratioByQuestion || []);
    const direct = await getDirectQuestionRatiosForPage(pageNo);
    for (const [q, ratio] of direct.entries()){
      if (!merged.has(q)) {
        merged.set(q, ratio);
      } else {
        merged.set(q, Math.min(merged.get(q), ratio));
      }
    }
    state.pageQuestionRatioCache[key] = merged;
    return state.pageQuestionRatioCache[key];
  }

  async function locateQuestionInPdf(q){
    const cacheKey = `${getCurrentPdfSourceKey()}|${PDF_MAP_VERSION}|q:${Math.max(1, Math.min(100, Math.floor(Number(q) || 1)))}`;
    if (state.locateQuestionCache && state.locateQuestionCache[cacheKey]) {
      return state.locateQuestionCache[cacheKey];
    }
    const pdf = await ensurePdfDocument();
    const total = pdf.numPages || 1;
    const hasQuestionOnPage = async (pageNo, targetQ) => {
      if (!Number.isFinite(pageNo) || pageNo < 1 || pageNo > total) return false;
      try{
        const rowStarts = await getRowQuestionStartRatiosForPage(pageNo);
        if (rowStarts && Number.isFinite(rowStarts.get(targetQ))) return true;
        const directStarts = await getDirectQuestionRatiosForPage(pageNo);
        if (directStarts && Number.isFinite(directStarts.get(targetQ))) return true;
        const pageRatios = await getQuestionRatiosForPage(pageNo);
        if (pageRatios && Number.isFinite(pageRatios.get(targetQ))) return true;
      }catch(_){}
      return false;
    };
    const resolveBetterPage = async (mappedPage, targetQ) => {
      const p = Math.max(1, Math.min(total, Math.floor(mappedPage)));
      const candidates = [p, p - 1, p + 1];
      for (const cand of candidates){
        if (await hasQuestionOnPage(cand, targetQ)) return cand;
      }
      return p;
    };
    const refineRatioOnPage = async (pageNo, fallbackRatio) => {
      const safeRatio = Number.isFinite(fallbackRatio) ? Math.max(0, Math.min(1, fallbackRatio)) : 0.12;
      const p = Math.max(1, Math.min(total, Math.floor(pageNo)));
      try{
        const candidates = [];
        const rowStarts = await getRowQuestionStartRatiosForPage(p);
        if (rowStarts && Number.isFinite(rowStarts.get(q))) candidates.push(rowStarts.get(q));
        const directStarts = await getDirectQuestionRatiosForPage(p);
        if (directStarts && Number.isFinite(directStarts.get(q))) candidates.push(directStarts.get(q));
        const pageRatios = await getQuestionRatiosForPage(p);
        if (pageRatios && Number.isFinite(pageRatios.get(q))) candidates.push(pageRatios.get(q));
        if (candidates.length){
          candidates.sort((a, b) => a - b);
          return Math.max(0, Math.min(1, candidates[Math.floor(candidates.length / 2)]));
        }
      }catch(_){}
      return safeRatio;
    };

    const presetAnchors = getPresetAnchorsForCurrentExam();
    if (presetAnchors) {
      const mapped = buildMapFromAnchors(presetAnchors);
      const mappedPage = Math.max(1, Math.min(total, Number(mapped.pageMap[q]) || getPdfPageByQuestion(q)));
      const p = await resolveBetterPage(mappedPage, q);
      const r = await refineRatioOnPage(p, mapped.ratioMap[q]);
      const result = { page: p, ratio: r, exact: true };
      state.locateQuestionCache[cacheKey] = result;
      return result;
    }
    // 기본 페이지맵을 사용하되, 페이지 내부 비율은 실제 텍스트 검출로 보정한다.
    const pageMap = state.pdfNav.questionPageMap;
    const ratioMap = state.pdfNav.questionTopRatioMap;
    if (Array.isArray(pageMap) && Array.isArray(ratioMap) && Number.isFinite(pageMap[q])) {
      const mappedPage = Math.max(1, Math.min(total, Math.floor(pageMap[q])));
      const p = await resolveBetterPage(mappedPage, q);
      const r = await refineRatioOnPage(p, ratioMap[q]);
      const result = { page: p, ratio: r, exact: true };
      state.locateQuestionCache[cacheKey] = result;
      return result;
    }
    const predicted = Math.max(1, Math.min(total, getPdfPageByQuestion(q)));
    const result = { page: predicted, ratio: 0.12, exact: false };
    state.locateQuestionCache[cacheKey] = result;
    return result;
  }

  async function getDirectQuestionRatiosForPage(pageNo){
    const key = String(pageNo);
    if (state.pageQuestionDirectRatioCache[key]) return state.pageQuestionDirectRatioCache[key];
    const layer = await getQuestionPageTextLayer(pageNo);
    const pageW = layer.pageW;
    const pageH = layer.pageH;
    const map = new Map();

    for (const item of (layer.items || [])){
      const s = String(item.str || "").trim();
      if (!s) continue;
      const m = s.match(/^\(?\s*(\d{1,3})\s*(?:[.]|번)(?:\s|$)/);
      if (!m) continue;
      const q = Number(m[1]);
      if (!Number.isFinite(q) || q < 1 || q > 100) continue;

      const x = Number(item.transform && item.transform[4]);
      const y = Number(item.transform && item.transform[5]);
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
      const xRatio = x / pageW;
      if (xRatio > 0.35) continue;

      const ih = Math.max(8, Math.abs(Number(item.height) || 0));
      const top = Math.max(0, Math.min(pageH - ih, pageH - y - ih));
      const ratio = Math.max(0, Math.min(1, top / pageH));
      if (!map.has(q) || ratio < map.get(q)) map.set(q, ratio);
    }

    state.pageQuestionDirectRatioCache[key] = map;
    return map;
  }

  async function getRowQuestionStartRatiosForPage(pageNo){
    const key = String(pageNo);
    if (state.pageQuestionRowStartCache[key]) return state.pageQuestionRowStartCache[key];
    const layer = await getQuestionPageTextLayer(pageNo);
    const pageW = layer.pageW;
    const pageH = layer.pageH;

    const rows = [];
    for (const it of (layer.items || [])){
      const s = String(it.str || "").trim();
      if (!s) continue;
      const x = Number(it.transform && it.transform[4]);
      const y = Number(it.transform && it.transform[5]);
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
      let row = null;
      for (const r of rows){
        if (Math.abs(r.y - y) <= 2.2) { row = r; break; }
      }
      if (!row){
        row = { y, parts: [] };
        rows.push(row);
      }
      row.parts.push({ x, s });
    }

    const byQ = new Map();
    for (const row of rows){
      row.parts.sort((a, b) => a.x - b.x);
      if (!row.parts.length) continue;
      const rowStartX = row.parts[0].x;
      if ((rowStartX / pageW) > 0.38) continue;
      const lineText = row.parts.map(p => p.s).join(" ").replace(/\s+/g, " ").trim();
      const m = lineText.match(/^\(?\s*(\d{1,3})\s*(?:[.]|번)(?:\s|$)/);
      if (!m) continue;
      const q = Number(m[1]);
      if (!Number.isFinite(q) || q < 1 || q > 100) continue;
      const ih = 12;
      const top = Math.max(0, Math.min(pageH - ih, pageH - row.y - ih));
      const ratio = Math.max(0, Math.min(1, top / pageH));
      if (!byQ.has(q) || ratio < byQ.get(q)) byQ.set(q, ratio);
    }

    state.pageQuestionRowStartCache[key] = byQ;
    return byQ;
  }

  async function getReliableQuestionStartsForPage(pageNo){
    const key = String(pageNo);
    if (state.pageReliableQuestionStartCache[key]) return state.pageReliableQuestionStartCache[key];
    const layer = await getQuestionPageTextLayer(pageNo);
    const pageW = layer.pageW;
    const pageH = layer.pageH;

    const rows = [];
    for (const it of (layer.items || [])){
      const s = String(it.str || "").trim();
      if (!s) continue;
      const x = Number(it.transform && it.transform[4]);
      const y = Number(it.transform && it.transform[5]);
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
      let row = null;
      for (const r of rows){
        if (Math.abs(r.y - y) <= 2.0) { row = r; break; }
      }
      if (!row){
        row = { y, parts: [] };
        rows.push(row);
      }
      row.parts.push({ x, s });
    }

    const map = new Map();
    for (const row of rows){
      row.parts.sort((a, b) => a.x - b.x);
      if (!row.parts.length) continue;
      const startXRatio = row.parts[0].x / pageW;
      if (startXRatio > 0.24) continue;
      const line = row.parts.map(p => p.s).join(" ").replace(/\s+/g, " ").trim();
      const m = line.match(/^\(?\s*(\d{1,3})\s*(?:[.]|번)(?:\s|$)/);
      if (!m) continue;
      const q = Number(m[1]);
      if (!Number.isFinite(q) || q < 1 || q > 100) continue;
      // 너무 짧은 토큰 라인(잡음) 배제
      if (line.length < 6) continue;
      const top = Math.max(0, Math.min(pageH - 1, pageH - row.y - 12));
      const ratio = Math.max(0, Math.min(1, top / pageH));
      if (!map.has(q) || ratio < map.get(q)) map.set(q, ratio);
    }

    state.pageReliableQuestionStartCache[key] = map;
    return map;
  }

  async function getQuestionStartAnchorsForPage(pageNo){
    const key = String(pageNo);
    if (state.pageQuestionStartAnchorCache[key]) return state.pageQuestionStartAnchorCache[key];
    const layer = await getQuestionPageTextLayer(pageNo);
    const pageW = layer.pageW;
    const pageH = layer.pageH;

    const rows = [];
    const itemAnchors = new Map();
    for (const it of (layer.items || [])){
      const s = String(it.str || "").trim();
      if (!s) continue;
      const x = Number(it.transform && it.transform[4]);
      const y = Number(it.transform && it.transform[5]);
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;

      const token = s.replace(/\s+/g, "");
      const tm = token.match(/^\(?(\d{1,3})(?:[.]|번)\)?$/);
      if (tm) {
        const q = Number(tm[1]);
        const xRatio = x / pageW;
        if (Number.isFinite(q) && q >= 1 && q <= 100 && xRatio <= 0.2) {
          const ih = Math.max(10, Math.abs(Number(it.height) || 0));
          const top = Math.max(0, Math.min(pageH - ih, pageH - y - ih));
          const yRatio = Math.max(0, Math.min(1, top / pageH));
          const prev = itemAnchors.get(q);
          if (!prev || yRatio < prev.yRatio) {
            itemAnchors.set(q, { xRatio: Math.max(0, Math.min(1, xRatio)), yRatio });
          }
        }
      }

      let row = null;
      for (const r of rows){
        if (Math.abs(r.y - y) <= 2.0) { row = r; break; }
      }
      if (!row){
        row = { y, parts: [] };
        rows.push(row);
      }
      row.parts.push({ x, s });
    }

    const map = new Map(itemAnchors);
    for (const row of rows){
      row.parts.sort((a, b) => a.x - b.x);
      if (!row.parts.length) continue;
      const startX = row.parts[0].x;
      const startXRatio = startX / pageW;
      if (startXRatio > 0.26) continue;
      const line = row.parts.map((p) => p.s).join(" ").replace(/\s+/g, " ").trim();
      const m = line.match(/^\(?\s*(\d{1,3})\s*(?:[.]|번)(?:\s|$)/);
      if (!m) continue;
      const q = Number(m[1]);
      if (!Number.isFinite(q) || q < 1 || q > 100) continue;
      if (line.length < 6) continue;
      const top = Math.max(0, Math.min(pageH - 1, pageH - row.y - 12));
      const yRatio = Math.max(0, Math.min(1, top / pageH));
      const xRatio = Math.max(0, Math.min(1, startXRatio));
      const prev = map.get(q);
      if (!prev || yRatio < prev.yRatio) map.set(q, { xRatio, yRatio });
    }

    state.pageQuestionStartAnchorCache[key] = map;
    return map;
  }

  async function getNextQuestionBoundaryRatioForPage(pageNo, q, startRatio = null, minAfterRatio = null){
    const base = Number.isFinite(startRatio) ? Math.max(0, Math.min(1, Number(startRatio))) : 0;
    const after = Number.isFinite(minAfterRatio) ? Math.max(0, Math.min(1, Number(minAfterRatio))) : null;
    const minGap = 0.03;
    const trusted = [];
    const fallback = [];
    const seen = new Set();
    const push = (arr, v) => {
      if (!Number.isFinite(v)) return;
      const r = Math.max(0, Math.min(1, Number(v)));
      if (r <= base + minGap) return;
      // 선택지 하단과 다음 문항 시작이 매우 근접한(촘촘한) 레이아웃이 있어
      // 과도한 최소 간격 필터를 쓰면 q+1 경계를 놓치게 된다.
      if (after != null && r <= (after + 0.0015)) return;
      const key = r.toFixed(5);
      if (seen.has(key)) return;
      seen.add(key);
      arr.push(r);
    };

    const pageMap = state.pdfNav.questionPageMap;
    const ratioMap = state.pdfNav.questionTopRatioMap;
    if (Array.isArray(pageMap) && Array.isArray(ratioMap)) {
      for (let k = q + 1; k <= 100; k++){
        if (pageMap[k] !== pageNo || !Number.isFinite(ratioMap[k])) continue;
        push(trusted, ratioMap[k]);
      }
    }

    try{
      const anchorMap = await getQuestionStartAnchorsForPage(pageNo);
      if (anchorMap && typeof anchorMap.entries === "function") {
        for (const [k, v] of anchorMap.entries()){
          if (!Number.isFinite(k) || !v || !Number.isFinite(v.yRatio)) continue;
          if (k <= q) continue;
          push(trusted, v.yRatio);
        }
      }
    }catch(_){}

    try{
      const next = await locateQuestionInPdf(q + 1);
      if (next && next.page === pageNo && Number.isFinite(next.ratio)) {
        push(trusted, next.ratio);
      }
    }catch(_){}

    if (trusted.length) {
      trusted.sort((a, b) => a - b);
      return trusted[0];
    }

    try{
      const maps = [
        await getQuestionRatiosForPage(pageNo),
        await getRowQuestionStartRatiosForPage(pageNo),
        await getDirectQuestionRatiosForPage(pageNo),
        await getReliableQuestionStartsForPage(pageNo)
      ];
      for (const m of maps){
        if (!m || typeof m.entries !== "function") continue;
        for (const [k, v] of m.entries()){
          if (!Number.isFinite(k) || !Number.isFinite(v)) continue;
          if (k <= q) continue;
          push(fallback, v);
        }
      }
    }catch(_){}

    if (fallback.length) {
      fallback.sort((a, b) => a - b);
      return fallback[0];
    }
    return null;
  }

  async function getNearestNextQuestionStartRatioForPage(pageNo, q, startRatio = null){
    const base = Number.isFinite(startRatio) ? Math.max(0, Math.min(1, Number(startRatio))) : 0;
    const out = [];
    const seen = new Set();
    const push = (v) => {
      if (!Number.isFinite(v)) return;
      const r = Math.max(0, Math.min(1, Number(v)));
      if (r <= base + 0.015) return;
      const key = r.toFixed(5);
      if (seen.has(key)) return;
      seen.add(key);
      out.push(r);
    };

    try{
      const tokenMap = await getQuestionLabelTokenRatiosForPage(pageNo);
      if (tokenMap && typeof tokenMap.entries === "function") {
        for (const [k, v] of tokenMap.entries()){
          if (!Number.isFinite(k) || k <= q) continue;
          push(v);
        }
      }
    }catch(_){}

    try{
      const anchorMap = await getQuestionStartAnchorsForPage(pageNo);
      if (anchorMap && typeof anchorMap.entries === "function") {
        for (const [k, v] of anchorMap.entries()){
          if (!Number.isFinite(k) || k <= q || !v || !Number.isFinite(v.yRatio)) continue;
          push(v.yRatio);
        }
      }
    }catch(_){}

    try{
      const maps = [
        await getQuestionRatiosForPage(pageNo),
        await getRowQuestionStartRatiosForPage(pageNo),
        await getDirectQuestionRatiosForPage(pageNo),
        await getReliableQuestionStartsForPage(pageNo)
      ];
      for (const m of maps){
        if (!m || typeof m.entries !== "function") continue;
        for (const [k, v] of m.entries()){
          if (!Number.isFinite(k) || k <= q) continue;
          push(v);
        }
      }
    }catch(_){}

    if (!out.length) return null;
    out.sort((a, b) => a - b);
    return out[0];
  }

  async function getQuestionStartRatioForPage(pageNo, q, options = null){
    if (!Number.isFinite(pageNo) || !Number.isFinite(q)) return null;
    const allowOcr = !!(options && options.allowOcr === true);
    try{
      const exact = await getExactQuestionLabelRatioForPage(pageNo, q);
      if (Number.isFinite(exact)) return Math.max(0, Math.min(1, Number(exact)));
    }catch(_){}
    try{
      const anchorMap = await getQuestionStartAnchorsForPage(pageNo);
      const a = anchorMap && anchorMap.get(q);
      if (a && Number.isFinite(a.yRatio)) {
        return Math.max(0, Math.min(1, Number(a.yRatio)));
      }
    }catch(_){}
    try{
      const pageRatios = await getQuestionRatiosForPage(pageNo);
      if (pageRatios && Number.isFinite(pageRatios.get(q))) {
        return Math.max(0, Math.min(1, Number(pageRatios.get(q))));
      }
    }catch(_){}
    const pageMap = state.pdfNav.questionPageMap;
    const ratioMap = state.pdfNav.questionTopRatioMap;
    if (Array.isArray(pageMap) && Array.isArray(ratioMap) && pageMap[q] === pageNo && Number.isFinite(ratioMap[q])) {
      return Math.max(0, Math.min(1, Number(ratioMap[q])));
    }
    try{
      const located = await locateQuestionInPdf(q);
      if (located && located.page === pageNo && Number.isFinite(located.ratio)) {
        return Math.max(0, Math.min(1, Number(located.ratio)));
      }
    }catch(_){}
    if (allowOcr) {
      try{
        const ocrMap = await getOcrQuestionStartRatiosForPage(pageNo);
        if (ocrMap && Number.isFinite(ocrMap[q])) {
          return Math.max(0, Math.min(1, Number(ocrMap[q])));
        }
      }catch(_){}
    }
    return null;
  }

  async function getQuestionLabelTokenRatiosForPage(pageNo){
    const key = String(pageNo);
    if (state.pageQuestionLabelTokenCache[key]) return state.pageQuestionLabelTokenCache[key];
    const map = new Map();
    try{
      const layer = await getQuestionPageTextLayer(pageNo);
      const pageW = layer.pageW;
      const pageH = layer.pageH;
      for (const item of (layer.items || [])){
        const s = String(item.str || "").replace(/\s+/g, "");
        if (!s) continue;
        const m = s.match(/^\(?(\d{1,3})(?:\.|번)\)?$/);
        if (!m) continue;
        const q = Number(m[1]);
        if (!Number.isFinite(q) || q < 1 || q > 100) continue;
        const x = Number(item.transform && item.transform[4]);
        const y = Number(item.transform && item.transform[5]);
        if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
        const xRatio = x / pageW;
        if (xRatio > 0.20) continue;
        const ih = Math.max(10, Math.abs(Number(item.height) || 0));
        const top = Math.max(0, Math.min(pageH - ih, pageH - y - ih));
        const yRatio = Math.max(0, Math.min(1, top / pageH));
        if (!map.has(q) || yRatio < map.get(q)) map.set(q, yRatio);
      }
    }catch(_){}
    state.pageQuestionLabelTokenCache[key] = map;
    return map;
  }

  async function getExactQuestionLabelRatioForPage(pageNo, q){
    if (!Number.isFinite(pageNo) || !Number.isFinite(q)) return null;
    const key = `${pageNo}:${q}`;
    if (Object.prototype.hasOwnProperty.call(state.exactQuestionLabelRatioCache, key)) {
      return state.exactQuestionLabelRatioCache[key];
    }
    let found = null;
    try{
      const tokenMap = await getQuestionLabelTokenRatiosForPage(pageNo);
      const tokenRatio = tokenMap && tokenMap.get(q);
      if (Number.isFinite(tokenRatio)) found = Number(tokenRatio);
    }catch(_){}
    try{
      const layer = await getQuestionPageTextLayer(pageNo);
      const pageW = layer.pageW;
      const pageH = layer.pageH;
      const target = String(Math.floor(q));
      const rows = [];

      const pushRowPart = (x, y, s) => {
        let row = null;
        for (const r of rows){
          if (Math.abs(r.y - y) <= 2.2) { row = r; break; }
        }
        if (!row){
          row = { y, parts: [] };
          rows.push(row);
        }
        row.parts.push({ x, s });
      };

      for (const item of (layer.items || [])){
        const raw = String(item.str || "").trim();
        if (!raw) continue;
        const compact = raw.replace(/\s+/g, "");
        // 다른 탐지 함수와 동일하게 PDF 원좌표(item.transform)를 사용해야
        // y축 반전 오차가 생기지 않는다.
        const x = Number(item.transform && item.transform[4]);
        const y = Number(item.transform && item.transform[5]);
        if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
        pushRowPart(x, y, compact);
      }

      // 분할 토큰(예: "16" + ".", "16" + "번")도 문항번호로 인식한다.
      for (const row of rows){
        row.parts.sort((a, b) => a.x - b.x);
        if (!row.parts.length) continue;
        const first = String(row.parts[0].s || "");
        const second = String((row.parts[1] && row.parts[1].s) || "");
        const third = String((row.parts[2] && row.parts[2].s) || "");
        const lineCompact = row.parts.map((p) => String(p.s || "")).join("");
        const startsWithLabel =
          new RegExp(`^\\(?${target}(?:\\.|번)\\)?`).test(lineCompact) ||
          (first === target && (second === "." || second === "번" || second === ")")) ||
          (first === "(" && second === target && (third === "." || third === "번" || third === ")"));
        if (!startsWithLabel) continue;

        const x = Number(row.parts[0].x);
        if (!Number.isFinite(x)) continue;
        const xRatio = x / pageW;
        if (xRatio > 0.24) continue;
        // 일부 PDF는 문항번호 토큰이 짧게 분리되어 들어와 길이 필터를 완화한다.
        const lineText = row.parts.map((p) => String(p.s || "")).join(" ").trim();
        if (lineText.length < 2) continue;
        const top = Math.max(0, Math.min(pageH - 1, pageH - Number(row.y) - 12));
        const yRatio = Math.max(0, Math.min(1, top / pageH));
        if (found == null || yRatio < found) found = yRatio;
      }
    }catch(_){}

    // null 결과를 캐시하면 일시적인 탐지 실패가 계속 고정된다.
    // 성공값만 캐시해서 다음 렌더에서 재시도 가능하게 한다.
    if (Number.isFinite(found)) {
      state.exactQuestionLabelRatioCache[key] = found;
      return found;
    }
    return null;
  }

  async function getQuestionCropRange(q, page){
    const pageMap = state.pdfNav.questionPageMap;
    const ratioMap = state.pdfNav.questionTopRatioMap;
    if (!Array.isArray(pageMap) || !Array.isArray(ratioMap)) return { start: 0, end: 1, focusStart: 0, focusEnd: 1, lowConfidence: true, nextBoundary: null };
    const mappedRatioForQ = (pageMap[q] === page && Number.isFinite(ratioMap[q])) ? Number(ratioMap[q]) : null;
    const cropCacheKey = `${CROP_CACHE_VERSION}|${getCurrentPdfSourceKey()}|${page}|${q}|${mappedRatioForQ == null ? "na" : mappedRatioForQ.toFixed(4)}`;
    if (state.questionCropRangeCache[cropCacheKey]) return state.questionCropRangeCache[cropCacheKey];
    const mobileViewport = window.matchMedia("(max-width: 768px)").matches;

    let startRaw = await getQuestionStartRatioForPage(page, q);
    if (!Number.isFinite(startRaw)) {
      startRaw = Number.isFinite(mappedRatioForQ) ? mappedRatioForQ : 0.12;
    }
    startRaw = Math.max(0, Math.min(1, Number(startRaw)));

    let nextStartRaw = null;
    if (q < 100) {
      try{
        const strictNext = await getQuestionStartRatioForPage(page, q + 1);
        if (Number.isFinite(strictNext) && strictNext > startRaw + 0.03) {
          nextStartRaw = strictNext;
        }
      }catch(_){}
      if (!Number.isFinite(nextStartRaw)) {
        try{
          const guessed = await getNextQuestionBoundaryRatioForPage(page, q, startRaw, null);
          if (Number.isFinite(guessed) && guessed > startRaw + 0.03) nextStartRaw = guessed;
        }catch(_){}
      }
    }

    const topPad = mobileViewport ? 0.006 : 0.008;
    let focusStart = Math.max(0, startRaw - topPad);
    let focusEnd = null;

    if (Number.isFinite(nextStartRaw)) {
      const gap = mobileViewport ? 0.022 : 0.018;
      focusEnd = Math.max(focusStart + 0.08, Math.min(0.995, nextStartRaw - gap));
    } else {
      let choiceBottom = null;
      try{
        const anchors = await getChoiceAnchorsForQuestion(page, q, { startRatio: startRaw });
        if (Array.isArray(anchors) && anchors.length) {
          const maxChoiceBottom = Math.max(...anchors.map((a) => a.yRatio + a.hRatio));
          if (Number.isFinite(maxChoiceBottom)) choiceBottom = maxChoiceBottom;
        }
      }catch(_){}
      if (Number.isFinite(choiceBottom)) {
        focusEnd = Math.min(0.995, Math.max(focusStart + 0.14, choiceBottom + 0.05));
      } else {
        focusEnd = Math.min(0.995, focusStart + (mobileViewport ? 0.34 : 0.30));
      }
    }

    // 단일 문항 보장: q+1 경계가 있으면 절대 넘지 않는다.
    if (Number.isFinite(nextStartRaw)) {
      const hardGap = mobileViewport ? 0.024 : 0.020;
      const hardCap = Math.max(focusStart + 0.08, Math.min(0.995, nextStartRaw - hardGap));
      focusEnd = Math.min(focusEnd, hardCap);
    }

    const examOverride = getSingleCropOverrideForExam(EXAM_NAME);
    const pdfOverride = getSingleCropOverrideByPdfUrl();
    const qOverride = (pdfOverride && pdfOverride[q]) || (examOverride && examOverride[q]);
    if (qOverride) {
      if (Number.isFinite(qOverride.start)) {
        startRaw = Math.max(0, Math.min(1, Number(qOverride.start)));
        focusStart = Math.max(0, Math.min(1, startRaw));
      }
      if (Number.isFinite(qOverride.end)) {
        focusEnd = Math.max(startRaw + 0.08, Math.min(1, Number(qOverride.end)));
      }
    }

    const resolved = {
      start: Math.max(0, Math.min(1, focusStart)),
      end: Math.max(0, Math.min(1, focusEnd)),
      focusStart: Math.max(0, Math.min(1, focusStart)),
      focusEnd: Math.max(0, Math.min(1, focusEnd)),
      lowConfidence: false,
      nextBoundary: Number.isFinite(nextStartRaw) ? nextStartRaw : null
    };
    state.questionCropRangeCache[cropCacheKey] = resolved;
    return resolved;
  }

  function makeSingleRenderCacheKey(pageNo, viewWidth, zoom, outputScale){
    return `${getQuestionPdfBaseUrl()}|p:${pageNo}|w:${Math.round(viewWidth)}|z:${zoom}|s:${outputScale}`;
  }

  function pruneSinglePageRenderCache(limit = 8){
    const cache = state.singlePageRenderCache;
    if (!(cache instanceof Map) || cache.size <= limit) return;
    const entries = Array.from(cache.entries()).sort((a, b) => (a[1].usedAt || 0) - (b[1].usedAt || 0));
    const removeCount = Math.max(0, cache.size - limit);
    for (let i = 0; i < removeCount; i++){
      cache.delete(entries[i][0]);
    }
  }

  async function getOrRenderSinglePageCanvas(pageObj, cacheKey, cssViewport, outputScale){
    let rec = state.singlePageRenderCache.get(cacheKey);
    if (rec && rec.promise){
      rec.usedAt = Date.now();
      return rec.promise;
    }

    const promise = (async () => {
      const canvas = document.createElement("canvas");
      canvas.width = Math.ceil(cssViewport.width * outputScale);
      canvas.height = Math.ceil(cssViewport.height * outputScale);
      const ctx = canvas.getContext("2d");
      await pageObj.render({
        canvasContext: ctx,
        viewport: cssViewport,
        transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null
      }).promise;
      return canvas;
    })();

    state.singlePageRenderCache.set(cacheKey, { promise, usedAt: Date.now() });
    pruneSinglePageRenderCache();

    try{
      const canvas = await promise;
      const latest = state.singlePageRenderCache.get(cacheKey);
      if (latest) latest.usedAt = Date.now();
      return canvas;
    }catch(e){
      state.singlePageRenderCache.delete(cacheKey);
      throw e;
    }
  }

  function prefetchSinglePageAround(pdf, currentPage, viewWidth, outputScale){
    const candidates = [currentPage + 1, currentPage - 1];
    setTimeout(async () => {
      for (const p of candidates){
        if (!Number.isFinite(p) || p < 1 || p > pdf.numPages) continue;
        try{
          const pageObj = await pdf.getPage(p);
          const baseViewport = pageObj.getViewport({ scale: 1 });
          const cssScale = Math.max(0.5, (viewWidth / baseViewport.width) * state.pdfZoom);
          const cssViewport = pageObj.getViewport({ scale: cssScale });
          const cacheKey = makeSingleRenderCacheKey(p, viewWidth, state.pdfZoom, outputScale);
          await getOrRenderSinglePageCanvas(pageObj, cacheKey, cssViewport, outputScale);
        }catch(_){}
      }
    }, 0);
  }

  function detectHorizontalContentBounds(canvas, yStart = 0, yEnd = canvas.height, options = {}){
    try{
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      if (!ctx) return { left: 0, width: canvas.width };
      const w = canvas.width;
      const y0 = Math.max(0, Math.floor(yStart));
      const y1 = Math.max(y0 + 1, Math.min(canvas.height, Math.ceil(yEnd)));
      const h = y1 - y0;
      if (w < 40 || h < 20) return { left: 0, width: w };

      const ignoreTopRatio = Math.max(0, Math.min(0.35, Number(options.ignoreTopRatio) || 0));
      const ignoreBottomRatio = Math.max(0, Math.min(0.35, Number(options.ignoreBottomRatio) || 0));
      const innerY0 = Math.max(y0, Math.min(y1 - 1, y0 + Math.floor(h * ignoreTopRatio)));
      const innerY1 = Math.max(innerY0 + 1, Math.min(y1, y1 - Math.floor(h * ignoreBottomRatio)));
      const hh = innerY1 - innerY0;
      if (hh < 12) return { left: 0, width: w };

      const img = ctx.getImageData(0, innerY0, w, hh);
      const data = img.data;
      const colStep = Math.max(1, Math.min(4, Number(options.colStep) || 2));
      const rowStep = Math.max(2, Math.min(6, Number(options.rowStep) || 3));
      const minHits = Math.max(3, Math.floor(hh / 180));
      const inkThreshold = Math.max(200, Math.min(252, Number(options.inkThreshold) || 244));
      const isInk = (x) => {
        let hits = 0;
        for (let y = 0; y < hh; y += rowStep){
          const i = ((y * w + x) * 4);
          const a = data[i + 3];
          if (a < 8) continue;
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          if (r < inkThreshold || g < inkThreshold || b < inkThreshold){
            hits++;
            if (hits >= minHits) return true;
          }
        }
        return false;
      };

      let left = 0;
      while (left < w - 1 && !isInk(left)) left += colStep;
      if (left >= w - 1) return { left: 0, width: w };

      let right = w - 1;
      while (right > left && !isInk(right)) right -= colStep;

      const preserveSideRatio = Math.max(0, Math.min(0.08, Number(options.preserveSideRatio) || 0));
      const edgePadRatio = Math.max(0, Math.min(0.06, Number(options.edgePadRatio) || 0.012));
      const edgePadMin = Math.max(0, Math.min(24, Number(options.edgePadMin) || 8));
      const pad = Math.max(edgePadMin, Math.floor(w * edgePadRatio));
      left = Math.max(0, left - pad);
      right = Math.min(w - 1, right + pad);
      if (preserveSideRatio > 0){
        const preservePx = Math.floor(w * preserveSideRatio);
        left = Math.max(0, left - preservePx);
        right = Math.min(w - 1, right + preservePx);
      }
      const width = Math.max(1, right - left + 1);

      // 감지가 과도한 경우(너무 좁아짐)에는 원본 유지
      if (width < Math.floor(w * 0.55)) return { left: 0, width: w };
      // 공백 제거 이점이 거의 없으면 원본 유지
      if (width > Math.floor(w * 0.97)) return { left: 0, width: w };
      return { left, width };
    }catch(_){
      return { left: 0, width: canvas.width };
    }
  }

  async function renderPdfPage(page, q){
    if (state.viewMode !== "single") {
      return renderAllPdfPages(q);
    }
    const pdf = await ensurePdfDocument();
    const safePage = Math.min(Math.max(1, Math.floor(page)), pdf.numPages);
    state.currentPdfPage = safePage;

    const pageObj = await pdf.getPage(safePage);
    const baseViewport = pageObj.getViewport({ scale: 1 });
    const viewWidth = Math.max(320, (pdfCanvas.parentElement?.clientWidth || 900) - 20);
    const cssScale = Math.max(0.5, (viewWidth / baseViewport.width) * state.pdfZoom);
    const cssViewport = pageObj.getViewport({ scale: cssScale });
    const outputScale = getPdfOutputScale();

    const token = ++state.renderToken;
    const cacheKey = makeSingleRenderCacheKey(safePage, viewWidth, state.pdfZoom, outputScale);
    const fullCanvas = await getOrRenderSinglePageCanvas(pageObj, cacheKey, cssViewport, outputScale);
    if (token !== state.renderToken) return;

    let srcTop = 0;
    let srcHeight = fullCanvas.height;
    let srcLeft = 0;
    let srcWidth = fullCanvas.width;
    let activeRange = { start: 0, end: 1, focusStart: 0, focusEnd: 1 };
    if (state.viewMode === "single" && Number.isFinite(q)) {
      const range = await getQuestionCropRange(q, safePage);
      activeRange = range;
      let safeStart = Number.isFinite(range.start) ? range.start : 0;
      let safeEnd = Number.isFinite(range.end) ? range.end : 1;
      const examOverride = getSingleCropOverrideForExam(EXAM_NAME);
      const pdfOverride = getSingleCropOverrideByPdfUrl();
      const qOverride = (pdfOverride && pdfOverride[q]) || (examOverride && examOverride[q]);
      const hasEndOverride = !!(qOverride && Number.isFinite(qOverride.end));
      const rangeNextBoundary = Number.isFinite(range && range.nextBoundary)
        ? Math.max(0, Math.min(1, Number(range.nextBoundary)))
        : null;
      const lowConfidenceRange = !!(range && range.lowConfidence);
      const pageMap = state.pdfNav.questionPageMap;
      const ratioMap = state.pdfNav.questionTopRatioMap;
      const mobileViewport = window.matchMedia("(max-width: 768px)").matches;
      const mappedNextSamePage = (q < 100
        && Array.isArray(pageMap)
        && Array.isArray(ratioMap)
        && pageMap[q + 1] === safePage
        && Number.isFinite(ratioMap[q + 1]))
        ? Math.max(0, Math.min(1, Number(ratioMap[q + 1])))
        : null;
      const strictStartSamePage = await getQuestionStartRatioForPage(safePage, q);
      const strictPrevSamePage = (q > 1)
        ? await getQuestionStartRatioForPage(safePage, q - 1)
        : null;
      const strictStartLabelBoundary = await getExactQuestionLabelRatioForPage(safePage, q);
      const strictNextSamePage = (q < 100)
        ? await getQuestionStartRatioForPage(safePage, q + 1)
        : null;
      const strictNextLabelBoundary = (q < 100)
        ? await getExactQuestionLabelRatioForPage(safePage, q + 1)
        : null;
      let finalNextBoundaryUsed = null;
      const labelStartBoundary = Number.isFinite(strictStartLabelBoundary)
        ? Number(strictStartLabelBoundary)
        : (Number.isFinite(strictStartSamePage) ? Number(strictStartSamePage) : null);
      const labelNextBoundary = Number.isFinite(strictNextLabelBoundary)
        ? Number(strictNextLabelBoundary)
        : (Number.isFinite(strictNextSamePage) ? Number(strictNextSamePage) : null);
      // 단일문항 렌더의 시작/끝 기준을 문항 라벨에 맞춰 강제한다.
      // - 상단: q 라벨이 잘리지 않도록 여유를 두고 맞춤
      // - 하단: q+1 라벨 이전까지만 허용
      {
        const startBase = labelStartBoundary;
        if (Number.isFinite(startBase)) {
          const topPad = mobileViewport ? 0.022 : 0.018;
          let forcedStart = Math.max(0, Math.min(1, startBase - topPad));
          if (Number.isFinite(strictPrevSamePage)) {
            const prevGuard = Number(strictPrevSamePage) + 0.035;
            forcedStart = Math.max(forcedStart, prevGuard);
          }
          safeStart = forcedStart;
        }

        const nextBase = labelNextBoundary;
        if (Number.isFinite(nextBase)) {
          const endGap = Number.isFinite(strictNextLabelBoundary)
            ? (mobileViewport ? 0.012 : 0.016)
            : (mobileViewport ? 0.030 : 0.045);
          const forcedEnd = Math.min(0.995, nextBase - endGap);
          safeEnd = Math.min(safeEnd, forcedEnd);
          finalNextBoundaryUsed = nextBase;
        }
      }
      let nextStartBoundaryRatio = null;
      let hardEndCapRatio = null;
      let provisionalBoundary = null;

      // 선택지 하단은 최소 보장
      let minEndByChoice = null;
      let maxEndByChoice = null;
      let choice4Bottom = null;
      const earlyBoundaryHint = Number.isFinite(strictNextSamePage)
        ? strictNextSamePage
        : (Number.isFinite(rangeNextBoundary)
          ? rangeNextBoundary
          : (Number.isFinite(mappedNextSamePage) ? mappedNextSamePage : null));
      if (!Number.isFinite(earlyBoundaryHint) && q < 100) {
        try{
          provisionalBoundary = await getNextQuestionBoundaryRatioForPage(safePage, q, safeStart, null);
        }catch(_){}
      }
      try{
        let anchors = await getChoiceAnchorsForQuestion(safePage, q, {
          startRatio: safeStart,
          endRatio: Number.isFinite(earlyBoundaryHint)
            ? Math.max(safeStart + 0.02, earlyBoundaryHint - 0.004)
            : (Number.isFinite(provisionalBoundary) ? Math.max(safeStart + 0.02, provisionalBoundary - 0.004) : null)
        });
        // 초기 경계 힌트가 이르게 잡히면 ④가 누락되어 컷이 짧아질 수 있으므로
        // 제한 없는 범위에서 한 번 더 탐색해 선지 하단을 보정한다.
        if (Array.isArray(anchors) && anchors.length < 4) {
          try{
            const relaxedAnchors = await getChoiceAnchorsForQuestion(safePage, q, { startRatio: safeStart });
            if (Array.isArray(relaxedAnchors) && relaxedAnchors.length > anchors.length) {
              anchors = relaxedAnchors;
            }
          }catch(_){}
        }
        if (Array.isArray(anchors) && anchors.length >= 2) {
          const activeAnchors = anchors;
          const ys = activeAnchors.map((a) => Number(a.yRatio)).filter((v) => Number.isFinite(v)).sort((a, b) => a - b);
          const ySpread = ys.length ? (ys[ys.length - 1] - ys[0]) : 0;
          const verticalChoices = ySpread > 0.06;
          const maxChoiceBottom = Math.max(...activeAnchors.map((a) => a.yRatio + a.hRatio));
          if (Number.isFinite(maxChoiceBottom)) {
            minEndByChoice = Math.max(safeStart + 0.16, Math.min(0.995, maxChoiceBottom + 0.05));
            // 경계 탐지 실패 시 선택지 배치(가로/세로)에 맞춰 상한 여유를 차등 적용
