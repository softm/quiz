            // 경계 미검출 fallback 상한: 세로 배열은 하단이 길어 다음 문항 혼입이 쉬워 더 타이트하게.
            const tailPad = verticalChoices ? 0.014 : 0.012;
            maxEndByChoice = Math.max(safeStart + 0.18, Math.min(0.995, maxChoiceBottom + tailPad));
          }
          const c4 = activeAnchors.find((a) => a.choice === 4) || anchors.find((a) => a.choice === 4);
          if (c4 && Number.isFinite(c4.yRatio) && Number.isFinite(c4.hRatio)) {
            choice4Bottom = Math.max(0, Math.min(1, c4.yRatio + c4.hRatio));
          }
        }
      }catch(_){}

      if (q < 100) {
        try{
          provisionalBoundary = await getNextQuestionBoundaryRatioForPage(
            safePage,
            q,
            safeStart,
            Number.isFinite(choice4Bottom) ? choice4Bottom : null
          );
        }catch(_){}
      }

      // 다음 문항 경계: 공통 함수로 페이지 전체 후보를 수집해 첫 경계 사용
      nextStartBoundaryRatio = Number.isFinite(strictNextSamePage)
        ? strictNextSamePage
        : provisionalBoundary;

      // 경계 적용: 선택지 하단보다 이르면 무시
      if (Number.isFinite(nextStartBoundaryRatio)) {
        const endGapRatio = mobileViewport ? 0.012 : (lowConfidenceRange ? 0.018 : 0.015);
        const capEnd = Math.min(0.995, Number(nextStartBoundaryRatio) - endGapRatio);
        if (capEnd > safeStart + 0.03) hardEndCapRatio = capEnd;
      } else if (Number.isFinite(mappedNextSamePage)) {
        // 실측 경계 탐지가 실패해도, 같은 페이지 q+1 맵 경계는 하드 상한으로 사용
        const mapGapRatio = mobileViewport ? 0.012 : 0.015;
        const mapCap = Math.min(0.995, Number(mappedNextSamePage) - mapGapRatio);
        if (mapCap > safeStart + 0.03) hardEndCapRatio = mapCap;
      } else if (Number.isFinite(rangeNextBoundary)) {
        const rangeGapRatio = mobileViewport ? 0.012 : 0.015;
        const rangeCap = Math.min(0.995, Number(rangeNextBoundary) - rangeGapRatio);
        if (rangeCap > safeStart + 0.03) hardEndCapRatio = rangeCap;
      }
      if (Number.isFinite(hardEndCapRatio) && !hasEndOverride) safeEnd = Math.min(safeEnd, hardEndCapRatio);
      // 경계 탐지 실패 시에는 선지 하단 기반 상한으로 다음 문항 혼입을 방지
      if (!Number.isFinite(hardEndCapRatio) && Number.isFinite(maxEndByChoice)) {
        safeEnd = Math.min(safeEnd, maxEndByChoice);
      }

      if (Number.isFinite(minEndByChoice)) {
        if (Number.isFinite(hardEndCapRatio)) {
          minEndByChoice = Math.min(minEndByChoice, hardEndCapRatio);
        }
        safeEnd = Math.max(safeEnd, minEndByChoice);
      }
      // 핵심 규칙:
      // 1) 끝은 항상 q+1 이전 (hardEndCapRatio 이하)
      // 2) 같은 범위 내에서는 ④ 선택지 하단이 보이도록 보장
      if (Number.isFinite(hardEndCapRatio) && Number.isFinite(choice4Bottom) && !hasEndOverride) {
        const c4Need = Math.min(0.995, choice4Bottom + (mobileViewport ? 0.022 : 0.018));
        if (c4Need <= hardEndCapRatio) {
          safeEnd = Math.max(safeEnd, c4Need);
        }
        safeEnd = Math.min(safeEnd, hardEndCapRatio);
      }
      const minSpan = mobileViewport ? 0.30 : 0.20;
      const hasStrictNextLabel = Number.isFinite(strictNextLabelBoundary);
      if (!hasStrictNextLabel && (safeEnd - safeStart) < minSpan) {
        const widened = Math.min(0.995, safeStart + minSpan);
        if (Number.isFinite(hardEndCapRatio)) {
          const capLimit = Math.min(0.995, Number(hardEndCapRatio));
          safeEnd = Math.max(safeEnd, Math.min(widened, capLimit));
        } else if (Number.isFinite(mappedNextSamePage)) {
          const capGap = mobileViewport ? 0.022 : 0.015;
          const capLimit = Math.min(0.995, Number(mappedNextSamePage) - capGap);
          safeEnd = Math.max(safeEnd, Math.min(widened, capLimit));
        } else {
          safeEnd = Math.max(safeEnd, widened);
        }
      }
      // 문항 영역 검출 실패 시 하단 일부만 보이는 케이스를 방지하기 위한 가드.
      // 시작점이 과도하게 아래이거나 높이가 너무 작으면 근접 구간을 넓혀 다시 잡는다.
      const rawSpan = Math.max(0, safeEnd - safeStart);
      if (lowConfidenceRange && (safeStart > 0.22 || rawSpan < 0.22)) {
        const focusStart = Number.isFinite(range.focusStart) ? range.focusStart : safeStart;
        const focusEnd = Number.isFinite(range.focusEnd) ? range.focusEnd : safeEnd;
        safeStart = Math.max(0, Math.min(safeStart, focusStart - 0.08));
        safeEnd = Math.min(1, Math.max(safeEnd, focusEnd + 0.18, safeStart + 0.44));
      }
      // 초반 문항(1~5번)은 상단 시작점 오검출 시 체감이 커서 추가로 보수 보정.
      if (lowConfidenceRange && q <= 5 && safeStart > 0.08) {
        safeStart = 0.03;
        safeEnd = Math.min(1, Math.max(safeEnd, 0.58));
      }
      // 안전장치: 컷 범위가 비정상적으로 좁아지면 focus 범위로 복구
      const hardMinSpan = mobileViewport ? 0.24 : 0.14;
      if (!Number.isFinite(safeStart) || !Number.isFinite(safeEnd) || (safeEnd - safeStart) < hardMinSpan) {
        const fbStart = Number.isFinite(range.focusStart) ? Number(range.focusStart) : Math.max(0, safeStart - 0.02);
        const fbEnd = Number.isFinite(range.focusEnd)
          ? Number(range.focusEnd)
          : Math.min(0.995, fbStart + (mobileViewport ? 0.34 : 0.26));
        safeStart = Math.max(0, Math.min(0.96, fbStart));
        safeEnd = Math.max(safeStart + hardMinSpan, Math.min(0.995, fbEnd));
      }
      // 최종 안전장치: 단일문항 컷은 어떤 후처리에서도 다음 문항 경계를 넘지 않게 강제
      if (Number.isFinite(hardEndCapRatio) && !hasEndOverride) {
        safeEnd = Math.min(safeEnd, Number(hardEndCapRatio));
      }
      // 라벨 기반 최종 경계 강제: q+1 문항번호 라벨이 보이면 항상 그 직전에서 컷.
      if (!hasEndOverride && Number.isFinite(strictNextLabelBoundary)) {
          const labelGap = mobileViewport ? 0.012 : 0.016;
        const labelCap = Math.min(0.995, Number(strictNextLabelBoundary) - labelGap);
        safeEnd = Math.min(safeEnd, labelCap);
      }
      const minContentEnd = Number.isFinite(minEndByChoice)
        ? Math.max(safeStart + 0.02, Number(minEndByChoice))
        : (
          Number.isFinite(choice4Bottom)
            ? Math.max(safeStart + 0.02, Math.min(0.995, Number(choice4Bottom) + (mobileViewport ? 0.02 : 0.016)))
            : (safeStart + 0.10)
        );
      // 절대 규칙: 페이지 내 "다음 문항(>q) 시작점" 이전으로 최종 캡.
      // 중간 분기에서 safeEnd가 늘어나더라도 마지막에 반드시 잘라낸다.
      if (!hasEndOverride && q < 100) {
        try{
          const absoluteNextStart = await getNearestNextQuestionStartRatioForPage(safePage, q, safeStart);
          if (Number.isFinite(absoluteNextStart)) {
            const absoluteGap = mobileViewport ? 0.010 : 0.014;
            const absoluteCap = Math.min(0.995, Number(absoluteNextStart) - absoluteGap);
            // 오탐 경계(선택지 하단보다 이른 값)는 무시한다.
            if (absoluteCap >= minContentEnd) {
              safeEnd = Math.min(safeEnd, absoluteCap);
              finalNextBoundaryUsed = Number(absoluteNextStart);
            }
          }
        }catch(_){}
      }
      // 공통 최종 경계 강제:
      // 선지 배열(세로/2열)과 무관하게 "다음 문항 시작점 직전"을 절대 상한으로 둔다.
      if (!hasEndOverride) {
        const finalNextBoundary = Number.isFinite(strictNextSamePage)
          ? Number(strictNextSamePage)
          : (
            Number.isFinite(nextStartBoundaryRatio)
              ? Number(nextStartBoundaryRatio)
              : (
                Number.isFinite(mappedNextSamePage)
                  ? Number(mappedNextSamePage)
                  : (Number.isFinite(rangeNextBoundary) ? Number(rangeNextBoundary) : null)
              )
          );
        if (Number.isFinite(finalNextBoundary)) {
          finalNextBoundaryUsed = finalNextBoundary;
          const finalGap = mobileViewport ? 0.012 : 0.022;
          const finalCap = Math.min(0.995, finalNextBoundary - finalGap);
          if (finalCap >= minContentEnd) {
            safeEnd = Math.min(safeEnd, finalCap);
          }
        }
        if (Number.isFinite(strictNextLabelBoundary)) {
          finalNextBoundaryUsed = Number(strictNextLabelBoundary);
        }
      }
      // 최종 보장: 선택지 하단(특히 ④)이 잘리지 않도록 최소 하단을 보장한다.
      // 경계값이 이 최소 하단보다 이르면 오탐으로 보고 경계를 무시한다.
      safeEnd = Math.max(safeEnd, Math.min(0.995, minContentEnd));
      // render 단계 후처리에서 다시 잘리지 않도록 회차/문항 오버라이드를 최종 우선 적용
      if (qOverride) {
        if (Number.isFinite(qOverride.start)) {
          safeStart = Math.max(0, Math.min(1, Number(qOverride.start)));
        }
        if (Number.isFinite(qOverride.end)) {
          safeEnd = Math.max(safeStart + 0.1, Math.min(1, Number(qOverride.end)));
        }
      }
      srcTop = Math.max(0, Math.floor(fullCanvas.height * safeStart));
      const srcBottom = Math.max(srcTop + 1, Math.ceil(fullCanvas.height * safeEnd));
      srcHeight = Math.max(1, srcBottom - srcTop);
      // 한문제 보기에서는 상하 여백을 약간 추가해 문항이 답답하게 잘리지 않도록 보정
      const singlePadRatio = window.matchMedia("(max-width: 768px)").matches ? 0.016 : 0.011;
      const singlePadPx = Math.max(6, Math.floor(fullCanvas.height * singlePadRatio));
      let paddedTop = Math.max(0, srcTop - singlePadPx);
      if (Number.isFinite(labelStartBoundary)) {
        const startTopPx = Math.max(0, Math.floor(fullCanvas.height * Math.max(0, Number(labelStartBoundary) - 0.006)));
        paddedTop = Math.max(paddedTop, startTopPx);
      }
      const bottomPadPx = Number.isFinite(labelNextBoundary)
        ? 0
        : (
          Number.isFinite(finalNextBoundaryUsed)
            ? Math.max(0, Math.floor(singlePadPx * 0.2))
            : singlePadPx
        );
      let paddedBottom = Math.min(fullCanvas.height, srcTop + srcHeight + bottomPadPx);
      // 오버라이드 문항은 하단 패딩이 다음 문항을 다시 끌어오지 않게
      // 계산된 safeEnd 경계를 절대 넘지 못하도록 고정한다.
      if (hasEndOverride) {
        const strictBottom = Math.max(srcTop + 1, Math.ceil(fullCanvas.height * safeEnd));
        paddedBottom = Math.min(paddedBottom, strictBottom);
      }
      // 다음 문항 시작점이 같은 페이지에 있으면 하단 패딩이 경계를 넘지 않도록 제한
      const padBoundaryRatioRaw = Number.isFinite(hardEndCapRatio)
        ? Number(hardEndCapRatio)
        : (
          Number.isFinite(finalNextBoundaryUsed)
            ? Number(finalNextBoundaryUsed)
            : (
          Number.isFinite(nextStartBoundaryRatio)
            ? Number(nextStartBoundaryRatio)
            : (
              Number.isFinite(mappedNextSamePage)
              ? Number(mappedNextSamePage)
                : null
            )
            )
        );
      const padBoundaryRatio = Number.isFinite(padBoundaryRatioRaw)
        ? Math.max(0, Math.min(1, Number(padBoundaryRatioRaw)))
        : null;
      if (Number.isFinite(padBoundaryRatio) && !hasEndOverride) {
        const nextTopPx = Math.floor(fullCanvas.height * padBoundaryRatio);
        const nextGapPx = mobileViewport
          ? Math.max(18, Math.floor(fullCanvas.height * 0.018))
          : Math.max(12, Math.floor(fullCanvas.height * 0.012));
        // 패딩 단계에서도 다음 문항 시작 경계를 절대 넘지 않게 강제
        paddedBottom = Math.min(paddedBottom, Math.max(srcTop + 1, nextTopPx - nextGapPx));
      }
      // 절대 안전 경계: 패딩 이후에도 start/end 컷을 넘지 않게 최종 클램프
      const safeTopPx = Math.max(0, Math.floor(fullCanvas.height * safeStart));
      const safeBottomPx = Math.max(safeTopPx + 1, Math.ceil(fullCanvas.height * safeEnd));
      paddedTop = Math.max(paddedTop, safeTopPx);
      paddedBottom = Math.min(paddedBottom, safeBottomPx);
      srcTop = paddedTop;
      srcHeight = Math.max(1, paddedBottom - srcTop);
      const portraitSingleMode = window.matchMedia("(max-width: 768px) and (orientation: portrait)").matches;
      // 좌우 여백(빈 흰 영역) 자동 트리밍으로 가독성을 높인다.
      const trim = detectHorizontalContentBounds(fullCanvas, srcTop, srcTop + srcHeight, {
        preserveSideRatio: portraitSingleMode
          ? (lowConfidenceRange ? 0.012 : 0)
          : (lowConfidenceRange ? 0.008 : 0),
        edgePadRatio: portraitSingleMode
          ? (lowConfidenceRange ? 0.01 : 0)
          : (lowConfidenceRange ? 0.006 : 0),
        edgePadMin: portraitSingleMode
          ? (lowConfidenceRange ? 4 : 0)
          : (lowConfidenceRange ? 2 : 0),
        inkThreshold: 232,
        // 상단 문항번호(예: "3.")가 잘리는 것을 막기 위해 상단 무시 비율을 축소
        ignoreTopRatio: 0.03,
        ignoreBottomRatio: 0.10,
        colStep: 1,
        rowStep: 2
      });
      // 좌우 여백을 줄이기 위해 트리밍을 더 허용하되,
      // 과도한 확대/축소 편차를 막기 위한 최소 유지폭은 남겨둔다.
      const minKeepRatio = portraitSingleMode
        ? (lowConfidenceRange ? 0.70 : 0.68)
        : (lowConfidenceRange ? 0.64 : 0.62);
      const desiredLeftMarginPx = Math.floor(fullCanvas.width * 0.018);
      if (trim.width < Math.floor(fullCanvas.width * minKeepRatio)) {
        // 과크롭 의심 시에도 좌측 여백을 전체보기 수준으로 유지한다.
        const gentleLeftTrimPx = Math.floor(fullCanvas.width * 0.08);
        const proposedLeft = Math.max(0, Number(trim.left || 0) - desiredLeftMarginPx);
        srcLeft = Math.max(0, Math.min(proposedLeft, gentleLeftTrimPx));
        srcWidth = Math.max(1, fullCanvas.width - srcLeft);
      } else {
        const trimRight = Math.min(fullCanvas.width, trim.left + trim.width);
        const maxSafeLeftTrimPx = Math.floor(fullCanvas.width * 0.12);
        const proposedLeft = Math.max(0, Number(trim.left || 0) - desiredLeftMarginPx);
        srcLeft = Math.max(0, Math.min(proposedLeft, maxSafeLeftTrimPx));
        srcWidth = Math.max(1, trimRight - srcLeft);
      }
    }

    // 오래 걸린 비동기 계산 이후, 최신 렌더 요청인지 다시 확인한다.
    if (token !== state.renderToken) return;

    const destWidth = fullCanvas.width;
    const destHeight = state.viewMode === "single"
      ? Math.max(1, Math.round(srcHeight * (destWidth / srcWidth)))
      : srcHeight;
    pdfCanvas.width = destWidth;
    pdfCanvas.height = destHeight;
    pdfCanvas.style.width = `${Math.ceil(cssViewport.width)}px`;
    const canvasCssHeight = Math.ceil(destHeight / outputScale);
    pdfCanvas.style.height = `${canvasCssHeight}px`;
    pdfCtx.clearRect(0, 0, pdfCanvas.width, pdfCanvas.height);
    pdfCtx.drawImage(
      fullCanvas,
      srcLeft, srcTop, srcWidth, srcHeight,
      0, 0, pdfCanvas.width, pdfCanvas.height
    );
    const selectedChoice = normalizeChoiceValue(state.answers[q]);
    if (state.viewMode === "single" && Number.isFinite(q) && Number.isFinite(selectedChoice)) {
      const visibleStartRatio = Math.max(0, Math.min(1, srcTop / Math.max(1, fullCanvas.height)));
      const visibleEndRatio = Math.max(visibleStartRatio + 0.02, Math.min(1, (srcTop + srcHeight) / Math.max(1, fullCanvas.height)));
      if (token !== state.renderToken) return;
      const sel = await resolveSelectedChoiceAnchorWithRecovery(
        safePage,
        q,
        selectedChoice,
        { startRatio: visibleStartRatio, endRatio: visibleEndRatio }
      );
      if (token !== state.renderToken) return;
      if (sel) {
        const sx = srcWidth / pdfCanvas.width;
        const sy = srcHeight / pdfCanvas.height;
        const ax = sel.xRatio * fullCanvas.width;
        const ay = sel.yRatio * fullCanvas.height;
        const aw = sel.wRatio * fullCanvas.width;
        const ah = sel.hRatio * fullCanvas.height;
        const dx = (ax - srcLeft) / sx;
        const dy = (ay - srcTop) / sy;
        const dw = Math.max(16, aw / sx);
        const dh = Math.max(18, ah / sy);
        const cx = dx + (dw * 0.5);
        const cy = dy + (dh * 0.5);
        const r = Math.max(13, Math.min(24, Math.max(dw, dh) * 0.65));
        if (cx < -r || cx > (pdfCanvas.width + r) || cy < -r || cy > (pdfCanvas.height + r)) {
          // 탐지점이 컷 영역 밖이면 현재 화면 내에서라도 선택 마커가 보이도록 클램프한다.
          const ccx = Math.max(r + 6, Math.min(pdfCanvas.width - r - 6, cx));
          const ccy = Math.max(r + 6, Math.min(pdfCanvas.height - r - 6, cy));
          pdfCtx.save();
          pdfCtx.lineWidth = 3;
          pdfCtx.strokeStyle = "#0a66d6";
          pdfCtx.fillStyle = "rgba(10,102,214,0.22)";
          pdfCtx.beginPath();
          pdfCtx.arc(ccx, ccy, r, 0, Math.PI * 2);
          pdfCtx.fill();
          pdfCtx.stroke();
          pdfCtx.restore();
        } else {
          pdfCtx.save();
          pdfCtx.lineWidth = 3;
          pdfCtx.strokeStyle = "#0a66d6";
          pdfCtx.fillStyle = "rgba(10,102,214,0.22)";
          pdfCtx.beginPath();
          pdfCtx.arc(cx, cy, r, 0, Math.PI * 2);
          pdfCtx.fill();
          pdfCtx.stroke();
          pdfCtx.restore();
        }
      }
    }
    if (state.viewMode === "single" && Number.isFinite(q)) {
      const gradeState = getViewerGradeState(q);
      if (gradeState) {
        const numberAnchor = await resolveQuestionNumberAnchorForMark(safePage, q);
        if (token !== state.renderToken) return;
        drawQuestionNumberMarker(gradeState, numberAnchor, fullCanvas, srcLeft, srcTop, srcWidth, srcHeight);
      }
    }
    if (token !== state.renderToken) return;
    state.lastRenderMeta = {
      page: safePage,
      q: Number.isFinite(q) ? q : null,
      viewMode: state.viewMode,
      cropLeftPx: srcLeft,
      cropStartPx: srcTop,
      cropWidthPx: srcWidth,
      cropHeightPx: srcHeight,
      fullWidthPx: fullCanvas.width,
      fullHeightPx: fullCanvas.height
    };
    const nearTag = activeRange && activeRange.lowConfidence ? " · 근접모드" : "";
    pdfStatus.textContent = `페이지 ${safePage}${Number.isFinite(q) ? ` · ${q}번` : ""} 표시 중${nearTag}`;
    setPdfLoading(false);
    if (state.scrollTopOnModeChange) {
      scrollPdfViewportTo(0);
      state.scrollTopOnModeChange = false;
    }
    prefetchSinglePageAround(pdf, safePage, viewWidth, outputScale);
  }

  async function renderAllPdfPages(q){
    const navToken = ++state.allNavToken;
    const pdf = await ensurePdfDocument();
    const mobileViewport = isMobileViewport();
    const viewWidth = Math.max(320, (pdfViewer.clientWidth || 900) - 20);
    const key = `${getQuestionPdfBaseUrl()}|${state.pdfZoom}|${Math.round(viewWidth)}`;
    const outputScale = getPdfOutputScale();

    if (state.allPagesRenderKey !== key) {
      pdfAllPages.innerHTML = "";
      state.allPageCanvases = [];
      state.allPageBaseCanvases = [];
      state.allPageCanvasMeta = {};
      state.allModeLastMarked = null;
      for (let p = 1; p <= pdf.numPages; p++){
        const pageObj = await pdf.getPage(p);
        if (navToken !== state.allNavToken) return;
        const baseViewport = pageObj.getViewport({ scale: 1 });
        const cssScale = Math.max(0.5, (viewWidth / baseViewport.width) * state.pdfZoom);
        const cssViewport = pageObj.getViewport({ scale: cssScale });

        const canvas = document.createElement("canvas");
        canvas.className = "pdfPageCanvas";
        canvas.dataset.page = String(p);
        canvas.width = Math.ceil(cssViewport.width * outputScale);
        canvas.height = Math.ceil(cssViewport.height * outputScale);
        canvas.style.width = `${Math.ceil(cssViewport.width)}px`;
        canvas.style.height = `${Math.ceil(cssViewport.height)}px`;
        const ctx = canvas.getContext("2d");
        await pageObj.render({
          canvasContext: ctx,
          viewport: cssViewport,
          transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null
        }).promise;
        if (navToken !== state.allNavToken) return;

        // 전체보기에서도 좌우 흰 여백을 줄여 실제 문제 영역 가독성을 높인다.
        const trim = detectHorizontalContentBounds(canvas, 0, canvas.height, {
          preserveSideRatio: 0,
          edgePadRatio: 0,
          edgePadMin: 0,
          inkThreshold: 232,
          ignoreTopRatio: 0.12,
          ignoreBottomRatio: 0.10,
          colStep: 1,
          rowStep: 2
        });
        if (trim.left > 0 || trim.width < canvas.width) {
          const destWidth = canvas.width;
          const destHeight = Math.max(1, Math.round(canvas.height * (destWidth / Math.max(1, trim.width))));
          const cropped = document.createElement("canvas");
          cropped.className = "pdfPageCanvas";
          cropped.dataset.page = String(p);
          cropped.width = destWidth;
          cropped.height = destHeight;
          cropped.style.width = canvas.style.width;
          cropped.style.height = `${Math.ceil(destHeight / outputScale)}px`;
          cropped.style.cursor = "pointer";
          cropped.addEventListener("click", onAllPdfCanvasClick);
          const cctx = cropped.getContext("2d");
          cctx.drawImage(
            canvas,
            trim.left, 0, trim.width, canvas.height,
            0, 0, destWidth, destHeight
          );
          pdfAllPages.appendChild(cropped);
          state.allPageCanvases[p] = cropped;
          state.allPageBaseCanvases[p] = cloneCanvas(cropped);
          state.allPageCanvasMeta[p] = {
            srcLeft: trim.left,
            srcWidth: trim.width,
            fullWidth: canvas.width,
            fullHeight: canvas.height,
            destWidth,
            destHeight
          };
          continue;
        }

        pdfAllPages.appendChild(canvas);
        canvas.style.cursor = "pointer";
        canvas.addEventListener("click", onAllPdfCanvasClick);
        state.allPageCanvases[p] = canvas;
        state.allPageBaseCanvases[p] = cloneCanvas(canvas);
        state.allPageCanvasMeta[p] = {
          srcLeft: 0,
          srcWidth: canvas.width,
          fullWidth: canvas.width,
          fullHeight: canvas.height,
          destWidth: canvas.width,
          destHeight: canvas.height
        };
      }
      state.allPagesRenderKey = key;
    }

    const targetQ = Number.isFinite(q) ? q : (state.focusQ || 1);
    
    const pageMap = state.pdfNav.questionPageMap;
    const ratioMap = state.pdfNav.questionTopRatioMap;
    let targetPage = null;
    let located = null;
    let presetRatio = null;

    if (mobileViewport){
      const presetAnchors = getPresetAnchorsForCurrentExam();
      if (presetAnchors){
        const mapped = buildMapFromAnchors(presetAnchors);
        if (Array.isArray(mapped.pageMap) && Number.isFinite(mapped.pageMap[targetQ])) {
          targetPage = Math.max(1, Math.min(pdf.numPages, Math.floor(mapped.pageMap[targetQ])));
          if (Array.isArray(mapped.ratioMap) && Number.isFinite(mapped.ratioMap[targetQ])) {
            presetRatio = Math.max(0, Math.min(1, Number(mapped.ratioMap[targetQ])));
          }
        }
      }
      if (!Number.isFinite(targetPage) && Array.isArray(pageMap) && Number.isFinite(pageMap[targetQ])) {
        targetPage = Math.max(1, Math.min(pdf.numPages, Math.floor(pageMap[targetQ])));
      }
      if (!Number.isFinite(targetPage)) {
        targetPage = Math.max(1, Math.min(pdf.numPages, getPdfPageByQuestion(targetQ)));
      }
    } else {
      located = await locateQuestionInPdf(targetQ);
      targetPage = located.page;
    }
    if (navToken !== state.allNavToken) return;
    const targetCanvas = state.allPageCanvases[targetPage];
    let ratio = 0.12;
    if (mobileViewport){
      if (Number.isFinite(presetRatio)) {
        ratio = presetRatio;
      } else if (Array.isArray(pageMap) && Array.isArray(ratioMap) && pageMap[targetQ] === targetPage && Number.isFinite(ratioMap[targetQ])) {
        ratio = Math.max(0, Math.min(1, Number(ratioMap[targetQ])));
      } else {
        ratio = 0.12;
      }
    } else {
      ratio = Number.isFinite(located?.ratio) ? located.ratio : 0.12;
    }
    // 한 문제 보기 시작점 보정은 데스크톱에만 적용.
    // 모바일 전체보기에서는 과보정으로 문항 오프셋이 커지는 경우가 있어 제외한다.
    if (!mobileViewport && Number.isFinite(targetQ)) {
      try{
        const range = await getQuestionCropRange(targetQ, targetPage);
        if (range && Number.isFinite(range.start) && Number.isFinite(range.focusStart)) {
          const fromCrop = Math.min(range.start, range.focusStart);
          if (Number.isFinite(fromCrop)) ratio = fromCrop;
        } else if (range && Number.isFinite(range.start)) {
          ratio = range.start;
        }
      }catch(_){}
    }
    // 전체보기에서는 저신뢰/말미 문항에서 하단 푸터로 과점프하는 경우가 있어,
    // 페이지맵 기반 비율을 우선 보정하고 하단 점프 상한을 둔다.
    const mappedRatio = (Array.isArray(pageMap) && Array.isArray(ratioMap) && pageMap[targetQ] === targetPage && Number.isFinite(ratioMap[targetQ]))
      ? Math.max(0, Math.min(1, Number(ratioMap[targetQ])))
      : null;
    if (mobileViewport && mappedRatio != null) {
      // 모바일 전체보기는 맵 기반 앵커를 우선해 문항 표시 일관성을 높인다.
      ratio = mappedRatio;
    }
    if (mappedRatio != null) {
      // 탐지값이 맵 기준보다 과도하게 아래쪽이면 맵 기준으로 되돌린다.
      if (!Number.isFinite(ratio) || ratio > (mappedRatio + 0.22)) {
        ratio = mappedRatio;
      }
    }
    ratio = mobileViewport
      ? Math.max(0.03, Math.min(0.8, ratio))
      : Math.max(0.04, Math.min(0.88, ratio));
    if (state.scrollTopOnModeChange) {
      scrollPdfViewportTo(0);
      state.scrollTopOnModeChange = false;
      state.currentPdfPage = 1;
      pdfStatus.textContent = "전체 페이지 표시 중 · 상단";
    } else {
      if (targetCanvas) {
        const top = targetCanvas.offsetTop + (targetCanvas.clientHeight * ratio) - 20;
        scrollPdfViewportTo(Math.max(0, top));
      }
      state.currentPdfPage = targetPage;
      const precision = mobileViewport ? "맵기준" : (located && located.exact ? "정확" : "근사");
      pdfStatus.textContent = `전체 페이지 표시 중 · ${targetPage}페이지${Number.isFinite(targetQ) ? ` · ${targetQ}번` : ""} (${precision})`;
    }
    await redrawAllModeMarkers(pdf.numPages);
    state.allModeLastMarked = null;
    setPdfLoading(false);
  }

  function scrollToQuestionAnchor(q, page){
    if (!Number.isFinite(q)) return;
    let ratio = null;
    const pageMap = state.pdfNav.questionPageMap;
    const ratioMap = state.pdfNav.questionTopRatioMap;
    if (Array.isArray(pageMap) && Array.isArray(ratioMap) && pageMap[q] === page && Number.isFinite(ratioMap[q])) {
      ratio = Math.max(0, Math.min(1, ratioMap[q]));
    }
    if (ratio == null) ratio = 0.12;
    const maxScrollable = Math.max(0, pdfViewer.scrollHeight - pdfViewer.clientHeight);
    const targetTop = Math.max(0, Math.min(maxScrollable, Math.round(maxScrollable * ratio)));
    scrollPdfViewportTo(targetTop);
    pdfStatus.textContent = `페이지 ${page} · ${q}번 위치로 이동`;
  }

  function scrollPdfViewportTo(top){
    const safeTop = Math.max(0, Number(top) || 0);
    const canScrollInsideViewer = (pdfViewer.scrollHeight - pdfViewer.clientHeight) > 4;
    if (canScrollInsideViewer){
      pdfViewer.scrollTo({ top: safeTop, behavior: "auto" });
      requestAnimationFrame(updateViewerTopBadge);
      return;
    }
    const viewerRectTop = pdfViewer.getBoundingClientRect().top + window.scrollY;
    window.scrollTo({ top: Math.max(0, viewerRectTop + safeTop - getViewerScrollAnchorOffset()), behavior: "auto" });
    requestAnimationFrame(updateViewerTopBadge);
  }

  function getViewerScrollAnchorOffset(){
    const portraitMobile = window.matchMedia("(max-width: 768px) and (orientation: portrait)").matches;
    if (!portraitMobile) return 8;
    const hh = appHeader ? Math.ceil(appHeader.getBoundingClientRect().height || appHeader.offsetHeight || 0) : 0;
    const bh = pdfTitleBarEl ? Math.ceil(pdfTitleBarEl.getBoundingClientRect().height || pdfTitleBarEl.offsetHeight || 0) : 0;
    // fixed 헤더 + fixed 컨트롤바 높이를 반영해 문항 위치 오프셋 보정
    return Math.max(8, hh + bh + 6);
  }

  function shouldShowViewerTopBadge(){
    const portraitMobile = window.matchMedia("(max-width: 768px) and (orientation: portrait)").matches;
    const nonMobile = !window.matchMedia("(max-width: 768px)").matches;
    return portraitMobile || nonMobile;
  }

  function getViewerScrollTop(){
    const canScrollInsideViewer = (pdfViewer.scrollHeight - pdfViewer.clientHeight) > 4;
    if (canScrollInsideViewer) return Math.max(0, pdfViewer.scrollTop || 0);
    const viewerTop = pdfViewer.getBoundingClientRect().top + window.scrollY;
    return Math.max(0, window.scrollY - (viewerTop - getViewerScrollAnchorOffset()));
  }

  function getViewerGradeState(q){
    if (!Number.isFinite(q)) return null;
    const chosen = normalizeChoiceValue(state.answers[q]);
    const correct = getCorrectAnswer(q);
    if (chosen == null || !Number.isFinite(correct)) return null;
    const card = getCard(q);
    const mark = card ? card.querySelector('[data-role="mark"]') : null;
    const graded = !!autoGradeEl.checked || !!(mark && (mark.classList.contains("ok") || mark.classList.contains("bad")));
    if (!graded) return null;
    return chosen === correct ? "ok" : "bad";
  }

  async function resolveQuestionAnchorForMark(pageNo, q){
    if (!Number.isFinite(pageNo) || !Number.isFinite(q)) return null;
    const chosen = normalizeChoiceValue(state.answers[q]);
    if (Number.isFinite(chosen)) {
      try{
        const anchors = await getChoiceAnchorsForQuestion(pageNo, q);
        const sel = Array.isArray(anchors) ? anchors.find((a) => a.choice === chosen) : null;
        if (sel && Number.isFinite(sel.xRatio) && Number.isFinite(sel.yRatio) && Number.isFinite(sel.wRatio) && Number.isFinite(sel.hRatio)) {
          return {
            xRatio: Math.max(0, Math.min(1, sel.xRatio + (sel.wRatio * 0.5))),
            yRatio: Math.max(0, Math.min(1, sel.yRatio + (sel.hRatio * 0.5)))
          };
        }
      }catch(_){}
    }
    try{
      const anchorMap = await getQuestionStartAnchorsForPage(pageNo);
      const a = anchorMap && anchorMap.get(q);
      if (a && Number.isFinite(a.xRatio) && Number.isFinite(a.yRatio)) {
        return {
          xRatio: Math.max(0.04, Math.min(0.14, a.xRatio)),
          yRatio: Math.max(0, Math.min(1, a.yRatio))
        };
      }
    }catch(_){}

    const pageRatios = await getQuestionRatiosForPage(pageNo);
    if (pageRatios && Number.isFinite(pageRatios.get(q))) {
      return { xRatio: 0.075, yRatio: Math.max(0, Math.min(1, pageRatios.get(q))) };
    }
    const pageMap = state.pdfNav.questionPageMap;
    const ratioMap = state.pdfNav.questionTopRatioMap;
    if (Array.isArray(pageMap) && Array.isArray(ratioMap) && pageMap[q] === pageNo && Number.isFinite(ratioMap[q])) {
      return { xRatio: 0.075, yRatio: Math.max(0, Math.min(1, ratioMap[q])) };
    }
    try{
      const range = await getQuestionCropRange(q, pageNo);
      if (range && Number.isFinite(range.focusStart)) {
        return { xRatio: 0.075, yRatio: Math.max(0, Math.min(1, range.focusStart)) };
      }
    }catch(_){}
    return null;
  }

  async function resolveQuestionNumberAnchorForMark(pageNo, q){
    if (!Number.isFinite(pageNo) || !Number.isFinite(q)) return null;
    try{
      const anchorMap = await getQuestionStartAnchorsForPage(pageNo);
      const a = anchorMap && anchorMap.get(q);
      if (a && Number.isFinite(a.xRatio) && Number.isFinite(a.yRatio)) {
        // 문제 번호를 감싸는 손그림 마커는 문장 시작점보다 약간 좌측/하단에 위치시킨다.
        return {
          xRatio: Math.max(0.04, Math.min(0.12, a.xRatio + 0.006)),
          yRatio: Math.max(0, Math.min(1, a.yRatio + 0.012))
        };
      }
    }catch(_){}
    const pageRatios = await getQuestionRatiosForPage(pageNo);
    if (pageRatios && Number.isFinite(pageRatios.get(q))) {
      return { xRatio: 0.062, yRatio: Math.max(0, Math.min(1, pageRatios.get(q) + 0.012)) };
    }
    return null;
  }

  function projectGradeMarkerPointSingle(anchor, fullCanvas, srcLeft, srcTop, srcWidth, srcHeight){
    if (!anchor || !fullCanvas || !Number.isFinite(anchor.yRatio)) return null;
    const sx = srcWidth / pdfCanvas.width;
    const sy = srcHeight / pdfCanvas.height;
    const xFullRaw = Math.round(fullCanvas.width * (Number.isFinite(anchor.xRatio) ? anchor.xRatio : 0.075));
    const xFull = Math.max(srcLeft + 8, Math.min(srcLeft + srcWidth - 8, xFullRaw));
    const yFullRaw = Math.round(fullCanvas.height * anchor.yRatio);
    const yFull = Math.max(srcTop + 10, Math.min(srcTop + srcHeight - 10, yFullRaw));
    const x = (xFull - srcLeft) / sx;
    const y = (yFull - srcTop) / sy;
    if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
    return { x, y };
  }

  function projectGradeMarkerPointAll(anchor, meta){
    if (!anchor || !meta || !Number.isFinite(anchor.yRatio)) return null;
    const sx = meta.srcWidth / meta.destWidth;
    const sy = meta.fullHeight / meta.destHeight;
    const xFullRaw = Math.round(meta.fullWidth * (Number.isFinite(anchor.xRatio) ? anchor.xRatio : 0.075));
    const xFull = Math.max(meta.srcLeft + 8, Math.min(meta.srcLeft + meta.srcWidth - 8, xFullRaw));
    const yFullRaw = Math.round(meta.fullHeight * anchor.yRatio);
    const yFull = Math.max(10, Math.min(meta.fullHeight - 10, yFullRaw));
    const x = (xFull - meta.srcLeft) / sx;
    const y = yFull / sy;
    if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
    return { x, y };
  }

  function drawQuestionGradeMarker(gradeState, anchor, fullCanvas, srcLeft, srcTop, srcWidth, srcHeight){
    if (!gradeState) return;
    const point = projectGradeMarkerPointSingle(anchor, fullCanvas, srcLeft, srcTop, srcWidth, srcHeight);
    if (!point) return;
    const radius = Math.max(11, Math.min(20, pdfCanvas.width * 0.013));
    pdfCtx.save();
    pdfCtx.lineCap = "round";
    pdfCtx.lineJoin = "round";
    drawGradeMarkerImage(pdfCtx, gradeState === "ok" ? "ok" : "bad", point.x, point.y, radius);
    pdfCtx.restore();
  }

  function drawQuestionNumberMarker(gradeState, anchor, fullCanvas, srcLeft, srcTop, srcWidth, srcHeight){
    if (!gradeState) return;
    const point = projectGradeMarkerPointSingle(anchor, fullCanvas, srcLeft, srcTop, srcWidth, srcHeight);
    if (!point) return;
    const radius = Math.max(12, Math.min(22, pdfCanvas.width * 0.0135));
    pdfCtx.save();
    pdfCtx.lineCap = "round";
    pdfCtx.lineJoin = "round";
    drawGradeMarkerImage(pdfCtx, gradeState === "ok" ? "num_ok" : "num_bad", point.x, point.y, radius);
    pdfCtx.restore();
  }

  function getGradeMarkerImage(kind){
    const markerKind = (
      kind === "bad" ? "bad"
      : (kind === "num_bad" ? "num_bad"
        : (kind === "num_ok" ? "num_ok" : "ok"))
    );
    const key = `${markerKind}:v${GRADE_MARKER_VERSION}`;
    if (state.gradeMarkerImageCache[key]) return state.gradeMarkerImageCache[key];
    const svg = GRADE_MARKER_SVG[markerKind];
    const dataUrl = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    const img = new Image();
    img.decoding = "async";
    img.src = dataUrl;
    state.gradeMarkerImageCache[key] = img;
    return img;
  }

  function preloadGradeMarkerImages(){
    getGradeMarkerImage("ok");
    getGradeMarkerImage("bad");
    getGradeMarkerImage("num_ok");
    getGradeMarkerImage("num_bad");
  }

  function drawGradeMarkerImage(ctx, kind, x, y, radius){
    const img = getGradeMarkerImage(kind);
    if (!img || !img.complete) return;
    const scalePx = Math.max(1, (ctx.canvas.width || 1) / Math.max(1, ctx.canvas.clientWidth || 1));
    const mobileBoost = isMobileViewport() ? 1.14 : 1;
    const size = Math.max(26 * scalePx, radius * 3.1 * mobileBoost);
    const dx = x - (size * 0.5);
    const dy = y - (size * 0.5);
    ctx.globalAlpha = 0.97;
    ctx.drawImage(img, dx, dy, size, size);
  }

  function cloneCanvas(src){
    if (!src) return null;
    const c = document.createElement("canvas");
    c.width = src.width;
    c.height = src.height;
    const ctx = c.getContext("2d");
    ctx.drawImage(src, 0, 0);
    return c;
  }

  function restoreAllPageCanvas(pageNo){
    const canvas = state.allPageCanvases[pageNo];
    const base = state.allPageBaseCanvases[pageNo];
    if (!canvas || !base) return false;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(base, 0, 0);
    return true;
  }

  async function drawAllModeSelectedMarker(pageNo, q){
    if (!Number.isFinite(pageNo) || !Number.isFinite(q)) return false;
    const selected = normalizeChoiceValue(state.answers[q]);
    if (!Number.isFinite(selected)) return false;
    const canvas = state.allPageCanvases[pageNo];
    const meta = state.allPageCanvasMeta[pageNo];
    if (!canvas || !meta) return false;

    let hint = null;
    try{
      const range = await getQuestionCropRange(q, pageNo);
      if (range && Number.isFinite(range.focusStart) && Number.isFinite(range.focusEnd)) {
        hint = { startRatio: Number(range.focusStart), endRatio: Number(range.focusEnd) };
      } else if (range && Number.isFinite(range.start) && Number.isFinite(range.end)) {
        hint = { startRatio: Number(range.start), endRatio: Number(range.end) };
      }
    }catch(_){}

    const sel = await resolveSelectedChoiceAnchorWithRecovery(pageNo, q, selected, hint);
    if (!sel) return false;

    const sx = meta.srcWidth / meta.destWidth;
    const sy = meta.fullHeight / meta.destHeight;
    const ax = sel.xRatio * meta.fullWidth;
    const ay = sel.yRatio * meta.fullHeight;
    const aw = sel.wRatio * meta.fullWidth;
    const ah = sel.hRatio * meta.fullHeight;
    const dx = (ax - meta.srcLeft) / sx;
    const dy = ay / sy;
    const dw = Math.max(14, aw / sx);
    const dh = Math.max(16, ah / sy);
    const cx = dx + (dw * 0.5);
    const cy = dy + (dh * 0.5);
    const r = Math.max(11, Math.min(22, Math.max(dw, dh) * 0.62));

    const ctx = canvas.getContext("2d");
    ctx.save();
    ctx.lineWidth = 2.6;
    ctx.strokeStyle = "#0a66d6";
    ctx.fillStyle = "rgba(10,102,214,0.2)";
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
    return true;
  }

  function getAllModePageForQuestion(q, totalPages){
    const pageMap = state.pdfNav.questionPageMap;
    if (Array.isArray(pageMap) && Number.isFinite(pageMap[q])) {
      return Math.max(1, Math.min(totalPages, Math.floor(pageMap[q])));
    }
    return Math.max(1, Math.min(totalPages, getPdfPageByQuestion(q)));
  }

  async function drawAllModeGradeMarker(pageNo, q, gradeState){
    if (!Number.isFinite(pageNo) || !Number.isFinite(q) || !gradeState) return false;
    const canvas = state.allPageCanvases[pageNo];
    const meta = state.allPageCanvasMeta[pageNo];
    if (!canvas || !meta) return false;
    const anchor = await resolveQuestionAnchorForMark(pageNo, q);
    if (!anchor || !Number.isFinite(anchor.yRatio)) return false;

    const ctx = canvas.getContext("2d");
    const point = projectGradeMarkerPointAll(anchor, meta);
    if (!point) return false;
    const radius = Math.max(11, Math.min(20, canvas.width * 0.013));

    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    drawGradeMarkerImage(ctx, gradeState === "ok" ? "ok" : "bad", point.x, point.y, radius);
    ctx.restore();
    return true;
  }

  async function drawAllModeQuestionNumberMarker(pageNo, q, gradeState){
    if (!Number.isFinite(pageNo) || !Number.isFinite(q) || !gradeState) return false;
    const canvas = state.allPageCanvases[pageNo];
    const meta = state.allPageCanvasMeta[pageNo];
    if (!canvas || !meta) return false;
    const anchor = await resolveQuestionNumberAnchorForMark(pageNo, q);
    if (!anchor || !Number.isFinite(anchor.yRatio)) return false;
    const point = projectGradeMarkerPointAll(anchor, meta);
    if (!point) return false;
    const radius = Math.max(12, Math.min(22, canvas.width * 0.0135));
    const ctx = canvas.getContext("2d");
    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    drawGradeMarkerImage(ctx, gradeState === "ok" ? "num_ok" : "num_bad", point.x, point.y, radius);
    ctx.restore();
    return true;
  }

  async function redrawAllModeMarkers(totalPages){
    for (let p = 1; p <= totalPages; p++){
      restoreAllPageCanvas(p);
    }
    for (let q = 1; q <= 100; q++){
      const selected = normalizeChoiceValue(state.answers[q]);
      if (!Number.isFinite(selected)) continue;
      const pageNo = getAllModePageForQuestion(q, totalPages);
      await drawAllModeSelectedMarker(pageNo, q);
      const gradeState = getViewerGradeState(q);
      if (gradeState) {
        await drawAllModeQuestionNumberMarker(pageNo, q, gradeState);
      }
    }
  }

  function updateViewerTopBadge(){
    if (!btnViewerTop) return;
    if (state.viewMode === "single"){
      btnViewerTop.classList.remove("show");
      return;
    }
    if (!shouldShowViewerTopBadge()){
      btnViewerTop.classList.remove("show");
      return;
    }
    const nonMobile = !window.matchMedia("(max-width: 768px)").matches;
    const top = getViewerScrollTop();
    if (nonMobile) {
      const rect = pdfViewer.getBoundingClientRect();
      const badgeW = Math.max(48, btnViewerTop.offsetWidth || 48);
      const x = Math.max(8, Math.round(rect.right - badgeW - 12));
      const y = 16;
      btnViewerTop.style.left = `${x}px`;
      btnViewerTop.style.right = "auto";
      btnViewerTop.style.bottom = `${y}px`;
      btnViewerTop.classList.add("show");
      return;
    }
    btnViewerTop.style.left = "";
    btnViewerTop.style.right = "";
    btnViewerTop.style.bottom = "";
    btnViewerTop.classList.toggle("show", top > 120);
  }

  function setPdfFramePage(page, q, loadingToken = null){
    state.currentPdfPage = Math.max(1, Math.floor(page));
    state.pdfNavNonce += 1;
    const token = Number.isFinite(loadingToken) ? loadingToken : beginDelayedPdfLoading("PDF 로딩 중...");
    renderPdfPage(state.currentPdfPage, q).catch((err) => {
      endDelayedPdfLoading(token);
      const msg = (err && err.message) ? err.message : "알 수 없는 오류";
      pdfStatus.innerHTML = `PDF 표시 실패: ${msg} <button id="btnPdfRetry" type="button">재시도</button>`;
    }).then(() => {
      endDelayedPdfLoading(token);
    });
  }

  function navigatePdfToQuestion(q){
    warmupQuestionLocateCache(q);
    if (state.viewMode === "single") {
      const loadingToken = beginDelayedPdfLoading("PDF 로딩 중...");
      locateQuestionInPdf(q).then((located) => {
        const page = (located && Number.isFinite(located.page))
          ? Math.max(1, Math.floor(located.page))
          : getPdfPageByQuestion(q);
        setPdfFramePage(page, q, loadingToken);
      }).catch(() => {
        const targetPage = getPdfPageByQuestion(q);
        setPdfFramePage(targetPage, q, loadingToken);
      });
      return;
    }
    const loadingToken = beginDelayedPdfLoading("PDF 로딩 중...");
    renderAllPdfPages(q).catch((err) => {
      endDelayedPdfLoading(loadingToken);
      const msg = (err && err.message) ? err.message : "알 수 없는 오류";
      pdfStatus.innerHTML = `PDF 표시 실패: ${msg} <button id="btnPdfRetry" type="button">재시도</button>`;
    }).then(() => {
      endDelayedPdfLoading(loadingToken);
    });
  }

  function loadPdfJsLib(){
    if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
    if (pdfJsLoaderPromise) return pdfJsLoaderPromise;
    pdfJsLoaderPromise = new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      script.onload = () => {
        if (window.pdfjsLib) resolve(window.pdfjsLib);
        else reject(new Error("pdf.js load failed"));
      };
      script.onerror = () => reject(new Error("pdf.js script error"));
      document.head.appendChild(script);
    });
    return pdfJsLoaderPromise;
  }

  function loadTesseractLib(){
    if (window.Tesseract) return Promise.resolve(window.Tesseract);
    if (tesseractLoaderPromise) return tesseractLoaderPromise;
    tesseractLoaderPromise = new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
      script.onload = () => {
        if (window.Tesseract) resolve(window.Tesseract);
        else reject(new Error("tesseract load failed"));
      };
      script.onerror = () => reject(new Error("tesseract script error"));
      document.head.appendChild(script);
    });
    return tesseractLoaderPromise;
  }

  function normalizeOcrToken(s){
    return String(s || "")
      .replace(/[Il|]/g, "1")
      .replace(/[Oo]/g, "0")
      .replace(/\s+/g, "")
      .trim();
  }

  function parseQuestionNumberFromOcrLine(text){
    const t = normalizeOcrToken(text);
    if (!t) return null;
    let m = t.match(/^(\d{1,3})(?:[.)]|번)/);
    if (m) return Number(m[1]);
    m = t.match(/^제(\d{1,3})문/);
    if (m) return Number(m[1]);
    return null;
  }

  async function getOcrQuestionStartRatiosForPage(pageNo){
    const key = String(pageNo);
    if (state.pageOcrQuestionStartCache[key]) return state.pageOcrQuestionStartCache[key];

    const resultMap = new Map();
    try{
      const Tesseract = await loadTesseractLib();
      const pdf = await ensurePdfDocument();
      const page = await pdf.getPage(pageNo);
      const viewport = page.getViewport({ scale: 1.35 });
      const ocrCanvas = document.createElement("canvas");
      ocrCanvas.width = Math.max(1, Math.floor(viewport.width));
      ocrCanvas.height = Math.max(1, Math.floor(viewport.height));
      const ocrCtx = ocrCanvas.getContext("2d");
      await page.render({ canvasContext: ocrCtx, viewport }).promise;

      const recognized = await Tesseract.recognize(ocrCanvas, "kor+eng", { logger: () => {} });
      const words = (((recognized || {}).data || {}).words) || [];
      const rows = [];
      for (const w of words){
        const text = String(w.text || "").trim();
        if (!text) continue;
        const bbox = w.bbox || {};
        const x0 = Number(bbox.x0), x1 = Number(bbox.x1), y0 = Number(bbox.y0), y1 = Number(bbox.y1);
        if (![x0, x1, y0, y1].every(Number.isFinite)) continue;
        const yMid = (y0 + y1) / 2;
        let row = null;
        for (const r of rows){
          if (Math.abs(r.y - yMid) <= 8) { row = r; break; }
        }
        if (!row){
          row = { y: yMid, parts: [] };
          rows.push(row);
        }
        row.parts.push({ x: x0, t: text, top: y0 });
      }
      for (const row of rows){
        row.parts.sort((a, b) => a.x - b.x);
        if (!row.parts.length) continue;
        const xRatio = row.parts[0].x / ocrCanvas.width;
        if (xRatio > 0.45) continue;
        const lineText = row.parts.map(p => p.t).join(" ");
        const qn = parseQuestionNumberFromOcrLine(lineText);
        if (!Number.isFinite(qn) || qn < 1 || qn > 100) continue;
        const top = Math.max(0, Math.min(ocrCanvas.height - 1, row.parts[0].top));
        const ratio = top / ocrCanvas.height;
        if (!resultMap.has(qn) || ratio < resultMap.get(qn)) resultMap.set(qn, ratio);
      }
    }catch(_){
      // OCR 실패 시 빈 맵 유지
    }
    state.pageOcrQuestionStartCache[key] = resultMap;
    return resultMap;
  }

  function buildLineText(items){
    const lines = [];
    let currentY = null;
    let line = [];
    for (const it of items){
      const y = Number(it.transform && it.transform[5]);
      if (currentY == null) {
        currentY = y;
      }
      if (Math.abs(y - currentY) > 2){
        lines.push(line.join(" ").trim());
        line = [];
        currentY = y;
      }
      line.push((it.str || "").trim());
    }
    if (line.length) lines.push(line.join(" ").trim());
    return lines.join("\n");
  }

  function parseQuestionNumberFromLineStart(lineText){
    const t = lineText.trim();
    if (!t) return null;

    // 문제 번호는 "3." 또는 "3번" 계열만 허용해 선택지 "3)" 오검출을 줄인다.
    let m = t.match(/^\(?\s*(\d{1,3})\s*(?:번|[.])(?:\s+|$)/);
    if (m) {
      const q = Number(m[1]);
      return q >= 1 && q <= 100 ? q : null;
    }

    m = t.match(/^제\s*(\d{1,3})\s*문\s*/);
    if (m) {
      const q = Number(m[1]);
      return q >= 1 && q <= 100 ? q : null;
    }

    m = t.match(/^문(?:항|제)?\s*(\d{1,3})\s*/);
    if (m) {
      const q = Number(m[1]);
      return q >= 1 && q <= 100 ? q : null;
    }

    return null;
  }

  function normalizeChoiceValue(value){
    const n = Number(value);
    if (!Number.isFinite(n)) return null;
    const c = Math.trunc(n);
    return (c >= 1 && c <= 4) ? c : null;
  }

  function parseChoiceNumberToken(token){
    const t = String(token || "").trim();
    if (!t) return null;
    const normalized = t.normalize("NFKC");
    const circled = {
      "①": 1, "②": 2, "③": 3, "④": 4,
      "❶": 1, "❷": 2, "❸": 3, "❹": 4,
      "➀": 1, "➁": 2, "➂": 3, "➃": 4,
      "➊": 1, "➋": 2, "➌": 3, "➍": 4,
      "⓵": 1, "⓶": 2, "⓷": 3, "⓸": 4,
      "㈠": 1, "㈡": 2, "㈢": 3, "㈣": 4,
      "㊀": 1, "㊁": 2, "㊂": 3, "㊃": 4,
      "㉠": 1, "㉡": 2, "㉢": 3, "㉣": 4
    };
    if (circled[t]) return circled[t];
    if (circled[normalized]) return circled[normalized];
    let m = t.match(/^([①②③④❶❷❸❹➀➁➂➃➊➋➌➍⓵⓶⓷⓸㈠㈡㈢㈣㊀㊁㊂㊃㉠㉡㉢㉣])/);
    if (m && circled[m[1]]) return circled[m[1]];
    m = normalized.match(/^([①②③④❶❷❸❹➀➁➂➃➊➋➌➍⓵⓶⓷⓸㈠㈡㈢㈣㊀㊁㊂㊃㉠㉡㉢㉣])/);
    if (m && circled[m[1]]) return circled[m[1]];
    m = t.match(/^([1-4])\s*[.)]/);
    if (m) return Number(m[1]);
    m = normalized.match(/^\(([1-4])\)$/);
    if (m) return Number(m[1]);
    m = normalized.match(/^\[([1-4])\]$/);
    if (m) return Number(m[1]);
    m = normalized.match(/^([1-4])\s*[.)]$/);
    if (m) return Number(m[1]);
    return null;
  }

  function parseWeakChoiceDigitToken(token){
    const t = String(token || "").trim().normalize("NFKC");
    if (/^[1-4]$/.test(t)) return Number(t);
    return null;
  }

  function pathRoundedRect(ctx, x, y, w, h, r){
    const rr = Math.max(0, Math.min(r, Math.min(w, h) / 2));
    if (typeof ctx.roundRect === "function") {
      ctx.roundRect(x, y, w, h, rr);
      return;
    }
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  async function getChoiceAnchorsForQuestion(pageNo, q, options = null){
    const hasOptions = !!(options && typeof options === "object");
    const cacheKey = `${pageNo}:${q}`;
    if (!hasOptions && state.questionChoiceAnchorCache[cacheKey]) return state.questionChoiceAnchorCache[cacheKey];

    const pageRatios = await getQuestionRatiosForPage(pageNo);
    let startRatioBase = (pageRatios && pageRatios.has(q)) ? pageRatios.get(q) : null;
    if (!Number.isFinite(startRatioBase)) {
      const pageMap = state.pdfNav.questionPageMap;
      const ratioMap = state.pdfNav.questionTopRatioMap;
      if (Array.isArray(pageMap) && Array.isArray(ratioMap) && pageMap[q] === pageNo && Number.isFinite(ratioMap[q])) {
        startRatioBase = Number(ratioMap[q]);
      }
    }
    if (!Number.isFinite(startRatioBase)) {
      try{
        const range = await getQuestionCropRange(q, pageNo);
        if (range && Number.isFinite(range.start)) {
          startRatioBase = Number(range.start);
        } else if (range && Number.isFinite(range.focusStart)) {
          startRatioBase = Number(range.focusStart);
        }
      }catch(_){}
    }
    const currentRenderMeta = state.lastRenderMeta;
    const canUseRenderHint = (
      !hasOptions &&
      currentRenderMeta &&
      currentRenderMeta.viewMode === "single" &&
      currentRenderMeta.page === pageNo &&
      currentRenderMeta.q === q &&
      Number.isFinite(currentRenderMeta.cropStartPx) &&
      Number.isFinite(currentRenderMeta.cropHeightPx) &&
      Number.isFinite(currentRenderMeta.fullHeightPx) &&
      currentRenderMeta.fullHeightPx > 0
    );
    const renderHintStart = canUseRenderHint
      ? Math.max(0, Math.min(1, Number(currentRenderMeta.cropStartPx) / Number(currentRenderMeta.fullHeightPx)))
      : null;
    const renderHintEnd = canUseRenderHint
      ? Math.max(0.02, Math.min(1, (Number(currentRenderMeta.cropStartPx) + Number(currentRenderMeta.cropHeightPx)) / Number(currentRenderMeta.fullHeightPx)))
      : null;

    const optStart = (hasOptions && Number.isFinite(options.startRatio)) ? Number(options.startRatio) : null;
    const startRatio = Number.isFinite(optStart)
      ? Math.max(0, Math.min(1, optStart))
      : (Number.isFinite(renderHintStart)
          ? renderHintStart
          : (Number.isFinite(startRatioBase) ? Math.max(0, Math.min(1, startRatioBase)) : 0));
    let endRatio = 1;
    if (pageRatios && pageRatios.size > 0){
      const sorted = Array.from(pageRatios.entries()).sort((a, b) => a[0] - b[0]);
      for (const [k, v] of sorted){
        if (k > q && Number.isFinite(v) && v > startRatio + 0.01) {
          endRatio = Math.max(startRatio + 0.02, v - 0.005);
          break;
        }
      }
    }
    if (endRatio >= 0.999) {
      const pageMap = state.pdfNav.questionPageMap;
      const ratioMap = state.pdfNav.questionTopRatioMap;
      if (Array.isArray(pageMap) && Array.isArray(ratioMap) && q < 100 && pageMap[q + 1] === pageNo && Number.isFinite(ratioMap[q + 1])) {
        endRatio = Math.max(startRatio + 0.02, Math.min(1, Number(ratioMap[q + 1]) - 0.004));
      }
    }
    if (endRatio >= 0.999 && Number.isFinite(startRatioBase)) {
      endRatio = Math.max(startRatio + 0.02, Math.min(1, startRatio + 0.46));
    }
    if (hasOptions && Number.isFinite(options.endRatio)) {
      const optEnd = Math.max(startRatio + 0.02, Math.min(1, Number(options.endRatio)));
      endRatio = Math.min(endRatio, optEnd);
    }
    if (Number.isFinite(renderHintEnd)) {
      endRatio = Math.min(endRatio, Math.max(startRatio + 0.02, renderHintEnd));
    }

    const layer = await getQuestionPageTextLayer(pageNo);
    const pageW = layer.pageW;
    const pageH = layer.pageH;
    const anchors = [];
    const weakAnchors = [];

    for (const item of (layer.items || [])){
      const rawToken = String(item.str || "").trim();
      const choice = parseChoiceNumberToken(rawToken);
      const weakChoice = !choice ? parseWeakChoiceDigitToken(rawToken) : null;
      if (!choice && !weakChoice) continue;
      const x = Number(item.transform && item.transform[4]);
      const y = Number(item.transform && item.transform[5]);
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
      const iw = Math.max(8, Math.abs(Number(item.width) || 0));
      const ih = Math.max(8, Math.abs(Number(item.height) || 0));
      const top = Math.max(0, Math.min(pageH - ih, pageH - y - ih));
      const topRatio = top / pageH;
      const startGuard = hasOptions ? 0.002 : 0.014;
      if (topRatio < startRatio + startGuard) continue;
      const compact = rawToken.replace(/\s+/g, "");
      const numericToken = /^\(?[1-4][.)]/.test(compact);
      if (numericToken && (x / pageW) < 0.16 && topRatio < startRatio + 0.09) continue;
      if (topRatio < startRatio - 0.01 || topRatio > endRatio + 0.01) continue;

      const row = {
        choice: choice || weakChoice,
        xRatio: Math.max(0, Math.min(1, x / pageW)),
        yRatio: Math.max(0, Math.min(1, top / pageH)),
        wRatio: Math.max(0.004, Math.min(0.2, iw / pageW)),
        hRatio: Math.max(0.006, Math.min(0.15, ih / pageH))
      };
      if (choice) {
        anchors.push(row);
      } else {
        // 약한 토큰(단독 숫자)은 후보로만 보관한다.
        weakAnchors.push(row);
      }
    }

    const pickChoices = (list, targetYRatio = null) => {
      const picked = [];
      for (let c = 1; c <= 4; c++){
        const rows = list.filter(a => a.choice === c).sort((a, b) => {
          if (targetYRatio != null) {
            const da = Math.abs(a.yRatio - targetYRatio);
            const db = Math.abs(b.yRatio - targetYRatio);
            if (da !== db) return da - db;
          }
          return a.yRatio - b.yRatio || a.xRatio - b.xRatio;
        });
        if (rows.length) picked.push(rows[0]);
      }
      return picked;
    };

    // 옵션으로 start/end가 주어지면(단일문항 렌더), 해당 구간 중심 후보를 초기값으로 사용한다.
    // 단, 여기서 조기 반환하지 않고 아래 누락 보강(weak anchors)까지 반드시 수행한다.
    let hintedResult = null;
    if (hasOptions && Number.isFinite(startRatio) && Number.isFinite(endRatio)) {
      const lo = Math.max(0, startRatio - 0.004);
      const hi = Math.min(1, endRatio + 0.01);
      const band = anchors.filter((a) => a.yRatio >= lo && a.yRatio <= hi);
      const scoped = band.length ? band : anchors;
      const center = (lo + hi) * 0.5;
      const hinted = pickChoices(scoped, center);
      if (hinted.length) hintedResult = hinted;
    }

    // 1차: 좌측 그룹 우선(문항 번호 오인식 완화)
    let refined = anchors;
    if (anchors.length){
      const minX = Math.min(...anchors.map(a => a.xRatio));
      const xCut = Math.min(0.38, minX + 0.22);
      refined = anchors.filter(a => a.xRatio <= xCut);
    }
    let result = hintedResult && hintedResult.length ? hintedResult : pickChoices(refined);
    // 2차: 선지 누락 시 전체 앵커로 재탐색(세로 배열/다단 배치 대응)
    if (result.length < 4) {
      result = pickChoices(anchors);
    }
    // 2.5차: ③④ 누락 등 강한 토큰 부족 시, 약한 토큰(단독 숫자)을 위치 제약으로 보강한다.
    if (result.length < 4 && weakAnchors.length) {
      const existingChoices = new Set(result.map((a) => a.choice));
      const xSeeds = result.length ? result.map((a) => a.xRatio) : anchors.map((a) => a.xRatio);
      const yMin = (result.length ? Math.min(...result.map((a) => a.yRatio)) : Math.min(...anchors.map((a) => a.yRatio), 0));
      const yMax = (result.length ? Math.max(...result.map((a) => a.yRatio)) : Math.max(...anchors.map((a) => a.yRatio), 1));
      const combined = result.slice();

      for (let c = 1; c <= 4; c++){
        if (existingChoices.has(c)) continue;
        let rows = weakAnchors.filter((a) => a.choice === c);
        if (xSeeds.length) {
          rows = rows.filter((a) => xSeeds.some((x0) => Math.abs(a.xRatio - x0) <= 0.09));
        }
        rows = rows.filter((a) => a.yRatio >= (yMin - 0.02) && a.yRatio <= (yMax + 0.22));
        rows.sort((a, b) => a.yRatio - b.yRatio || a.xRatio - b.xRatio);
        if (rows.length) combined.push(rows[0]);
      }
      if (combined.length >= result.length) {
        result = pickChoices(combined);
      }
    }
    // 3차: 문항번호 숫자 토큰이 섞여 y축이 크게 벌어질 때,
    // 가장 밀집된 y대역을 선택지 행으로 보고 재선정한다.
    if (result.length >= 3) {
      const ys = result.map((a) => a.yRatio).sort((a, b) => a - b);
      const spread = ys[ys.length - 1] - ys[0];
      // 2열/세로 배열(정상 배치)까지 오검출로 간주해 상단 한 줄만 뽑지 않도록
      // 아주 크게 벌어진 경우에만 밀집대역 재선정을 수행한다.
      if (spread > 0.16) {
        let bestCenter = null;
        let bestCount = 0;
        const win = 0.06;
        for (let i = 0; i < anchors.length; i++){
          const center = anchors[i].yRatio;
          let cnt = 0;
          for (let j = 0; j < anchors.length; j++){
            if (Math.abs(anchors[j].yRatio - center) <= win) cnt++;
          }
          if (cnt > bestCount) {
            bestCount = cnt;
            bestCenter = center;
          }
        }
        if (bestCenter != null) {
          const alt = pickChoices(anchors, bestCenter);
          if (alt.length >= result.length) result = alt;
        }
      }
    }
    if (!hasOptions) {
      if (Array.isArray(result) && result.length) state.questionChoiceAnchorCache[cacheKey] = result;
      else delete state.questionChoiceAnchorCache[cacheKey];
    }
    return result;
  }

  function resolveSelectedChoiceAnchor(anchors, selected){
    if (!Array.isArray(anchors) || !Number.isFinite(selected)) return null;
    // 선택지 마커는 오직 "같은 번호(choice)" 앵커에만 표시한다.
    // 기하학적 추정 매핑은 번호 오인 시 오마킹을 유발하므로 사용하지 않는다.
    const direct = anchors.find((a) =>
      a && a.choice === selected
      && Number.isFinite(a.xRatio) && Number.isFinite(a.yRatio)
      && Number.isFinite(a.wRatio) && Number.isFinite(a.hRatio)
    );
    return direct || null;
  }

  async function resolveChoiceAnchorByQuestionBand(pageNo, q, selected, hintStart = null, hintEnd = null){
    if (!Number.isFinite(pageNo) || !Number.isFinite(q) || !Number.isFinite(selected)) return null;
    let qStart = null;
    let qEnd = null;
    if (Number.isFinite(hintStart) && Number.isFinite(hintEnd)) {
      qStart = Math.max(0, Math.min(1, Number(hintStart)));
      qEnd = Math.max(qStart + 0.02, Math.min(1, Number(hintEnd)));
    } else {
      qStart = await getQuestionStartRatioForPage(pageNo, q);
      if (!Number.isFinite(qStart)) {
        const range = await getQuestionCropRange(q, pageNo);
        if (range && Number.isFinite(range.start)) qStart = Number(range.start);
      }
      if (!Number.isFinite(qStart)) return null;
      qStart = Math.max(0, Math.min(1, qStart));
      qEnd = 1;
      if (q < 100) {
        const nextStart = await getQuestionStartRatioForPage(pageNo, q + 1);
        if (Number.isFinite(nextStart) && nextStart > qStart + 0.03) {
          qEnd = Math.max(qStart + 0.06, Math.min(1, nextStart - 0.004));
        }
      }
      if (!Number.isFinite(qEnd) || qEnd <= qStart + 0.02) {
        qEnd = Math.min(1, qStart + 0.34);
      }
    }

    const layer = await getQuestionPageTextLayer(pageNo);
    const pageW = layer.pageW;
    const pageH = layer.pageH;
    const candidates = [];
    for (const item of (layer.items || [])) {
      const raw = String(item.str || "").trim();
      const strong = parseChoiceNumberToken(raw);
      const weak = !strong ? parseWeakChoiceDigitToken(raw) : null;
      const choice = strong || weak;
      if (choice !== selected) continue;
      const x = Number(item.transform && item.transform[4]);
      const y = Number(item.transform && item.transform[5]);
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
      const iw = Math.max(8, Math.abs(Number(item.width) || 0));
      const ih = Math.max(8, Math.abs(Number(item.height) || 0));
      const top = Math.max(0, Math.min(pageH - ih, pageH - y - ih));
      const topRatio = top / pageH;
      if (topRatio < qStart + 0.002 || topRatio > qEnd + 0.01) continue;
      // 단독 숫자(약한 토큰)는 문항번호 근처 혼입 방지를 위해 x열 제약을 추가한다.
      const xRatio = x / pageW;
      if (!strong && xRatio > 0.82) continue;
      candidates.push({
        choice,
        xRatio: Math.max(0, Math.min(1, xRatio)),
        yRatio: Math.max(0, Math.min(1, topRatio)),
        wRatio: Math.max(0.004, Math.min(0.2, iw / pageW)),
        hRatio: Math.max(0.006, Math.min(0.15, ih / pageH)),
        strong: !!strong
      });
    }
    if (!candidates.length) return null;
    const center = (qStart + qEnd) * 0.5;
    candidates.sort((a, b) => {
      if (a.strong !== b.strong) return a.strong ? -1 : 1;
      const da = Math.abs(a.yRatio - center);
      const db = Math.abs(b.yRatio - center);
      if (da !== db) return da - db;
      return a.yRatio - b.yRatio || a.xRatio - b.xRatio;
    });
    return candidates[0];
  }

  async function resolveSelectedChoiceAnchorWithRecovery(pageNo, q, selected, hint = null){
    if (!Number.isFinite(pageNo) || !Number.isFinite(q) || !Number.isFinite(selected)) return null;
    const hintStart = (hint && Number.isFinite(hint.startRatio)) ? Math.max(0, Math.min(1, Number(hint.startRatio))) : null;
    const hintEnd = (hint && Number.isFinite(hint.endRatio)) ? Math.max(0, Math.min(1, Number(hint.endRatio))) : null;
    const inHintRange = (anchor) => {
      if (!anchor || !Number.isFinite(anchor.yRatio)) return false;
      if (!Number.isFinite(hintStart) || !Number.isFinite(hintEnd)) return true;
      const y = Number(anchor.yRatio);
      return y >= (hintStart - 0.004) && y <= (hintEnd + 0.02);
    };
    const attempts = [];
    if (Number.isFinite(hintStart) && Number.isFinite(hintEnd)) {
      const s = hintStart;
      const e = Math.max(s + 0.02, hintEnd);
      attempts.push({ startRatio: s, endRatio: e });
      // 문항 상단으로는 넓히지 않고(이전 문항 혼입 방지), 하단만 점진 확장한다.
      attempts.push({ startRatio: s, endRatio: Math.min(1, e + 0.16) });
      attempts.push({ startRatio: s, endRatio: Math.min(1, e + 0.30) });
    }
    // 단일문항 힌트가 있는 경우 전페이지 탐색(null)을 하지 않는다.
    // (다른 문항 선택지 앵커 혼입 방지)
    if (!(Number.isFinite(hintStart) && Number.isFinite(hintEnd))) {
      attempts.push(null);
    }

    let recovered = null;
    for (const opt of attempts){
      const anchors = opt
        ? await getChoiceAnchorsForQuestion(pageNo, q, opt)
        : await getChoiceAnchorsForQuestion(pageNo, q);
      const direct = Array.isArray(anchors) && anchors.some((a) => a && a.choice === selected);
      const sel = resolveSelectedChoiceAnchor(anchors, selected);
      if (direct && sel && inHintRange(sel)) return sel;
      if (!recovered && sel && inHintRange(sel)) recovered = sel;
    }

    if (!recovered) {
      try{
        const bandSel = await resolveChoiceAnchorByQuestionBand(pageNo, q, selected, hintStart, hintEnd);
        if (bandSel && inHintRange(bandSel)) return bandSel;
      }catch(_){}
    }
    if (!recovered && Number.isFinite(hintStart) && Number.isFinite(hintEnd)) {
      return null;
    }
    if (recovered && (selected === 3 || selected === 4)) {
      let qStart = await getQuestionStartRatioForPage(pageNo, q);
      if (!Number.isFinite(qStart)) {
        const pageMap = state.pdfNav.questionPageMap;
        const ratioMap = state.pdfNav.questionTopRatioMap;
        if (Array.isArray(pageMap) && Array.isArray(ratioMap) && pageMap[q] === pageNo && Number.isFinite(ratioMap[q])) {
          qStart = Number(ratioMap[q]);
        }
      }
      const minRowY = Number.isFinite(qStart) ? (qStart + 0.11) : 0.36;
      if (recovered.yRatio < minRowY) {
        const adjusted = { ...recovered, yRatio: Math.min(0.98, minRowY) };
        if (inHintRange(adjusted)) return adjusted;
        return recovered;
      }
    }
    return recovered;
  }

  function extractQuestionStartsFromItems(items){
    // PDF 텍스트 아이템을 y축 기준으로 라인화한 뒤, 라인 시작 토큰에서 문항 번호를 잡는다.
    const rows = [];
    for (const it of items){
      const s = String(it.str || "").trim();
      if (!s) continue;
      const y = Number(it.transform && it.transform[5]);
      const x = Number(it.transform && it.transform[4]);
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;

      let row = null;
      for (const r of rows){
        if (Math.abs(r.y - y) <= 2) { row = r; break; }
      }
      if (!row){
        row = { y, parts: [] };
        rows.push(row);
      }
      row.parts.push({ x, s });
    }

    const found = new Set();
    const ratioByQuestion = new Map();
    const startXs = [];
    for (const row of rows){
      row.parts.sort((a, b) => a.x - b.x);
      if (row.parts.length) startXs.push(row.parts[0].x);
    }
    const minStartX = startXs.length ? Math.min(...startXs) : 0;
    const leftThreshold = minStartX + 240;
    let minY = Infinity;
    let maxY = -Infinity;
    for (const row of rows){
      if (!Number.isFinite(row.y)) continue;
      if (row.y < minY) minY = row.y;
      if (row.y > maxY) maxY = row.y;
    }
    const ySpan = Math.max(1, maxY - minY);

    for (const row of rows){
      row.parts.sort((a, b) => a.x - b.x);
      if (!row.parts.length) continue;
      if (row.parts[0].x > leftThreshold) continue;
      const lineText = row.parts.map(p => p.s).join(" ").replace(/\s+/g, " ").trim();
      const q = parseQuestionNumberFromLineStart(lineText);
      if (q != null){
        found.add(q);
        const ratio = Math.max(0, Math.min(1, (maxY - row.y) / ySpan));
        if (!ratioByQuestion.has(q) || ratio < ratioByQuestion.get(q)) {
          ratioByQuestion.set(q, ratio);
        }
      }
    }
    return { starts: found, ratioByQuestion };
  }

  function buildQuestionPageMapFromPageStarts(startsByPage, totalPages){
    const anchors = [];
    let prevQ = 0;

    for (let pageNo = 1; pageNo <= totalPages; pageNo++){
      const starts = Array.from(startsByPage[pageNo] || []).sort((a, b) => a - b);
      if (starts.length === 0) continue;

      let picked = starts.find((q) => q > prevQ && q <= prevQ + 15);
      if (picked == null && prevQ === 0){
        picked = starts.find((q) => q >= 1 && q <= 10);
      }
      if (picked == null) continue;

      anchors.push({ page: pageNo, q: picked });
      prevQ = picked;
      if (prevQ >= 100) break;
    }

    // 최소 앵커가 부족하면 기본 균등 분배로 fallback
    if (anchors.length < 2){
      const result = Array(101).fill(1);
      const qpp = Math.max(1, Math.round(100 / Math.max(1, totalPages)));
      for (let q = 1; q <= 100; q++){
        result[q] = Math.min(totalPages, 1 + Math.floor((q - 1) / qpp));
      }
      return result;
    }

    const normalizedAnchors = [];
    let lastQ = 0;
    for (const a of anchors){
      if (a.q > lastQ){
        normalizedAnchors.push(a);
        lastQ = a.q;
      }
    }

    // 첫 앵커가 늦게 잡혀도 초반 문항(1~)은 1페이지부터 시작하도록 기본값을 1로 둔다.
    const result = Array(101).fill(1);
    for (let i = 0; i < normalizedAnchors.length; i++){
      const cur = normalizedAnchors[i];
      const next = normalizedAnchors[i + 1];
      const endQ = next ? Math.max(cur.q, next.q - 1) : 100;
      for (let q = cur.q; q <= endQ; q++){
        result[q] = cur.page;
      }
    }

    for (let q = 2; q <= 100; q++){
      result[q] = Math.max(result[q], result[q - 1]);
      result[q] = Math.min(totalPages, result[q]);
    }
    result[1] = Math.min(totalPages, Math.max(1, result[1]));
    return result;
  }

  function ensureAutoPdfMap(){
    if (applyPresetMapIfAvailable()) return;
    const currentSource = getCurrentPdfSourceKey();
    if (state.pdfNav.mode === "auto" && state.pdfNav.source === currentSource && Array.isArray(state.pdfNav.questionPageMap)) {
      return;
    }
    buildAutoPdfMap({ silent: true });
  }

  async function buildAutoPdfMap(options = {}){
    const silent = options.silent === true;
    try{
      if (silent && pdfInfo) {
        pdfInfo.textContent = "왼쪽 문제 / 오른쪽 답 체크 · 페이지이동 ON (자동 매핑 분석 중...)";
      }
      const pdf = await ensurePdfDocument();
      const startsByPage = {};
      const ratiosByPage = {};

      for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++){
        const layer = await getQuestionPageTextLayer(pageNo);
        const detected = extractQuestionStartsFromItems(layer.items || []);
        startsByPage[pageNo] = detected.starts;
        ratiosByPage[pageNo] = detected.ratioByQuestion;
      }

      const normalized = buildQuestionPageMapFromPageStarts(startsByPage, pdf.numPages);
      const ratioMap = Array(101).fill(0.12);
      for (let q = 1; q <= 100; q++){
        const p = normalized[q];
        const byQ = ratiosByPage[p];
        if (byQ && byQ.has(q)) {
          ratioMap[q] = byQ.get(q);
          continue;
        }
        if (byQ && byQ.size > 0){
          let nearestQ = null;
          for (const k of byQ.keys()){
            if (nearestQ == null || Math.abs(k - q) < Math.abs(nearestQ - q)) nearestQ = k;
          }
          if (nearestQ != null) ratioMap[q] = byQ.get(nearestQ);
        }
      }

      state.pdfNav.enabled = true;
      state.pdfNav.mode = "auto";
      state.pdfNav.questionPageMap = normalized;
      state.pdfNav.questionTopRatioMap = ratioMap;
      state.questionCropRangeCache = {};
      state.pageTextLayerCache = {};
      state.locateQuestionCache = {};
      state.pdfNav.source = getCurrentPdfSourceKey();
      state.pdfNav.version = PDF_MAP_VERSION;
      updatePdfInfo();
      navigatePdfToQuestion(state.focusQ || 1);
      saveUi();
      if (!silent) alert("PDF 자동 매핑이 완료되었습니다.");
    }catch (e){
      state.pdfNav.mode = "basic";
      state.pdfNav.questionPageMap = null;
      state.pdfNav.questionTopRatioMap = null;
      state.questionCropRangeCache = {};
      state.pageTextLayerCache = {};
      state.locateQuestionCache = {};
      if (!silent) alert("PDF 자동 매핑에 실패했습니다.");
      updatePdfInfo();
    }
  }
