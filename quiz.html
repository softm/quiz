<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>문제풀이 + 정답확인 (오답노트/단축키)</title>
  <style>
    :root{
      --bg-start:#f2f5fb; --bg:#e9eef7; --panel:#ffffff; --card:#f8faff; --text:#1e2633; --muted:#5c667a;
      --ok:#1f9f62; --bad:#d9365a; --line:rgba(24,38,61,.14); --btn:#dfe8ff; --btn2:#e9eef9; --warn:#f2b63b;
      --header-bg:rgba(233,238,247,.86); --viewer-bg:#eef3fb; --chip-bg:rgba(255,255,255,.75); --ghost-bg:rgba(255,255,255,.65);
      --stat-bg:rgba(248,250,255,.9); --sub-bg:rgba(245,248,255,.85); --choice-bg:rgba(255,255,255,.9); --note-bg:rgba(245,248,255,.88);
      --textarea-bg:#ffffff;
    }
    body.theme-dark{
      --bg-start:#070b16; --bg:#0b1020; --panel:#111a33; --card:#0f1730; --text:#e7ecff; --muted:#a9b4df;
      --ok:#27d17f; --bad:#ff4d6d; --line:rgba(255,255,255,.12); --btn:#22305a; --btn2:#1a2446; --warn:#ffbf3c;
      --header-bg:rgba(11,16,32,.9); --viewer-bg:#0a0f22; --chip-bg:rgba(15,23,48,.6); --ghost-bg:rgba(10,15,34,.35);
      --stat-bg:rgba(15,23,48,.7); --sub-bg:rgba(15,23,48,.55); --choice-bg:rgba(10,15,34,.55); --note-bg:rgba(15,23,48,.55);
      --textarea-bg:rgba(10,15,34,.55);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
      background:linear-gradient(180deg,var(--bg-start), var(--bg)); color:var(--text);
    }
    header{
      padding:14px 16px; border-bottom:1px solid var(--line);
      display:flex; gap:12px; align-items:center; justify-content:space-between;
      position:sticky; top:0; background:var(--header-bg); backdrop-filter:blur(10px); z-index:10;
    }
    header .left{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    header h1{font-size:16px; margin:0; font-weight:700}
    .pill{font-size:12px; padding:6px 10px; border:1px solid var(--line); border-radius:999px; color:var(--muted)}
    .wrap{display:grid; grid-template-columns: 1.25fr .75fr; gap:12px; padding:12px; min-height:calc(100vh - 58px)}
    .panel{
      background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    .panel .title{
      padding:10px 12px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;
      gap:10px; flex-wrap:wrap;
    }
    .panel .title strong{font-size:13px}
    .panel .title .mini{font-size:12px; color:var(--muted)}
    .viewer{
      height: calc(100vh - 58px - 12px - 12px - 48px);
      background:var(--viewer-bg);
      overflow:auto;
      padding:10px;
    }
    #pdfCanvas{
      display:block;
      width:100%;
      height:auto;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
    }
    .pdfStatus{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }
    .pdfStatus button{
      margin-left:8px;
      padding:4px 8px;
      font-size:11px;
    }
    .controls{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
    button{
      background:var(--btn); color:var(--text); border:1px solid var(--line);
      padding:8px 10px; border-radius:10px; cursor:pointer; font-weight:600; font-size:12px;
    }
    button.secondary{background:var(--btn2)}
    button.ghost{background:var(--ghost-bg)}
    button.danger{background:rgba(255,77,109,.12); border-color:rgba(255,77,109,.35)}
    button.warn{background:rgba(255,191,60,.12); border-color:rgba(255,191,60,.35)}
    button:hover{filter:brightness(1.08)}
    button.active{outline:2px solid rgba(169,180,223,.6)}
    label.toggle{
      display:flex; gap:8px; align-items:center; font-size:12px; color:var(--muted);
      padding:6px 10px; border:1px solid var(--line); border-radius:999px;
      background:var(--chip-bg);
    }
    input[type="checkbox"]{transform:scale(1.05)}
    .sheet{
      padding:10px 10px 14px;
      height: calc(100vh - 58px - 12px - 12px - 48px);
      overflow:auto;
    }

    .stats{display:grid; grid-template-columns: repeat(3,1fr); gap:8px; margin-bottom:10px;}
    .stat{background:var(--stat-bg); border:1px solid var(--line); border-radius:12px; padding:10px;}
    .stat .k{font-size:12px; color:var(--muted)}
    .stat .v{font-size:18px; font-weight:800; margin-top:4px}

    .subStats{display:grid; grid-template-columns: repeat(4,1fr); gap:8px; margin:10px 0 10px;}
    .sub{background:var(--sub-bg); border:1px solid var(--line); border-radius:12px; padding:10px;}
    .sub .k{font-size:12px; color:var(--muted)}
    .sub .v{font-size:14px; font-weight:800; margin-top:4px}

    .filterBar{display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 10px;}

    .grid{display:grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap:8px;}
    .qcard{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 8px 6px;
    }
    .qcard.hidden{display:none}
    .qcard.focus{outline:2px solid rgba(169,180,223,.75)}
    .qcard.locked{opacity:.72}
    .qhead{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px;}
    .qnum{font-weight:800; font-size:12px}
    .mark{
      font-size:11px; font-weight:800;
      padding:2px 6px; border-radius:999px;
      border:1px solid var(--line); color:var(--muted);
      user-select:none;
    }
    .mark.ok{color:var(--ok); border-color:rgba(39,209,127,.5); background:rgba(39,209,127,.08)}
    .mark.bad{color:var(--bad); border-color:rgba(255,77,109,.5); background:rgba(255,77,109,.08)}
    .mark.lock{color:var(--warn); border-color:rgba(255,191,60,.45); background:rgba(255,191,60,.08)}
    .choices{display:grid; grid-template-columns: repeat(4, 1fr); gap:6px;}
    .choice{
      display:flex; align-items:center; justify-content:center;
      border:1px solid var(--line); border-radius:10px;
      padding:6px 0; font-size:12px; color:var(--text);
      background:var(--choice-bg);
      cursor:pointer;
      user-select:none;
    }
    .choice input{display:none}
    .choice.selected{outline:2px solid rgba(169,180,223,.55)}
    .choice.correct{outline:2px solid rgba(39,209,127,.8)}
    .choice.wrong{outline:2px solid rgba(255,77,109,.85)}
    .choice.disabled{cursor:not-allowed; filter:grayscale(.2);}

    .footerNote{
      margin-top:10px; font-size:12px; color:var(--muted); line-height:1.45;
      border-top:1px solid var(--line); padding-top:10px;
    }
    .tiny{font-size:11px; color:var(--muted)}

    .notePanel{
      margin-top:10px;
      background:var(--note-bg);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
    }
    .adWrap{
      margin-top:10px;
      min-height:100px;
      border:1px dashed var(--line);
      border-radius:12px;
      background:var(--note-bg);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-size:12px;
      padding:8px;
    }
    .notePanel .head{
      display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;
      margin-bottom:8px;
    }
    textarea{
      width:100%;
      min-height:140px;
      resize:vertical;
      background:var(--textarea-bg);
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
      color:var(--text);
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      line-height:1.45;
    }

    @media (max-width: 1100px){
      .wrap{grid-template-columns:1fr}
      .viewer,.sheet{height:60vh}
      .grid{grid-template-columns: repeat(4, minmax(0,1fr));}
    }
    @media (max-width: 768px){
      header{
        position:static;
        padding:10px;
        align-items:flex-start;
        flex-direction:column;
      }
      header .left{width:100%; justify-content:space-between}
      header h1{font-size:14px}
      .pill{font-size:11px; padding:4px 8px}
      .controls{
        width:100%;
        gap:6px;
      }
      header .controls{
        display:grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      button{
        padding:7px 8px;
        font-size:11px;
      }
      .toggle{
        justify-content:center;
        padding:5px 8px;
      }
      .wrap{
        padding:8px;
        gap:8px;
      }
      .panel{border-radius:10px}
      .panel .title{padding:8px 10px}
      .viewer{height:44vh; padding:6px}
      .sheet{height:auto; max-height:none; padding:8px}
      .stats{grid-template-columns:repeat(2,1fr)}
      .subStats{grid-template-columns:repeat(2,1fr)}
      .grid{grid-template-columns: repeat(4, minmax(0,1fr)); gap:6px}
      .qcard{padding:6px 6px 5px}
      .choices{gap:4px}
      .choice{padding:5px 0; font-size:11px}
      .notePanel textarea{min-height:110px}
    }
    @media (max-width: 520px){
      header .controls{grid-template-columns: repeat(2, minmax(0, 1fr));}
      .pill{display:none}
      .viewer{height:40vh}
      .grid{grid-template-columns: repeat(3, minmax(0,1fr));}
      .qnum{font-size:11px}
      .mark{font-size:10px}
    }
  </style>
</head>
<body>
<header>
  <div class="left">
    <h1 id="pageTitle">문제풀이 + 정답확인</h1>
    <span class="pill">오답노트·단축키(1~4/←→/G/R/J)</span>
  </div>
  <div class="controls">
    <button id="btnHome" class="ghost">목록</button>
    <button id="btnTheme" class="secondary">다크 모드</button>
    <button id="btnReset" class="secondary">다시풀기 (R)</button>
    <button id="btnGrade">채점(전체) (G)</button>
    <label class="toggle"><input id="autoGrade" type="checkbox" checked /> 자동채점</label>
    <label class="toggle"><input id="showCorrect" type="checkbox" /> 정답표시(강조)</label>
  </div>
</header>

<div class="wrap">
  <section class="panel">
    <div class="title">
      <div>
        <strong>문제 PDF</strong>
        <span class="mini" id="pdfInfo">왼쪽 문제 / 오른쪽 답 체크</span>
      </div>
      <div class="controls">
        <button id="openQ">문제 PDF 새창</button>
        <button id="openA" class="secondary">정답 PDF 새창</button>
      </div>
    </div>
    <div class="viewer" id="pdfViewer">
      <canvas id="pdfCanvas" aria-label="문제 PDF 페이지"></canvas>
      <div id="pdfStatus" class="pdfStatus">PDF 로딩 중...</div>
    </div>
  </section>

  <aside class="panel">
    <div class="title">
      <div>
        <strong>답안지 (1~100)</strong>
        <div class="tiny" id="saveHint">저장 상태: -</div>
        <div class="tiny" id="modeHint">모드: 일반</div>
      </div>
      <div class="controls">
        <button id="scrollTop" class="secondary">맨위로</button>
        <button id="btnJumpFirst" class="secondary">첫 항목 점프 (J)</button>
        <button id="btnClearSaved" class="ghost">저장 초기화</button>
      </div>
    </div>

    <div class="sheet" id="sheet">
      <div class="stats">
        <div class="stat"><div class="k">점수</div><div class="v" id="score">0 / 100</div></div>
        <div class="stat"><div class="k">정답</div><div class="v" id="correctCount">0</div></div>
        <div class="stat"><div class="k">미응답</div><div class="v" id="blankCount">100</div></div>
      </div>

      <div class="subStats">
        <div class="sub"><div class="k">1~25</div><div class="v" id="sec1">0 / 25</div></div>
        <div class="sub"><div class="k">26~50</div><div class="v" id="sec2">0 / 25</div></div>
        <div class="sub"><div class="k">51~75</div><div class="v" id="sec3">0 / 25</div></div>
        <div class="sub"><div class="k">76~100</div><div class="v" id="sec4">0 / 25</div></div>
      </div>

      <div class="filterBar">
        <button id="fAll" class="active">전체</button>
        <button id="fWrong">오답만</button>
        <button id="fBlank">미응답만</button>
      </div>

      <div class="grid" id="grid"></div>

      <!-- 오답노트 -->
      <div class="notePanel">
        <div class="head">
          <strong style="font-size:13px">오답노트</strong>
          <div class="controls">
            <button id="btnMakeNote" class="secondary">오답노트 생성</button>
            <button id="btnCopyNote">복사</button>
          </div>
        </div>
        <textarea id="noteArea" placeholder="채점 후 '오답노트 생성'을 누르면 자동으로 만들어집니다."></textarea>
        <div class="tiny" id="copyHint"></div>
      </div>
      <div class="adWrap" id="adfitQuizSide">광고 영역</div>

      <div class="footerNote">
        <div>• 단축키: <b>1~4</b> 선택, <b>←/→</b> 이동, <b>G</b> 채점, <b>R</b> 리셋, <b>J</b> 첫항목 점프</div>
      </div>
    </div>
  </aside>
</div>

<script>
  // ====== 파일 경로/메타 ======
  const DEFAULT_QUESTION_PDF_URL = "./2025년 제22회 농산물품질관리사 1차 시험문제지.pdf";
  const DEFAULT_ANSWER_PDF_URL = "./최종정답.pdf";
  const params = new URLSearchParams(window.location.search);
  const CATEGORY_NAME = params.get("category") || "농산물품질관리사";
  const EXAM_NAME = params.get("exam") || "기본 회차";
  const QUESTION_PDF_URL = params.get("question") || DEFAULT_QUESTION_PDF_URL;
  const ANSWER_PDF_URL = params.get("answer") || DEFAULT_ANSWER_PDF_URL;
  const encodedQuestionPdfUrl = encodeURI(QUESTION_PDF_URL);
  const encodedAnswerPdfUrl = encodeURI(ANSWER_PDF_URL);
  const ADFIT_UNITS = {
    quizSide: "DAN_REPLACE_QUIZ_SIDE",
  };

  // ====== 정답 키(1교시 A형 1~100) ======
  // 주의: 8번이 '5'인 것은 원본 정답표 기준 입력(선지 5가 실제로 존재하는 유형일 수 있음).
  // 만약 실제 문항이 1~4만 있다면 정답표를 1~4로 수정하세요.
  const ANSWER_KEY = [
    null,
    3,2,2,3,3,4,3,5,2,
    1,4,1,2,1,4,3,2,4,1,
    3,4,3,1,2,
    1,4,4,2,2,
    3,3,4,1,2,
    2,2,3,1,4,
    1,1,3,3,3,
    4,1,1,4,2,
    3,1,2,1,3,
    4,2,4,2,4,
    3,1,2,1,4,
    2,1,2,4,3,
    3,3,1,4,4,
    1,1,2,1,2,
    2,3,2,4,4,
    2,3,4,3,1,
    4,3,4,1,3,
    4,3,1,2,1
  ];

  // ====== 저장 키 ======
  const STORAGE_KEY = "quiz_answers_v3";
  const STORAGE_UI_KEY = "quiz_ui_v3";
  const PDF_MAP_VERSION = 5;
  const PRESET_PAGE_ANCHORS = {
    "2022년 제19회 농산물품질관리사 1차": [1,6,10,14,18,22,26,33,39,47,51,57,64,70,76,81,87,94],
    "2023년 제20회 농산물품질관리사 1차": [1,5,10,15,19,23,26,34,40,48,51,57,64,70,76,83,90,97],
    "2024년 제21회 농산물품질관리사 1차": [1,5,9,14,18,23,26,33,40,45,51,58,64,71,76,82,90,97],
    "2025년 제22회 농산물품질관리사 1차": [1,5,10,14,19,23,26,35,41,47,51,57,66,72,76,81,89,95],
  };

  // ====== 상태 ======
  const state = {
    answers: Array(101).fill(null),
    filter: "all",
    focusQ: 1,
    theme: "basic",
    currentPdfPage: 1,
    pdfNavNonce: 0,
    questionPdfBaseUrl: null,
    answerPdfBaseUrl: null,
    pdfDoc: null,
    pdfDocLoading: null,
    renderToken: 0,
    pdfNav: {
      enabled: true,
      startPage: 1,
      questionsPerPage: 1,
      mode: "basic",
      questionPageMap: null,
      questionTopRatioMap: null,
      source: null,
      version: PDF_MAP_VERSION
    }
  };

  // ====== DOM ======
  const pdfCanvas = document.getElementById("pdfCanvas");
  const pdfCtx = pdfCanvas.getContext("2d");
  const pdfViewer = document.getElementById("pdfViewer");
  const pdfStatus = document.getElementById("pdfStatus");
  const pdfInfo = document.getElementById("pdfInfo");
  const pageTitle = document.getElementById("pageTitle");
  const grid = document.getElementById("grid");
  const scoreEl = document.getElementById("score");
  const correctEl = document.getElementById("correctCount");
  const blankEl = document.getElementById("blankCount");
  const autoGradeEl = document.getElementById("autoGrade");
  const showCorrectEl = document.getElementById("showCorrect");
  const sheet = document.getElementById("sheet");
  const saveHint = document.getElementById("saveHint");
  const modeHint = document.getElementById("modeHint");
  const btnTheme = document.getElementById("btnTheme");

  const sec1 = document.getElementById("sec1");
  const sec2 = document.getElementById("sec2");
  const sec3 = document.getElementById("sec3");
  const sec4 = document.getElementById("sec4");

  const fAll = document.getElementById("fAll");
  const fWrong = document.getElementById("fWrong");
  const fBlank = document.getElementById("fBlank");

  const noteArea = document.getElementById("noteArea");
  const copyHint = document.getElementById("copyHint");
  let pdfJsLoaderPromise = null;

  function loadAdFitScript() {
    if (window.__adfitLoaded) return;
    const script = document.createElement("script");
    script.async = true;
    script.src = "https://t1.daumcdn.net/kas/static/ba.min.js";
    script.onload = () => { window.__adfitLoaded = true; };
    document.head.appendChild(script);
  }

  function initAdFit(slotId, unit, width, height) {
    const slot = document.getElementById(slotId);
    if (!slot) return;
    if (!unit || !unit.startsWith("DAN-")) {
      slot.textContent = "광고 단위 ID를 설정하면 이 위치에 배너가 노출됩니다.";
      return;
    }
    slot.innerHTML = `<ins class="kakao_ad_area" style="display:none;" data-ad-unit="${unit}" data-ad-width="${width}" data-ad-height="${height}"></ins>`;
    loadAdFitScript();
  }

  // ====== 버튼 이벤트 ======
  document.getElementById("btnHome").addEventListener("click", () => {
    const to = `./category.html?category=${encodeURIComponent(CATEGORY_NAME)}`;
    window.location.href = to;
  });
  document.getElementById("btnReset").addEventListener("click", resetAll);
  document.getElementById("btnGrade").addEventListener("click", () => { gradeAll(true); makeWrongNote(); });
  btnTheme.addEventListener("click", () => setTheme(state.theme === "dark" ? "basic" : "dark"));

  document.getElementById("scrollTop").addEventListener("click", () => sheet.scrollTo({top:0, behavior:"smooth"}));
  document.getElementById("btnJumpFirst").addEventListener("click", jumpToFirst);

  document.getElementById("openQ").addEventListener("click", () => {
    const url = buildPdfUrl(state.currentPdfPage, true);
    window.open(url, "_blank");
  });
  document.getElementById("openA").addEventListener("click", () => {
    window.open(state.answerPdfBaseUrl || encodedAnswerPdfUrl, "_blank");
  });

  document.getElementById("btnClearSaved").addEventListener("click", () => {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(STORAGE_UI_KEY);
    saveHint.textContent = "저장 상태: 초기화됨";
  });

  document.getElementById("btnMakeNote").addEventListener("click", makeWrongNote);
  document.getElementById("btnCopyNote").addEventListener("click", copyWrongNote);
  pdfStatus.addEventListener("click", (e) => {
    const t = e.target;
    if (!(t instanceof HTMLButtonElement)) return;
    if (t.id === "btnPdfRetry") {
      navigatePdfToQuestion(state.focusQ || 1);
      ensureAutoPdfMap();
    }
  });

  autoGradeEl.addEventListener("change", () => {
    saveUi();
    if (autoGradeEl.checked) gradeAll(false);
    else clearMarksOnly();
    applyFilter();
  });

  showCorrectEl.addEventListener("change", () => {
    saveUi();
    refreshAllCards();
    applyFilter();
  });

  fAll.addEventListener("click", () => setFilter("all"));
  fWrong.addEventListener("click", () => setFilter("wrong"));
  fBlank.addEventListener("click", () => setFilter("blank"));

  // ====== 단축키 ======
  document.addEventListener("keydown", (e) => {
    const tag = (document.activeElement && document.activeElement.tagName || "").toLowerCase();
    if (tag === "textarea" || tag === "input") return;

    const k = e.key;

    if (k >= "1" && k <= "4") { chooseByKeyboard(Number(k)); e.preventDefault(); return; }
    if (k === "ArrowRight") { moveFocus(1); e.preventDefault(); return; }
    if (k === "ArrowLeft")  { moveFocus(-1); e.preventDefault(); return; }
    if (k === "g" || k === "G") { gradeAll(true); makeWrongNote(); e.preventDefault(); return; }
    if (k === "r" || k === "R") { resetAll(); e.preventDefault(); return; }
    if (k === "j" || k === "J") { jumpToFirst(); e.preventDefault(); return; }
  });

  async function resolveExistingPdfUrl(pathValue){
    const baseRaw = String(pathValue || "").split("#")[0];
    const candidates = [];
    for (const raw of [baseRaw, baseRaw.normalize("NFC"), baseRaw.normalize("NFD")]){
      const encoded = encodeURI(raw);
      if (!candidates.includes(encoded)) candidates.push(encoded);
    }

    for (const c of candidates){
      try{
        const res = await fetch(c, { method: "HEAD", cache: "no-store" });
        if (res.ok) return c;
      }catch(_){}
    }
    for (const c of candidates){
      try{
        const res = await fetch(c, { cache: "no-store" });
        if (res.ok) return c;
      }catch(_){}
    }
    return candidates[0];
  }

  async function initPdf(){
    pdfStatus.textContent = "PDF 경로 확인 중...";
    state.questionPdfBaseUrl = await resolveExistingPdfUrl(QUESTION_PDF_URL);
    state.answerPdfBaseUrl = await resolveExistingPdfUrl(ANSWER_PDF_URL);
    navigatePdfToQuestion(state.focusQ || 1);
    ensureAutoPdfMap();

  function getPdfPageByQuestion(q){
    const nav = state.pdfNav;
    if (nav.mode === "auto" && Array.isArray(nav.questionPageMap) && Number.isFinite(nav.questionPageMap[q])) {
      return Math.max(1, Math.floor(nav.questionPageMap[q]));
    }
    // 자동 매핑 전 임시 기본값: PDF 총 페이지 수를 기준으로 균등 분배
    if (state.pdfDoc && Number.isFinite(state.pdfDoc.numPages) && state.pdfDoc.numPages > 0) {
      const qPerPage = 100 / state.pdfDoc.numPages;
      const page = 1 + Math.floor((q - 1) / Math.max(1, qPerPage));
      return Math.min(state.pdfDoc.numPages, Math.max(1, page));
    }
    return 1;
  }

  function buildMapFromAnchors(anchorList){
    const pageMap = Array(101).fill(1);
    const ratioMap = Array(101).fill(0.12);
    if (!Array.isArray(anchorList) || anchorList.length === 0) {
      return { pageMap, ratioMap };
    }

    for (let i = 0; i < anchorList.length; i++){
      const pageNo = i + 1;
      const startQ = anchorList[i];
      const nextStart = anchorList[i + 1] || 101;
      const endQ = Math.min(100, nextStart - 1);
      const count = Math.max(1, endQ - startQ + 1);

      for (let q = startQ; q <= endQ; q++){
        pageMap[q] = pageNo;
        const idx = q - startQ;
        ratioMap[q] = Math.max(0.08, Math.min(0.9, 0.12 + (idx / count) * 0.74));
      }
    }

    for (let q = 2; q <= 100; q++){
      pageMap[q] = Math.max(pageMap[q], pageMap[q - 1]);
    }
    return { pageMap, ratioMap };
  }

  function applyPresetMapIfAvailable(){
    const anchors = PRESET_PAGE_ANCHORS[EXAM_NAME];
    if (!anchors) return false;

    const mapped = buildMapFromAnchors(anchors);
    state.pdfNav.enabled = true;
    state.pdfNav.mode = "auto";
    state.pdfNav.questionPageMap = mapped.pageMap;
    state.pdfNav.questionTopRatioMap = mapped.ratioMap;
    state.pdfNav.source = getCurrentPdfSourceKey();
    state.pdfNav.version = PDF_MAP_VERSION;
    updatePdfInfo();
    saveUi();
    return true;
  }

  function buildPdfUrl(page, forceReload){
    const base = getQuestionPdfBaseUrl();
    const nonce = forceReload ? Date.now() : state.pdfNavNonce;
    const sep = base.includes("?") ? "&" : "?";
    return `${base}${sep}nav=${nonce}#page=${page}&zoom=page-fit`;
  }

  async function ensurePdfDocument(){
    if (state.pdfDoc) return state.pdfDoc;
    if (state.pdfDocLoading) return state.pdfDocLoading;

    state.pdfDocLoading = (async () => {
      const pdfjsLib = await loadPdfJsLib();
      if (pdfjsLib.GlobalWorkerOptions) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }
      const loadingTask = pdfjsLib.getDocument(getQuestionPdfBaseUrl());
      const pdf = await loadingTask.promise;
      state.pdfDoc = pdf;
      return pdf;
    })();

    try{
      return await state.pdfDocLoading;
    } finally {
      state.pdfDocLoading = null;
    }
  }

  async function renderPdfPage(page){
    pdfStatus.textContent = "PDF 로딩 중...";
    const pdf = await ensurePdfDocument();
    const safePage = Math.min(Math.max(1, Math.floor(page)), pdf.numPages);
    state.currentPdfPage = safePage;

    const pageObj = await pdf.getPage(safePage);
    const baseViewport = pageObj.getViewport({ scale: 1 });
    const viewWidth = Math.max(320, (pdfCanvas.parentElement?.clientWidth || 900) - 20);
    const cssScale = Math.max(0.5, viewWidth / baseViewport.width);
    const cssViewport = pageObj.getViewport({ scale: cssScale });
    const dpr = Math.max(1, Number(window.devicePixelRatio) || 1);
    const outputScale = Math.min(2.5, dpr * 1.25);

    const token = ++state.renderToken;
    pdfCanvas.width = Math.ceil(cssViewport.width * outputScale);
    pdfCanvas.height = Math.ceil(cssViewport.height * outputScale);
    pdfCanvas.style.width = `${Math.ceil(cssViewport.width)}px`;
    pdfCanvas.style.height = `${Math.ceil(cssViewport.height)}px`;

    const renderTask = pageObj.render({
      canvasContext: pdfCtx,
      viewport: cssViewport,
      transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null
    });
    await renderTask.promise;
    if (token !== state.renderToken) return;
    pdfStatus.textContent = `페이지 ${safePage} 표시 중`;
  }

  function scrollToQuestionAnchor(q, page){
    if (!Number.isFinite(q)) return;
    let ratio = null;
    const pageMap = state.pdfNav.questionPageMap;
    const ratioMap = state.pdfNav.questionTopRatioMap;
    if (Array.isArray(pageMap) && Array.isArray(ratioMap) && pageMap[q] === page && Number.isFinite(ratioMap[q])) {
      ratio = Math.max(0, Math.min(1, ratioMap[q]));
    }
    if (ratio == null) ratio = 0.12;
    const maxScrollable = Math.max(0, pdfViewer.scrollHeight - pdfViewer.clientHeight);
    const targetTop = Math.max(0, Math.min(maxScrollable, Math.round(maxScrollable * ratio)));
    pdfViewer.scrollTo({ top: targetTop, behavior: "auto" });
    pdfStatus.textContent = `페이지 ${page} · ${q}번 위치로 이동`;
  }

  function setPdfFramePage(page, q){
    state.currentPdfPage = Math.max(1, Math.floor(page));
    state.pdfNavNonce += 1;
    renderPdfPage(state.currentPdfPage).then(() => {
      // 렌더 직후 레이아웃 반영 타이밍을 한 프레임 보장한 뒤 스크롤
      requestAnimationFrame(() => {
        scrollToQuestionAnchor(q, state.currentPdfPage);
      });
    }).catch((err) => {
      const msg = (err && err.message) ? err.message : "알 수 없는 오류";
      pdfStatus.innerHTML = `PDF 표시 실패: ${msg} <button id="btnPdfRetry" type="button">재시도</button>`;
    });
  }

  function navigatePdfToQuestion(q){
    const targetPage = getPdfPageByQuestion(q);
    setPdfFramePage(targetPage, q);
  }

  function loadPdfJsLib(){
    if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
    if (pdfJsLoaderPromise) return pdfJsLoaderPromise;
    pdfJsLoaderPromise = new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      script.onload = () => {
        if (window.pdfjsLib) resolve(window.pdfjsLib);
        else reject(new Error("pdf.js load failed"));
      };
      script.onerror = () => reject(new Error("pdf.js script error"));
      document.head.appendChild(script);
    });
    return pdfJsLoaderPromise;
  }

  function buildLineText(items){
    const lines = [];
    let currentY = null;
    let line = [];
    for (const it of items){
      const y = Number(it.transform && it.transform[5]);
      if (currentY == null) {
        currentY = y;
      }
      if (Math.abs(y - currentY) > 2){
        lines.push(line.join(" ").trim());
        line = [];
        currentY = y;
      }
      line.push((it.str || "").trim());
    }
    if (line.length) lines.push(line.join(" ").trim());
    return lines.join("\n");
  }

  function parseQuestionNumberFromLineStart(lineText){
    const t = lineText.trim();
    if (!t) return null;

    let m = t.match(/^\(?\s*(\d{1,3})\s*(?:번|[.)])(?:\s+|$)/);
    if (m) {
      const q = Number(m[1]);
      return q >= 1 && q <= 100 ? q : null;
    }

    m = t.match(/^제\s*(\d{1,3})\s*문\s*/);
    if (m) {
      const q = Number(m[1]);
      return q >= 1 && q <= 100 ? q : null;
    }

    m = t.match(/^문(?:항|제)?\s*(\d{1,3})\s*/);
    if (m) {
      const q = Number(m[1]);
      return q >= 1 && q <= 100 ? q : null;
    }

    return null;
  }

  function extractQuestionStartsFromItems(items){
    // PDF 텍스트 아이템을 y축 기준으로 라인화한 뒤, 라인 시작 토큰에서 문항 번호를 잡는다.
    const rows = [];
    for (const it of items){
      const s = String(it.str || "").trim();
      if (!s) continue;
      const y = Number(it.transform && it.transform[5]);
      const x = Number(it.transform && it.transform[4]);
      if (!Number.isFinite(x) || !Number.isFinite(y)) continue;

      let row = null;
      for (const r of rows){
        if (Math.abs(r.y - y) <= 2) { row = r; break; }
      }
      if (!row){
        row = { y, parts: [] };
        rows.push(row);
      }
      row.parts.push({ x, s });
    }

    const found = new Set();
    const ratioByQuestion = new Map();
    const startXs = [];
    for (const row of rows){
      row.parts.sort((a, b) => a.x - b.x);
      if (row.parts.length) startXs.push(row.parts[0].x);
    }
    const minStartX = startXs.length ? Math.min(...startXs) : 0;
    const leftThreshold = minStartX + 90;
    let minY = Infinity;
    let maxY = -Infinity;
    for (const row of rows){
      if (!Number.isFinite(row.y)) continue;
      if (row.y < minY) minY = row.y;
      if (row.y > maxY) maxY = row.y;
    }
    const ySpan = Math.max(1, maxY - minY);

    for (const row of rows){
      row.parts.sort((a, b) => a.x - b.x);
      if (!row.parts.length) continue;
      if (row.parts[0].x > leftThreshold) continue;
      const lineText = row.parts.map(p => p.s).join(" ").replace(/\s+/g, " ").trim();
      const q = parseQuestionNumberFromLineStart(lineText);
      if (q != null){
        found.add(q);
        const ratio = Math.max(0, Math.min(1, (maxY - row.y) / ySpan));
        if (!ratioByQuestion.has(q) || ratio < ratioByQuestion.get(q)) {
          ratioByQuestion.set(q, ratio);
        }
      }
    }
    return { starts: found, ratioByQuestion };
  }

  function buildQuestionPageMapFromPageStarts(startsByPage, totalPages){
    const anchors = [];
    let prevQ = 0;

    for (let pageNo = 1; pageNo <= totalPages; pageNo++){
      const starts = Array.from(startsByPage[pageNo] || []).sort((a, b) => a - b);
      if (starts.length === 0) continue;

      let picked = starts.find((q) => q > prevQ && q <= prevQ + 15);
      if (picked == null && prevQ === 0){
        picked = starts.find((q) => q >= 1 && q <= 10);
      }
      if (picked == null) continue;

      anchors.push({ page: pageNo, q: picked });
      prevQ = picked;
      if (prevQ >= 100) break;
    }

    // 최소 앵커가 부족하면 기본 균등 분배로 fallback
    if (anchors.length < 2){
      const result = Array(101).fill(1);
      const qpp = Math.max(1, Math.round(100 / Math.max(1, totalPages)));
      for (let q = 1; q <= 100; q++){
        result[q] = Math.min(totalPages, 1 + Math.floor((q - 1) / qpp));
      }
      return result;
    }

    const normalizedAnchors = [];
    let lastQ = 0;
    for (const a of anchors){
      if (a.q > lastQ){
        normalizedAnchors.push(a);
        lastQ = a.q;
      }
    }

    // 첫 앵커가 늦게 잡혀도 초반 문항(1~)은 1페이지부터 시작하도록 기본값을 1로 둔다.
    const result = Array(101).fill(1);
    for (let i = 0; i < normalizedAnchors.length; i++){
      const cur = normalizedAnchors[i];
      const next = normalizedAnchors[i + 1];
      const endQ = next ? Math.max(cur.q, next.q - 1) : 100;
      for (let q = cur.q; q <= endQ; q++){
        result[q] = cur.page;
      }
    }

    for (let q = 2; q <= 100; q++){
      result[q] = Math.max(result[q], result[q - 1]);
      result[q] = Math.min(totalPages, result[q]);
    }
    result[1] = Math.min(totalPages, Math.max(1, result[1]));
    return result;
  }

  function ensureAutoPdfMap(){
    if (applyPresetMapIfAvailable()) return;
    const currentSource = getCurrentPdfSourceKey();
    if (state.pdfNav.mode === "auto" && state.pdfNav.source === currentSource && Array.isArray(state.pdfNav.questionPageMap)) {
      return;
    }
    buildAutoPdfMap({ silent: true });
  }

  async function buildAutoPdfMap(options = {}){
    const silent = options.silent === true;
    try{
      if (silent) {
        pdfInfo.textContent = "왼쪽 문제 / 오른쪽 답 체크 · 페이지이동 ON (자동 매핑 분석 중...)";
      }
      const pdf = await ensurePdfDocument();
      const startsByPage = {};
      const ratiosByPage = {};

      for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++){
        const page = await pdf.getPage(pageNo);
        const textContent = await page.getTextContent();
        const detected = extractQuestionStartsFromItems(textContent.items || []);
        startsByPage[pageNo] = detected.starts;
        ratiosByPage[pageNo] = detected.ratioByQuestion;
      }

      const normalized = buildQuestionPageMapFromPageStarts(startsByPage, pdf.numPages);
      const ratioMap = Array(101).fill(0.12);
      for (let q = 1; q <= 100; q++){
        const p = normalized[q];
        const byQ = ratiosByPage[p];
        if (byQ && byQ.has(q)) {
          ratioMap[q] = byQ.get(q);
          continue;
        }
        if (byQ && byQ.size > 0){
          let nearestQ = null;
          for (const k of byQ.keys()){
            if (nearestQ == null || Math.abs(k - q) < Math.abs(nearestQ - q)) nearestQ = k;
          }
          if (nearestQ != null) ratioMap[q] = byQ.get(nearestQ);
        }
      }

      state.pdfNav.enabled = true;
      state.pdfNav.mode = "auto";
      state.pdfNav.questionPageMap = normalized;
      state.pdfNav.questionTopRatioMap = ratioMap;
      state.pdfNav.source = getCurrentPdfSourceKey();
      state.pdfNav.version = PDF_MAP_VERSION;
      updatePdfInfo();
      navigatePdfToQuestion(state.focusQ || 1);
      saveUi();
      if (!silent) alert("PDF 자동 매핑이 완료되었습니다.");
    }catch (e){
      state.pdfNav.mode = "basic";
      state.pdfNav.questionPageMap = null;
      state.pdfNav.questionTopRatioMap = null;
      if (!silent) alert("PDF 자동 매핑에 실패했습니다.");
      updatePdfInfo();
    }
  }

  function loadSaved(){

      if (!raw) { saveHint.textContent = "저장 상태: 없음"; return; }
      const arr = JSON.parse(raw);
      if (!Array.isArray(arr) || arr.length < 101) { saveHint.textContent = "저장 상태: 형식 오류"; return; }
      state.answers = arr.slice(0,101);

      for(let q=1; q<=100; q++){

    }
  }
  function pad2(n){ return String(n).padStart(2,'0'); }

  // ====== UI 생성 ======
  function buildGrid(){
    const frag = document.createDocumentFragment();
    for(let q=1; q<=100; q++){
      const card = document.createElement("div");
      card.className = "qcard";
      card.dataset.q = String(q);

      const head = document.createElement("div");
      head.className = "qhead";

      const qnum = document.createElement("div");
      qnum.className = "qnum";
      qnum.textContent = `${q}번`;

      const mark = document.createElement("div");
      mark.className = "mark";
      mark.textContent = "미채점";
      mark.dataset.role = "mark";

      head.appendChild(qnum);
      head.appendChild(mark);

      const choices = document.createElement("div");
      choices.className = "choices";

      // 기본 1~4 선택 UI
      for(let c=1; c<=4; c++){
        const lab = document.createElement("label");
        lab.className = "choice";
        lab.dataset.q = String(q);
        lab.dataset.c = String(c);

        const inp = document.createElement("input");
        inp.type = "radio";
        inp.name = `q${q}`;
        inp.value = String(c);

        lab.appendChild(inp);
        lab.appendChild(document.createTextNode(String(c)));

        lab.addEventListener("click", (e) => {
          if (isLocked(q)){
            e.preventDefault();
            return;
          }
          state.answers[q] = c;
          refreshCard(q);

          saveNow();
          if (autoGradeEl.checked) gradeQuestion(q);
          updateStats();
          applyFilter();
          focusCard(q, false);
        });

        choices.appendChild(lab);
      }

      card.appendChild(head);
      card.appendChild(choices);
      card.addEventListener("click", () => focusCard(q, false));

      frag.appendChild(card);
    }
    grid.appendChild(frag);
    refreshAllCards();
  }

  // ====== 포커스/단축키 ======
  function focusCard(q, scroll){
    state.focusQ = q;
    navigatePdfToQuestion(q);
    for(let i=1;i<=100;i++){
      getCard(i).classList.toggle("focus", i===q);
    }
    if (scroll){
      getCard(q).scrollIntoView({behavior:"smooth", block:"center"});
    }
  }

  function visibleQuestions(){
    const arr = [];
    for(let q=1;q<=100;q++){
      const card = getCard(q);
      if (!card.classList.contains("hidden")) arr.push(q);
    }
    return arr;
  }

  function moveFocus(delta){
    const vis = visibleQuestions();
    if (vis.length === 0) return;

    let idx = vis.indexOf(state.focusQ);
    if (idx === -1) idx = 0;

    idx = idx + delta;
    if (idx < 0) idx = 0;
    if (idx >= vis.length) idx = vis.length - 1;

    focusCard(vis[idx], true);
  }

  function chooseByKeyboard(choice){
    const q = state.focusQ;
    if (!q) return;
    const card = getCard(q);
    if (card.classList.contains("hidden")) return;
    if (isLocked(q)) return;

    const radio = card.querySelector(`input[type=radio][value="${choice}"]`);
    if (radio){
      radio.checked = true;
      state.answers[q] = choice;
      refreshCard(q);
      saveNow();
      if (autoGradeEl.checked) gradeQuestion(q);
      updateStats();
      applyFilter();
    }
  }

  // ====== 채점 ======
  function gradeQuestion(q){
    const card = getCard(q);
    if (!card) return;
    const chosen = state.answers[q];
    const correct = ANSWER_KEY[q];
    const mark = card.querySelector('[data-role="mark"]');

    mark.classList.remove("ok","bad","lock");

    if (isLocked(q)){
      mark.textContent = "잠금";
      mark.classList.add("lock");
      return;
    }

    if (chosen == null){
      mark.textContent = "미응답";
      return;
    }
    if (chosen === correct){
      mark.textContent = "정답";
      mark.classList.add("ok");
    } else {
      mark.textContent = "오답";
      mark.classList.add("bad");
    }

    for (const el of card.querySelectorAll(".choice")){
      el.classList.remove("correct","wrong");
      const c = Number(el.dataset.c);
      if (chosen === c){
        if (chosen === correct) el.classList.add("correct");
        else el.classList.add("wrong");
      }
    }
  }

  function gradeAll(forceShowMarks){
    if (forceShowMarks) {
      for(let q=1;q<=100;q++) gradeQuestion(q);
      updateStats();
      applyFilter();
      return;
    }
    if (autoGradeEl.checked){
      for(let q=1;q<=100;q++) gradeQuestion(q);
      updateStats();
      applyFilter();
    }
  }

  // ====== 리셋 ======
  function resetAll(){
    state.answers = Array(101).fill(null);
    modeHint.textContent = "모드: 일반";

    for(let q=1; q<=100; q++){
      const card = getCard(q);
      card.querySelectorAll("input[type=radio]").forEach(r => r.checked = false);

      const mark = card.querySelector('[data-role="mark"]');
      mark.textContent = "미채점";
      mark.classList.remove("ok","bad","lock");

      card.querySelectorAll(".choice").forEach(el => {
        el.classList.remove("selected","correct","wrong","disabled");
      });
    }

    localStorage.removeItem(STORAGE_KEY);
    saveHint.textContent = "저장 상태: 초기화됨";

    noteArea.value = "";
    copyHint.textContent = "";

    refreshAllCards();
    updateStats();
    applyFilter();
    focusCard(1, true);
  }

  // ====== 카드 업데이트 ======
  function refreshCard(q){
    const card = getCard(q);
    if (!card) return;
    const chosen = state.answers[q];
    const correct = ANSWER_KEY[q];

    card.querySelectorAll(".choice").forEach(el => {
      const c = Number(el.dataset.c);
      el.classList.toggle("selected", chosen === c);

      if (showCorrectEl.checked && c === correct) el.classList.add("correct");
      else {
        if (!autoGradeEl.checked) el.classList.remove("correct","wrong");
        else {
          if (!showCorrectEl.checked && c === correct) el.classList.remove("correct");
        }
      }
    });

    if (!autoGradeEl.checked){
      const mark = card.querySelector('[data-role="mark"]');
      mark.classList.remove("ok","bad","lock");
      if (isLocked(q)){
        mark.textContent = "잠금";
        mark.classList.add("lock");
      } else {
        mark.textContent = chosen == null ? "미응답" : "미채점";
      }
    } else {
      gradeQuestion(q);
    }
  }

  function refreshAllCards(){
    for(let q=1; q<=100; q++) refreshCard(q);
  }

  function clearMarksOnly(){
    for(let q=1; q<=100; q++){
      const card = getCard(q);
      const mark = card.querySelector('[data-role="mark"]');
      mark.classList.remove("ok","bad","lock");

      if (isLocked(q)){
        mark.textContent = "잠금";
        mark.classList.add("lock");
      } else {
        mark.textContent = state.answers[q] == null ? "미응답" : "미채점";
      }

      card.querySelectorAll(".choice").forEach(el => {
        el.classList.remove("wrong");
        const c = Number(el.dataset.c);
        const correct = ANSWER_KEY[q];
        if (showCorrectEl.checked && c === correct) el.classList.add("correct");
        else el.classList.remove("correct");
      });
    }
  }

  // ====== 통계(전체 + 섹션) ======
  function updateStats(){
    let blanks = 0, correct = 0;

    const s = [
      {from:1,to:25, ok:0, total:25},
      {from:26,to:50, ok:0, total:25},
      {from:51,to:75, ok:0, total:25},
      {from:76,to:100, ok:0, total:25},
    ];

    for(let q=1; q<=100; q++){
      const a = state.answers[q];
      if (a == null) { blanks++; continue; }
      if (a === ANSWER_KEY[q]) correct++;

      for (const sec of s){
        if (q>=sec.from && q<=sec.to){
          if (a === ANSWER_KEY[q]) sec.ok++;
          break;
        }
      }
    }

    scoreEl.textContent = `${correct} / 100`;
    correctEl.textContent = String(correct);
    blankEl.textContent = String(blanks);

    sec1.textContent = `${s[0].ok} / ${s[0].total}`;
    sec2.textContent = `${s[1].ok} / ${s[1].total}`;
    sec3.textContent = `${s[2].ok} / ${s[2].total}`;
    sec4.textContent = `${s[3].ok} / ${s[3].total}`;
  }

  // ====== 오답노트 ======
  function makeWrongNote(){
    const wrong = [];
    const blank = [];

    // 섹션별 오답/미응답 집계 (1~25, 26~50, 51~75, 76~100)
    const sections = [
      {name:"1~25", from:1, to:25, wrong:0, blank:0},
      {name:"26~50", from:26, to:50, wrong:0, blank:0},
      {name:"51~75", from:51, to:75, wrong:0, blank:0},
      {name:"76~100", from:76, to:100, wrong:0, blank:0},
    ];

    for(let q=1; q<=100; q++){
      const a = state.answers[q];
      const correct = ANSWER_KEY[q];

      const sec = sections.find(s => q>=s.from && q<=s.to);

      if (a == null){
        blank.push(q);
        if (sec) sec.blank++;
        continue;
      }
      if (a !== correct){
        wrong.push({q, mine:a, ans:correct});
        if (sec) sec.wrong++;
      }
    }

    const lines = [];
    const now = new Date();
    lines.push(`# 오답노트`);
    lines.push(`- 생성: ${now.getFullYear()}-${pad2(now.getMonth()+1)}-${pad2(now.getDate())} ${pad2(now.getHours())}:${pad2(now.getMinutes())}`);
    lines.push(`- 총 오답: ${wrong.length} / 미응답: ${blank.length}`);
    lines.push(`- 섹션별 오답/미응답: ` + sections.map(s => `${s.name} (오답 ${s.wrong}, 미응답 ${s.blank})`).join(" | "));
    lines.push("");
    lines.push("## 오답");
    if (wrong.length === 0) lines.push("- (없음)");
    else for (const w of wrong) lines.push(`- ${w.q}번: 내답 ${w.mine} / 정답 ${w.ans}`);
    lines.push("");
    lines.push("## 미응답");
    if (blank.length === 0) lines.push("- (없음)");
    else lines.push(`- ${blank.join(", ")}`);

    noteArea.value = lines.join("\n");
    copyHint.textContent = "오답노트 생성 완료";
  }

  async function copyWrongNote(){
    const text = noteArea.value.trim();
    if (!text){ copyHint.textContent = "복사할 내용이 없습니다."; return; }
    try{
      await navigator.clipboard.writeText(text);
      copyHint.textContent = "복사 완료!";
    }catch(e){
      noteArea.focus();
      noteArea.select();
      const ok = document.execCommand("copy");
      copyHint.textContent = ok ? "복사 완료!" : "복사 실패(브라우저 권한 확인)";
    }
  }

  function getCard(q){
    return grid.querySelector(`.qcard[data-q="${q}"]`);
  }
</script>
